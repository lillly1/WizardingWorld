<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32">
  <defs>
    <linearGradient id="dragon-liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF2000"/>
      <stop offset="40%" stop-color="#CC1000"/>
      <stop offset="100%" stop-color="#880800"/>
    </linearGradient>
    <linearGradient id="dragon-glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,100,80,0.25)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,100,80,0.2)"/>
    </linearGradient>
    <radialGradient id="danger-glow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#FF4000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF2000" stop-opacity="0"/>
    </radialGradient>
    <filter id="flame-blur">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>
  <!-- Danger glow -->
  <ellipse cx="12" cy="16" rx="10" ry="12" fill="url(#danger-glow)"/>
  <!-- Dangerous angular bottle body -->
  <path d="M7,12 L6,16 L6,24 Q6,27 7.5,28.5 L16.5,28.5 Q18,27 18,24 L18,16 L17,12 Z" fill="#1a0808" stroke="#aa2010" stroke-width="0.5"/>
  <path d="M7,12 L6,16 L6,24 Q6,27 7.5,28.5 L16.5,28.5 Q18,27 18,24 L18,16 L17,12 Z" fill="url(#dragon-glass)" opacity="0.3"/>
  <!-- Fiery red liquid -->
  <path d="M7.3,13.5 L6.5,16.5 L6.5,24 Q6.5,26.8 7.8,28 L16.2,28 Q17.5,26.8 17.5,24 L17.5,16.5 L16.7,13.5 Z" fill="url(#dragon-liquid)"/>
  <!-- Churning fire pattern in liquid -->
  <path d="M8,18 Q10,16 12,18 Q14,20 16,18" stroke="#FF6040" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M7.5,22 Q9.5,20 12,22 Q14.5,24 16.5,22" stroke="#FF4020" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M8,26 Q10,24 12,26 Q14,28 16,26" stroke="#FF5030" stroke-width="0.4" fill="none" opacity="0.3"/>
  <!-- Bottle neck -->
  <rect x="9.5" y="6" width="5" height="6.5" rx="0.6" fill="#1a0808" stroke="#aa2010" stroke-width="0.4"/>
  <rect x="9.5" y="6" width="5" height="6.5" rx="0.6" fill="url(#dragon-glass)" opacity="0.3"/>
  <!-- Liquid in neck (boiling) -->
  <rect x="10" y="8.5" width="4" height="3.5" fill="url(#dragon-liquid)" opacity="0.8"/>
  <!-- Bubbling at top -->
  <circle cx="11" cy="8.5" r="0.4" fill="#FF4020" opacity="0.6"/>
  <circle cx="13" cy="8.2" r="0.35" fill="#FF4020" opacity="0.5"/>
  <!-- FLAMES at bottle neck -->
  <path d="M10,6 Q9,4 10,2.5 Q10.5,1.5 10.5,3 Q10.5,1 11.5,0 Q11.5,2 12,1 Q12.5,0 13,2 Q13,0.5 13.5,1.5 Q14.5,3.5 14,6" fill="#FF4000" opacity="0.7" filter="url(#flame-blur)"/>
  <path d="M10.5,6 Q10,4.5 10.8,3 Q11,4 11.5,2.5 Q12,4 12.5,2.5 Q13,4 13.2,3 Q14,4.5 13.5,6" fill="#FF8000" opacity="0.6" filter="url(#flame-blur)"/>
  <path d="M11,6 Q11,4.5 11.5,3.5 Q12,5 12.5,3.5 Q13,4.5 13,6" fill="#FFB000" opacity="0.5" filter="url(#flame-blur)"/>
  <!-- Danger marks on bottle -->
  <path d="M10,20 L12,18 L14,20 L12,22 Z" fill="none" stroke="#FF6040" stroke-width="0.5" opacity="0.4"/>
  <line x1="12" y1="18.5" x2="12" y2="21" stroke="#FF6040" stroke-width="0.4" opacity="0.4"/>
  <circle cx="12" cy="21.5" r="0.3" fill="#FF6040" opacity="0.4"/>
  <!-- Glass highlight -->
  <path d="M7.5,14 Q7,18 7.5,25" stroke="white" stroke-width="0.4" fill="none" opacity="0.15"/>
  <!-- Ember particles -->
  <circle cx="9" cy="5" r="0.2" fill="#FF6000" opacity="0.6"/>
  <circle cx="15" cy="4" r="0.2" fill="#FFa000" opacity="0.5"/>
  <circle cx="11" cy="3" r="0.15" fill="#FFc000" opacity="0.4"/>
</svg>