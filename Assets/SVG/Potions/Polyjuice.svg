<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32">
  <defs>
    <linearGradient id="mud-liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B6B2A"/>
      <stop offset="40%" stop-color="#4A5520"/>
      <stop offset="100%" stop-color="#3B3520"/>
    </linearGradient>
    <linearGradient id="flask-glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.15)"/>
    </linearGradient>
    <radialGradient id="mud-depth" cx="0.5" cy="0.6" r="0.5">
      <stop offset="0%" stop-color="#6B7B30"/>
      <stop offset="100%" stop-color="#3B3520"/>
    </radialGradient>
  </defs>
  <!-- Wide round flask body -->
  <ellipse cx="12" cy="21" rx="7.5" ry="7.5" fill="#1a1f14" stroke="#5a5a40" stroke-width="0.5"/>
  <ellipse cx="12" cy="21" rx="7.5" ry="7.5" fill="url(#flask-glass)" opacity="0.4"/>
  <!-- Flask bottom -->
  <ellipse cx="12" cy="27" rx="4" ry="1.5" fill="#1a1f14" stroke="#5a5a40" stroke-width="0.3"/>
  <!-- Muddy liquid -->
  <ellipse cx="12" cy="21.5" rx="6.8" ry="6.5" fill="url(#mud-depth)"/>
  <!-- Thick muddy surface -->
  <path d="M5.5,19 Q7,17.5 9,18.5 Q11,19.5 13,18 Q15,17 17,18.5 Q18.5,19.5 18.5,19" stroke="#6B7B30" stroke-width="0.5" fill="none" opacity="0.7"/>
  <!-- Bubbles -->
  <circle cx="9" cy="20" r="0.8" fill="none" stroke="#7B8B40" stroke-width="0.3" opacity="0.7"/>
  <circle cx="14" cy="22" r="1" fill="none" stroke="#7B8B40" stroke-width="0.3" opacity="0.6"/>
  <circle cx="11" cy="24" r="0.6" fill="none" stroke="#8B9B50" stroke-width="0.3" opacity="0.5"/>
  <circle cx="13" cy="18" r="0.5" fill="none" stroke="#8B9B50" stroke-width="0.3" opacity="0.8"/>
  <!-- Rising bubbles -->
  <circle cx="10" cy="16" r="0.4" fill="#7B8B40" opacity="0.4"/>
  <circle cx="13.5" cy="15" r="0.3" fill="#7B8B40" opacity="0.3"/>
  <circle cx="11.5" cy="14" r="0.35" fill="#8B9B50" opacity="0.25"/>
  <!-- Neck -->
  <path d="M10,13.5 L10,9 Q10,8 10.5,8 L13.5,8 Q14,8 14,9 L14,13.5" fill="#1a1f14" stroke="#5a5a40" stroke-width="0.4"/>
  <path d="M10,13.5 L10,9 Q10,8 10.5,8 L13.5,8 Q14,8 14,9 L14,13.5" fill="url(#flask-glass)" opacity="0.3"/>
  <!-- Liquid in neck -->
  <rect x="10.4" y="10" width="3.2" height="3.5" fill="url(#mud-liquid)" opacity="0.8"/>
  <!-- Cork/stopper -->
  <rect x="9.8" y="6" width="4.4" height="2.5" rx="0.8" fill="#6B4226" stroke="#5B3216" stroke-width="0.3"/>
  <line x1="10.3" y1="6.8" x2="13.7" y2="6.8" stroke="#5B3216" stroke-width="0.2" opacity="0.5"/>
  <line x1="10.3" y1="7.5" x2="13.7" y2="7.5" stroke="#5B3216" stroke-width="0.2" opacity="0.5"/>
  <!-- Glass highlight -->
  <path d="M6.5,17 Q6,20 6.5,24" stroke="white" stroke-width="0.5" fill="none" opacity="0.2"/>
  <!-- Brown-green murk swirls -->
  <path d="M8,21 Q10,19 12,22 Q14,25 16,22" stroke="#5B4520" stroke-width="0.6" fill="none" opacity="0.4"/>
  <path d="M9,25 Q11,23 13,25" stroke="#4A5520" stroke-width="0.5" fill="none" opacity="0.3"/>
</svg>