<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32">
  <defs>
    <linearGradient id="strong-liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CC0000"/>
      <stop offset="50%" stop-color="#990000"/>
      <stop offset="100%" stop-color="#660000"/>
    </linearGradient>
    <linearGradient id="strong-glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,150,150,0.25)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,150,150,0.15)"/>
    </linearGradient>
    <radialGradient id="power-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#CC0000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#CC0000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Power glow -->
  <ellipse cx="12" cy="19" rx="8" ry="9" fill="url(#power-glow)"/>
  <!-- Bold strong bottle - wide and sturdy -->
  <path d="M6,12 L5.5,15 L5.5,25 Q5.5,28 7.5,29 L16.5,29 Q18.5,28 18.5,25 L18.5,15 L18,12 Z" fill="#1a0808" stroke="#880000" stroke-width="0.5"/>
  <path d="M6,12 L5.5,15 L5.5,25 Q5.5,28 7.5,29 L16.5,29 Q18.5,28 18.5,25 L18.5,15 L18,12 Z" fill="url(#strong-glass)" opacity="0.3"/>
  <!-- Deep red liquid -->
  <path d="M6.2,14 L6,16 L6,25 Q6,27.5 7.7,28.5 L16.3,28.5 Q18,27.5 18,25 L18,16 L17.8,14 Z" fill="url(#strong-liquid)"/>
  <!-- Bold surface tension -->
  <path d="M6.2,14 Q9,13 12,14 Q15,15 17.8,14" stroke="#DD2020" stroke-width="0.4" fill="none" opacity="0.6"/>
  <!-- Power symbol etched on bottle -->
  <path d="M10,19 L12,17 L14,19" stroke="#ff4040" stroke-width="0.6" fill="none" opacity="0.5"/>
  <line x1="12" y1="17" x2="12" y2="23" stroke="#ff4040" stroke-width="0.6" opacity="0.5"/>
  <path d="M10,23 L14,23" stroke="#ff4040" stroke-width="0.6" fill="none" opacity="0.5"/>
  <!-- Wide strong neck -->
  <rect x="9" y="6" width="6" height="6.5" rx="0.8" fill="#1a0808" stroke="#880000" stroke-width="0.4"/>
  <rect x="9" y="6" width="6" height="6.5" rx="0.8" fill="url(#strong-glass)" opacity="0.3"/>
  <!-- Liquid in neck -->
  <rect x="9.5" y="9" width="5" height="3" fill="url(#strong-liquid)" opacity="0.7"/>
  <!-- Metal cap -->
  <rect x="8.5" y="4" width="7" height="2.5" rx="0.8" fill="#444" stroke="#666" stroke-width="0.3"/>
  <rect x="8.5" y="4" width="7" height="1.2" rx="0.5" fill="#555"/>
  <line x1="9" y1="5.5" x2="15" y2="5.5" stroke="#333" stroke-width="0.2"/>
  <!-- Glass highlight -->
  <path d="M7,14 L7,26" stroke="white" stroke-width="0.5" fill="none" opacity="0.15"/>
  <!-- Label band -->
  <rect x="6" y="24" width="12" height="3" rx="0.3" fill="#330000" opacity="0.3"/>
  <rect x="6" y="24" width="12" height="3" rx="0.3" fill="none" stroke="#660000" stroke-width="0.3" opacity="0.5"/>
</svg>