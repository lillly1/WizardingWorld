<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32">
  <defs>
    <linearGradient id="rainbow-liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B8A"/>
      <stop offset="20%" stop-color="#FFB347"/>
      <stop offset="40%" stop-color="#FFE66D"/>
      <stop offset="60%" stop-color="#6BCB77"/>
      <stop offset="80%" stop-color="#4D96FF"/>
      <stop offset="100%" stop-color="#9B59B6"/>
    </linearGradient>
    <linearGradient id="party-glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,200,255,0.3)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(200,255,200,0.2)"/>
    </linearGradient>
    <radialGradient id="party-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFE66D" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#FF6B8A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#9B59B6" stop-opacity="0"/>
    </radialGradient>
    <filter id="sparkle-f">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>
  <!-- Party glow -->
  <ellipse cx="12" cy="20" rx="9" ry="10" fill="url(#party-glow)"/>
  <!-- Whimsical rounded bottle -->
  <path d="M7,11 Q5,15 5.5,20 Q6,25 8,27.5 Q9.5,29.5 12,29.5 Q14.5,29.5 16,27.5 Q18,25 18.5,20 Q19,15 17,11 Z" fill="#1a1020" stroke="#aa70cc" stroke-width="0.4"/>
  <path d="M7,11 Q5,15 5.5,20 Q6,25 8,27.5 Q9.5,29.5 12,29.5 Q14.5,29.5 16,27.5 Q18,25 18.5,20 Q19,15 17,11 Z" fill="url(#party-glass)" opacity="0.4"/>
  <!-- Multi-color swirling liquid -->
  <path d="M7.5,13 Q5.5,16 6,20.5 Q6.5,25 8.3,27.3 Q9.7,29 12,29 Q14.3,29 15.7,27.3 Q17.5,25 18,20.5 Q18.5,16 16.5,13 Z" fill="url(#rainbow-liquid)"/>
  <!-- Swirl patterns (celebration feel) -->
  <path d="M8,16 Q10,20 8,24" stroke="#FF6B8A" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M10,14 Q13,18 10,22 Q13,26 10,28" stroke="#FFB347" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M14,14 Q11,18 14,22 Q11,26 14,28" stroke="#4D96FF" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M16,16 Q14,20 16,24" stroke="#6BCB77" stroke-width="0.6" fill="none" opacity="0.5"/>
  <!-- Spiral center -->
  <path d="M12,18 Q10,19 11,20.5 Q12,22 13,20.5 Q14,19 12,18 Z" fill="#FFE66D" opacity="0.3"/>
  <!-- Multicolor sparkles -->
  <circle cx="9" cy="16" r="0.3" fill="#FF6B8A" opacity="0.7" filter="url(#sparkle-f)"/>
  <circle cx="14" cy="18" r="0.3" fill="#4D96FF" opacity="0.7" filter="url(#sparkle-f)"/>
  <circle cx="10" cy="22" r="0.25" fill="#6BCB77" opacity="0.6" filter="url(#sparkle-f)"/>
  <circle cx="15" cy="24" r="0.25" fill="#FFB347" opacity="0.6" filter="url(#sparkle-f)"/>
  <circle cx="12" cy="26" r="0.3" fill="#9B59B6" opacity="0.5" filter="url(#sparkle-f)"/>
  <circle cx="8" cy="20" r="0.2" fill="#FFE66D" opacity="0.8"/>
  <circle cx="16" cy="20" r="0.2" fill="#FF6B8A" opacity="0.7"/>
  <!-- Whimsical stars -->
  <path d="M11,15 L11.2,14.5 L11.7,14.3 L11.2,14.1 L11,13.6 L10.8,14.1 L10.3,14.3 L10.8,14.5 Z" fill="white" opacity="0.7"/>
  <path d="M13,27 L13.15,26.6 L13.55,26.45 L13.15,26.3 L13,25.9 L12.85,26.3 L12.45,26.45 L12.85,26.6 Z" fill="white" opacity="0.5"/>
  <!-- Bottle neck -->
  <rect x="10" y="5.5" width="4" height="6" rx="0.5" fill="#1a1020" stroke="#aa70cc" stroke-width="0.4"/>
  <rect x="10" y="5.5" width="4" height="6" rx="0.5" fill="url(#party-glass)" opacity="0.3"/>
  <!-- Rainbow liquid in neck -->
  <rect x="10.5" y="8" width="3" height="3.2" fill="url(#rainbow-liquid)" opacity="0.8"/>
  <!-- Fun decorated cork -->
  <rect x="9.5" y="3.5" width="5" height="2.5" rx="0.8" fill="#aa70cc" stroke="#9060bb" stroke-width="0.3"/>
  <circle cx="10.5" cy="4.7" r="0.3" fill="#FFE66D" opacity="0.6"/>
  <circle cx="12" cy="4.7" r="0.3" fill="#FF6B8A" opacity="0.6"/>
  <circle cx="13.5" cy="4.7" r="0.3" fill="#4D96FF" opacity="0.6"/>
  <!-- Glass highlight -->
  <path d="M8,13 Q7,18 8,25" stroke="white" stroke-width="0.4" fill="none" opacity="0.2"/>
</svg>