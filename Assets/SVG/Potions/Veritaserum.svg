<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32">
  <defs>
    <linearGradient id="clear-liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="50%" stop-color="#D0E8F8"/>
      <stop offset="100%" stop-color="#B8DCF0"/>
    </linearGradient>
    <linearGradient id="vial-glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(200,230,255,0.35)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(200,230,255,0.25)"/>
    </linearGradient>
    <linearGradient id="crystal-sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Thin vial body -->
  <path d="M10,8 L9.5,10 Q9,12 9,16 L9,26 Q9,28.5 10.5,29 L13.5,29 Q15,28.5 15,26 L15,16 Q15,12 14.5,10 L14,8 Z" fill="#f0f8ff" stroke="#a0c0d8" stroke-width="0.4"/>
  <path d="M10,8 L9.5,10 Q9,12 9,16 L9,26 Q9,28.5 10.5,29 L13.5,29 Q15,28.5 15,26 L15,16 Q15,12 14.5,10 L14,8 Z" fill="url(#vial-glass)"/>
  <!-- Crystal clear liquid -->
  <path d="M9.5,12 Q9.2,14 9.3,18 L9.3,26 Q9.3,28 10.5,28.5 L13.5,28.5 Q14.7,28 14.7,26 L14.7,18 Q14.8,14 14.5,12 Z" fill="url(#clear-liquid)" opacity="0.5"/>
  <!-- Water-like surface -->
  <path d="M9.5,12 Q11,11.5 12,12 Q13,12.5 14.5,12" stroke="#B8DCF0" stroke-width="0.3" fill="none" opacity="0.7"/>
  <!-- Crystal refraction lines -->
  <line x1="10.5" y1="14" x2="10.5" y2="27" stroke="white" stroke-width="0.2" opacity="0.3"/>
  <line x1="13" y1="15" x2="13" y2="26" stroke="white" stroke-width="0.15" opacity="0.25"/>
  <!-- Blue tint reflections -->
  <ellipse cx="11.5" cy="18" rx="1" ry="2" fill="#c0ddf0" opacity="0.2"/>
  <ellipse cx="12.5" cy="24" rx="0.8" ry="1.5" fill="#c0ddf0" opacity="0.15"/>
  <!-- Tiny pristine drops/sparkle -->
  <circle cx="11" cy="16" r="0.2" fill="white" opacity="0.7"/>
  <circle cx="13" cy="22" r="0.2" fill="white" opacity="0.6"/>
  <circle cx="11.5" cy="25" r="0.15" fill="white" opacity="0.5"/>
  <!-- Vial neck - thin -->
  <rect x="10.8" y="4" width="2.4" height="4.5" rx="0.3" fill="#f0f8ff" stroke="#a0c0d8" stroke-width="0.4"/>
  <rect x="10.8" y="4" width="2.4" height="4.5" rx="0.3" fill="url(#vial-glass)" opacity="0.5"/>
  <!-- Neck ring -->
  <rect x="10.2" y="7.5" width="3.6" height="1" rx="0.5" fill="#d0e0ef" stroke="#a0c0d8" stroke-width="0.3"/>
  <!-- Glass stopper (crystal clear) -->
  <path d="M11,4 L11.2,1.5 Q12,0.5 12.8,1.5 L13,4 Z" fill="#d8eaf5" stroke="#a0c0d8" stroke-width="0.3"/>
  <path d="M11,4 L11.2,1.5 Q12,0.5 12.8,1.5 L13,4 Z" fill="url(#crystal-sheen)"/>
  <!-- Main glass highlight -->
  <path d="M10,10 L10,26" stroke="white" stroke-width="0.5" fill="none" opacity="0.25"/>
  <!-- Droplet at stopper tip -->
  <circle cx="12" cy="1.2" r="0.5" fill="#d8eaf5" stroke="#a0c0d8" stroke-width="0.2"/>
  <circle cx="12" cy="1.2" r="0.2" fill="white" opacity="0.5"/>
</svg>