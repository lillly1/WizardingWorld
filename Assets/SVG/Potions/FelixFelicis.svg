<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32">
  <defs>
    <linearGradient id="gold-liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="glass-thin" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.2)"/>
    </linearGradient>
    <radialGradient id="gold-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-f">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glow -->
  <ellipse cx="12" cy="20" rx="8" ry="10" fill="url(#gold-glow)"/>
  <!-- Bottle body - elegant thin shape -->
  <path d="M9,10 Q8,12 7.5,16 Q7,20 7.5,24 Q8,27 9.5,28 L14.5,28 Q16,27 16.5,24 Q17,20 16.5,16 Q16,12 15,10 Z" fill="#2a2520" stroke="#8B7355" stroke-width="0.4"/>
  <path d="M9,10 Q8,12 7.5,16 Q7,20 7.5,24 Q8,27 9.5,28 L14.5,28 Q16,27 16.5,24 Q17,20 16.5,16 Q16,12 15,10 Z" fill="url(#glass-thin)" opacity="0.5"/>
  <!-- Liquid fill -->
  <path d="M9.2,13 Q8.3,16 8,20 Q7.5,24 9.5,27.5 L14.5,27.5 Q16.5,24 16,20 Q15.7,16 14.8,13 Z" fill="url(#gold-liquid)" filter="url(#glow-f)"/>
  <!-- Liquid shimmer -->
  <ellipse cx="11" cy="18" rx="2" ry="1" fill="#FFEC8B" opacity="0.5"/>
  <ellipse cx="13" cy="22" rx="1.5" ry="0.8" fill="#FFF8DC" opacity="0.4"/>
  <!-- Molten swirl -->
  <path d="M10,16 Q12,18 11,20 Q10,22 12,24" stroke="#FFF8DC" stroke-width="0.5" fill="none" opacity="0.6"/>
  <!-- Bottle neck -->
  <rect x="10.5" y="5" width="3" height="5.5" rx="0.5" fill="#2a2520" stroke="#8B7355" stroke-width="0.4"/>
  <rect x="10.5" y="5" width="3" height="5.5" rx="0.5" fill="url(#glass-thin)" opacity="0.4"/>
  <!-- Liquid in neck -->
  <rect x="11" y="7" width="2" height="3.2" rx="0.3" fill="url(#gold-liquid)" opacity="0.8"/>
  <!-- Cork -->
  <rect x="10.3" y="3" width="3.4" height="2.5" rx="0.8" fill="#A0522D" stroke="#8B4513" stroke-width="0.3"/>
  <line x1="10.8" y1="3.8" x2="13.2" y2="3.8" stroke="#8B4513" stroke-width="0.2" opacity="0.5"/>
  <line x1="10.8" y1="4.5" x2="13.2" y2="4.5" stroke="#8B4513" stroke-width="0.2" opacity="0.5"/>
  <!-- Glass highlight -->
  <path d="M9.5,12 Q9,16 9,20 Q9,24 9.5,26" stroke="white" stroke-width="0.4" fill="none" opacity="0.3"/>
  <!-- Sparkle particles -->
  <circle cx="10.5" cy="17" r="0.3" fill="#FFF8DC" opacity="0.8"/>
  <circle cx="13" cy="20" r="0.25" fill="#FFEC8B" opacity="0.7"/>
  <circle cx="11.5" cy="24" r="0.3" fill="#FFF8DC" opacity="0.6"/>
  <circle cx="14" cy="16" r="0.2" fill="white" opacity="0.9"/>
</svg>