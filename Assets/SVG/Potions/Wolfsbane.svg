<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32">
  <defs>
    <linearGradient id="smoky-liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8090A0"/>
      <stop offset="40%" stop-color="#5A6A7A"/>
      <stop offset="100%" stop-color="#3A4A5A"/>
    </linearGradient>
    <linearGradient id="tall-glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(180,200,220,0.3)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(180,200,220,0.2)"/>
    </linearGradient>
    <filter id="wisp-filter">
      <feGaussianBlur stdDeviation="1.0"/>
    </filter>
    <filter id="smoke-filter">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>
  <!-- Tall flask body -->
  <path d="M8.5,10 Q7,13 7,17 L7,25 Q7,28 8.5,29 L15.5,29 Q17,28 17,25 L17,17 Q17,13 15.5,10 Z" fill="#1a1e24" stroke="#6a7a8a" stroke-width="0.5"/>
  <path d="M8.5,10 Q7,13 7,17 L7,25 Q7,28 8.5,29 L15.5,29 Q17,28 17,25 L17,17 Q17,13 15.5,10 Z" fill="url(#tall-glass)" opacity="0.4"/>
  <!-- Smoky blue-gray liquid -->
  <path d="M8,13 Q7.3,15 7.3,18 L7.3,25 Q7.3,27.8 8.7,28.6 L15.3,28.6 Q16.7,27.8 16.7,25 L16.7,18 Q16.7,15 16,13 Z" fill="url(#smoky-liquid)"/>
  <!-- Smoke wisps inside liquid -->
  <path d="M9,18 Q11,16 13,18 Q15,20 13,22" stroke="#9AABB8" stroke-width="0.6" fill="none" opacity="0.4"/>
  <path d="M10,22 Q12,20 14,22 Q16,24 14,26" stroke="#8A9BA8" stroke-width="0.5" fill="none" opacity="0.3"/>
  <path d="M8.5,15 Q10,17 12,15" stroke="#A0B0C0" stroke-width="0.4" fill="none" opacity="0.35"/>
  <!-- Surface smoke -->
  <ellipse cx="12" cy="13" rx="3.5" ry="1" fill="#8090A0" opacity="0.3" filter="url(#smoke-filter)"/>
  <!-- Tall neck -->
  <rect x="10" y="4" width="4" height="6.5" rx="0.5" fill="#1a1e24" stroke="#6a7a8a" stroke-width="0.4"/>
  <rect x="10" y="4" width="4" height="6.5" rx="0.5" fill="url(#tall-glass)" opacity="0.3"/>
  <!-- Liquid in neck -->
  <rect x="10.4" y="7" width="3.2" height="3.2" fill="url(#smoky-liquid)" opacity="0.6"/>
  <!-- Wispy smoke rising from top -->
  <path d="M11,4 Q10,2 11,0.5" stroke="#8090A0" stroke-width="0.6" fill="none" opacity="0.3" filter="url(#wisp-filter)"/>
  <path d="M12.5,4 Q13.5,1.5 12,0" stroke="#8090A0" stroke-width="0.5" fill="none" opacity="0.25" filter="url(#wisp-filter)"/>
  <path d="M13.5,4.5 Q15,2 14,0.5" stroke="#7080A0" stroke-width="0.4" fill="none" opacity="0.2" filter="url(#wisp-filter)"/>
  <!-- Cork -->
  <rect x="9.8" y="2.5" width="4.4" height="2" rx="0.6" fill="#5A5060" stroke="#4A4050" stroke-width="0.3"/>
  <line x1="10.3" y1="3.2" x2="13.7" y2="3.2" stroke="#4A4050" stroke-width="0.2" opacity="0.5"/>
  <!-- Glass highlight -->
  <path d="M8.5,12 Q8,17 8,24" stroke="white" stroke-width="0.4" fill="none" opacity="0.2"/>
  <!-- Moon crescent subtle detail on bottle -->
  <path d="M14.5,20 Q16,19 16,21 Q16,23 14.5,22 Q15.5,21.5 15.5,21 Q15.5,20.5 14.5,20 Z" fill="#9AABB8" opacity="0.15"/>
</svg>