<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32">
  <defs>
    <linearGradient id="fire-shield-liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB820"/>
      <stop offset="50%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#E06000"/>
    </linearGradient>
    <linearGradient id="fire-glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,220,180,0.25)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,220,180,0.2)"/>
    </linearGradient>
    <radialGradient id="fire-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF8C00" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Fire glow -->
  <ellipse cx="12" cy="20" rx="8" ry="9" fill="url(#fire-glow)"/>
  <!-- Bottle body -->
  <path d="M7.5,11 Q6,14 6,19 Q6,24 7.5,27 Q9,29 12,29 Q15,29 16.5,27 Q18,24 18,19 Q18,14 16.5,11 Z" fill="#1a1208" stroke="#c07020" stroke-width="0.4"/>
  <path d="M7.5,11 Q6,14 6,19 Q6,24 7.5,27 Q9,29 12,29 Q15,29 16.5,27 Q18,24 18,19 Q18,14 16.5,11 Z" fill="url(#fire-glass)" opacity="0.4"/>
  <!-- Orange-yellow liquid -->
  <path d="M8,13.5 Q6.5,16 6.5,19.5 Q6.5,24 8,26.8 Q9.3,28.5 12,28.5 Q14.7,28.5 16,26.8 Q17.5,24 17.5,19.5 Q17.5,16 16,13.5 Z" fill="url(#fire-shield-liquid)"/>
  <!-- Flame motif on bottle (etched/embossed) -->
  <path d="M12,16 Q10,19 10.5,21 Q11,23 12,22 Q11.5,24 12,25.5 Q13,24 13,22.5 Q14,23.5 13.5,21 Q14,19 12,16 Z" fill="none" stroke="#FFD060" stroke-width="0.6" opacity="0.6"/>
  <!-- Inner flame detail -->
  <path d="M12,18 Q11.2,20 11.5,21 Q12,22 12,21 Q12,22 12.5,21 Q12.8,20 12,18 Z" fill="#FFD060" opacity="0.3"/>
  <!-- Shield outline around flame -->
  <path d="M9,15 L12,14 L15,15 L15,22 Q15,25 12,26.5 Q9,25 9,22 Z" fill="none" stroke="#FFD060" stroke-width="0.4" opacity="0.35"/>
  <!-- Liquid shimmer -->
  <ellipse cx="10" cy="18" rx="1.5" ry="0.8" fill="#FFD060" opacity="0.3"/>
  <ellipse cx="14" cy="22" rx="1.2" ry="0.6" fill="#FFE080" opacity="0.25"/>
  <!-- Bottle neck -->
  <rect x="10" y="5.5" width="4" height="6" rx="0.5" fill="#1a1208" stroke="#c07020" stroke-width="0.4"/>
  <rect x="10" y="5.5" width="4" height="6" rx="0.5" fill="url(#fire-glass)" opacity="0.3"/>
  <!-- Liquid in neck -->
  <rect x="10.5" y="8" width="3" height="3" fill="url(#fire-shield-liquid)" opacity="0.7"/>
  <!-- Cork -->
  <rect x="9.8" y="3.5" width="4.4" height="2.5" rx="0.7" fill="#A0522D" stroke="#8B4513" stroke-width="0.3"/>
  <line x1="10.3" y1="4.3" x2="13.7" y2="4.3" stroke="#8B4513" stroke-width="0.2" opacity="0.5"/>
  <line x1="10.3" y1="5" x2="13.7" y2="5" stroke="#8B4513" stroke-width="0.2" opacity="0.5"/>
  <!-- Glass highlight -->
  <path d="M8,13 Q7.5,18 8,25" stroke="white" stroke-width="0.4" fill="none" opacity="0.2"/>
  <!-- Hot spots -->
  <circle cx="9.5" cy="17" r="0.25" fill="#FFE080" opacity="0.5"/>
  <circle cx="14" cy="25" r="0.2" fill="#FFE080" opacity="0.4"/>
</svg>