<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32">
  <defs>
    <linearGradient id="green-liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#50E850"/>
      <stop offset="50%" stop-color="#30C030"/>
      <stop offset="100%" stop-color="#20A020"/>
    </linearGradient>
    <linearGradient id="green-glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(200,255,200,0.3)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(200,255,200,0.2)"/>
    </linearGradient>
    <radialGradient id="green-glow" cx="0.5" cy="0.6" r="0.5">
      <stop offset="0%" stop-color="#50E850" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#50E850" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Glow -->
  <ellipse cx="12" cy="20" rx="9" ry="9" fill="url(#green-glow)"/>
  <!-- Round bottle body -->
  <path d="M7,11 Q5.5,15 6,20 Q6.5,25 8,27 Q9.5,29 12,29 Q14.5,29 16,27 Q17.5,25 18,20 Q18.5,15 17,11 Z" fill="#152015" stroke="#40a040" stroke-width="0.4"/>
  <path d="M7,11 Q5.5,15 6,20 Q6.5,25 8,27 Q9.5,29 12,29 Q14.5,29 16,27 Q17.5,25 18,20 Q18.5,15 17,11 Z" fill="url(#green-glass)" opacity="0.4"/>
  <!-- Bright green liquid -->
  <path d="M7.5,14 Q6.2,17 6.5,20.5 Q7,25 8.3,26.8 Q9.6,28.5 12,28.5 Q14.4,28.5 15.7,26.8 Q17,25 17.5,20.5 Q17.8,17 16.5,14 Z" fill="url(#green-liquid)"/>
  <!-- Eye symbol on bottle -->
  <ellipse cx="12" cy="20" rx="4" ry="2.5" fill="none" stroke="#c0ffc0" stroke-width="0.6" opacity="0.6"/>
  <!-- Iris -->
  <circle cx="12" cy="20" r="1.5" fill="#008800" stroke="#c0ffc0" stroke-width="0.3" opacity="0.7"/>
  <!-- Pupil -->
  <circle cx="12" cy="20" r="0.6" fill="#003300" opacity="0.8"/>
  <!-- Pupil highlight -->
  <circle cx="12.4" cy="19.6" r="0.25" fill="white" opacity="0.7"/>
  <!-- Wide eye lines radiating -->
  <line x1="7.5" y1="20" x2="6.8" y2="20" stroke="#c0ffc0" stroke-width="0.3" opacity="0.4"/>
  <line x1="16.5" y1="20" x2="17.2" y2="20" stroke="#c0ffc0" stroke-width="0.3" opacity="0.4"/>
  <line x1="8.5" y1="17.5" x2="8" y2="17" stroke="#c0ffc0" stroke-width="0.3" opacity="0.3"/>
  <line x1="15.5" y1="17.5" x2="16" y2="17" stroke="#c0ffc0" stroke-width="0.3" opacity="0.3"/>
  <line x1="8.5" y1="22.5" x2="8" y2="23" stroke="#c0ffc0" stroke-width="0.3" opacity="0.3"/>
  <line x1="15.5" y1="22.5" x2="16" y2="23" stroke="#c0ffc0" stroke-width="0.3" opacity="0.3"/>
  <!-- Bottle neck -->
  <rect x="10.2" y="5.5" width="3.6" height="6" rx="0.5" fill="#152015" stroke="#40a040" stroke-width="0.4"/>
  <rect x="10.2" y="5.5" width="3.6" height="6" rx="0.5" fill="url(#green-glass)" opacity="0.3"/>
  <!-- Liquid in neck -->
  <rect x="10.7" y="8" width="2.6" height="3.2" rx="0.3" fill="url(#green-liquid)" opacity="0.7"/>
  <!-- Cork -->
  <rect x="10" y="3.5" width="4" height="2.5" rx="0.7" fill="#A0522D" stroke="#8B4513" stroke-width="0.3"/>
  <line x1="10.5" y1="4.3" x2="13.5" y2="4.3" stroke="#8B4513" stroke-width="0.2" opacity="0.5"/>
  <line x1="10.5" y1="5" x2="13.5" y2="5" stroke="#8B4513" stroke-width="0.2" opacity="0.5"/>
  <!-- Glass highlight -->
  <path d="M8,13 Q7.5,18 8,25" stroke="white" stroke-width="0.4" fill="none" opacity="0.2"/>
</svg>