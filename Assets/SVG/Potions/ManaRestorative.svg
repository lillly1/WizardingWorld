<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32">
  <defs>
    <linearGradient id="mana-liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B68EE"/>
      <stop offset="50%" stop-color="#5050CC"/>
      <stop offset="100%" stop-color="#3030AA"/>
    </linearGradient>
    <linearGradient id="mana-glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(180,180,255,0.3)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(180,180,255,0.2)"/>
    </linearGradient>
    <radialGradient id="mana-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7B68EE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#5050CC" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Mana glow -->
  <ellipse cx="12" cy="20" rx="8" ry="9" fill="url(#mana-glow)"/>
  <!-- Round bottle body -->
  <path d="M7,12 Q5.5,15 5.5,20 Q5.5,25 7.5,27.5 Q9,29 12,29 Q15,29 16.5,27.5 Q18.5,25 18.5,20 Q18.5,15 17,12 Z" fill="#0a0820" stroke="#5050aa" stroke-width="0.4"/>
  <path d="M7,12 Q5.5,15 5.5,20 Q5.5,25 7.5,27.5 Q9,29 12,29 Q15,29 16.5,27.5 Q18.5,25 18.5,20 Q18.5,15 17,12 Z" fill="url(#mana-glass)" opacity="0.4"/>
  <!-- Blue-purple liquid -->
  <path d="M7.5,14 Q6,16.5 6,20.5 Q6,25 7.8,27.2 Q9.3,28.5 12,28.5 Q14.7,28.5 16.2,27.2 Q18,25 18,20.5 Q18,16.5 16.5,14 Z" fill="url(#mana-liquid)"/>
  <!-- Starry sparkles inside -->
  <!-- Large stars -->
  <path d="M9,18 L9.3,17.2 L10,17 L9.3,16.8 L9,16 L8.7,16.8 L8,17 L8.7,17.2 Z" fill="white" opacity="0.8"/>
  <path d="M14,22 L14.25,21.3 L15,21 L14.25,20.7 L14,20 L13.75,20.7 L13,21 L13.75,21.3 Z" fill="white" opacity="0.7"/>
  <path d="M11,24 L11.2,23.4 L11.8,23.2 L11.2,23 L11,22.4 L10.8,23 L10.2,23.2 L10.8,23.4 Z" fill="white" opacity="0.6"/>
  <!-- Small stars -->
  <circle cx="10.5" cy="20" r="0.25" fill="white" opacity="0.8"/>
  <circle cx="15" cy="18" r="0.2" fill="white" opacity="0.7"/>
  <circle cx="8" cy="22" r="0.2" fill="#B0A0FF" opacity="0.6"/>
  <circle cx="13" cy="16" r="0.2" fill="white" opacity="0.9"/>
  <circle cx="16" cy="24" r="0.15" fill="#C0B0FF" opacity="0.5"/>
  <circle cx="9" cy="26" r="0.2" fill="white" opacity="0.5"/>
  <circle cx="14.5" cy="26" r="0.15" fill="#B0A0FF" opacity="0.4"/>
  <!-- Tiny twinkling dots -->
  <circle cx="12" cy="18" r="0.15" fill="white" opacity="0.7"/>
  <circle cx="7.5" cy="20" r="0.1" fill="white" opacity="0.6"/>
  <circle cx="16.5" cy="20" r="0.1" fill="white" opacity="0.5"/>
  <!-- Liquid swirl -->
  <path d="M9,19 Q11,17 13,19 Q15,21 13,23" stroke="#9080DD" stroke-width="0.4" fill="none" opacity="0.4"/>
  <!-- Bottle neck -->
  <rect x="10" y="6" width="4" height="6.5" rx="0.5" fill="#0a0820" stroke="#5050aa" stroke-width="0.4"/>
  <rect x="10" y="6" width="4" height="6.5" rx="0.5" fill="url(#mana-glass)" opacity="0.3"/>
  <!-- Liquid in neck -->
  <rect x="10.5" y="8.5" width="3" height="3.5" fill="url(#mana-liquid)" opacity="0.7"/>
  <!-- Star in neck -->
  <circle cx="12" cy="10" r="0.2" fill="white" opacity="0.6"/>
  <!-- Crystal stopper -->
  <path d="M10,6 L10.5,3.5 Q12,2 13.5,3.5 L14,6 Z" fill="#4040aa" stroke="#5050cc" stroke-width="0.3"/>
  <path d="M11,5 L11.5,4 Q12,3 12.5,4 L13,5 Z" fill="#7070cc" opacity="0.5"/>
  <!-- Glass highlight -->
  <path d="M8,14 Q7.5,18 8,25" stroke="white" stroke-width="0.4" fill="none" opacity="0.2"/>
</svg>