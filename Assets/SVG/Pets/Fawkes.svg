<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <radialGradient id="fawkesGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4500" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff4500" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="24" height="24" rx="3" fill="#2a1a0a"/>
  <!-- Fiery aura -->
  <circle cx="12" cy="12" r="10" fill="url(#fawkesGlow)"/>
  <!-- Tail feathers - magnificent, fiery -->
  <g>
    <!-- Long tail plumes -->
    <path d="M10 16 Q6 20 5 23 Q5.5 23 7 20 Q8 22 8 24 Q8.5 24 9 21 Q10 23 10 24" fill="#cc0000" opacity="0.8"/>
    <path d="M12 17 Q12 21 11 24 Q11.5 24 12.5 21 Q13 23 13 24" fill="#ff4500" opacity="0.7"/>
    <path d="M14 16 Q18 20 19 23 Q18.5 23 17 20 Q16 22 16 24 Q15.5 24 15 21 Q14 23 14 24" fill="#cc0000" opacity="0.8"/>
    <!-- Fiery tips -->
    <g fill="#ffd700" opacity="0.6">
      <path d="M5 23 L4.5 24 L5.5 23.5 Z"/>
      <path d="M8 24 L7.5 24 L8 23.5 Z"/>
      <path d="M11 24 L10.5 24 L11 23.5 Z"/>
      <path d="M13 24 L12.5 24 L13 23.5 Z"/>
      <path d="M16 24 L15.5 24 L16 23.5 Z"/>
      <path d="M19 23 L18.5 24 L19.5 23.5 Z"/>
    </g>
  </g>
  <!-- Body -->
  <ellipse cx="12" cy="13" rx="3.5" ry="4" fill="#cc2200"/>
  <!-- Breast feathers (golden) -->
  <ellipse cx="12" cy="12" rx="2.5" ry="2.5" fill="#ffa500" opacity="0.6"/>
  <!-- Wings folded -->
  <path d="M8.5 11 Q6 12 6 15 Q7 16 8.5 14 Z" fill="#cc0000"/>
  <path d="M15.5 11 Q18 12 18 15 Q17 16 15.5 14 Z" fill="#cc0000"/>
  <!-- Wing feather accents -->
  <g stroke="#ff4500" stroke-width="0.3" fill="none" opacity="0.5">
    <path d="M7 13 L8 12"/>
    <path d="M7 14 L8.5 13"/>
    <path d="M17 13 L16 12"/>
    <path d="M17 14 L15.5 13"/>
  </g>
  <!-- Head -->
  <circle cx="12" cy="7" r="2.8" fill="#cc2200"/>
  <!-- Head crest plume -->
  <g fill="#ffd700">
    <path d="M12 4.5 L11 1.5 L12 3 L13 1 L12.5 3.5 L14 2 L13 4 Z"/>
  </g>
  <!-- Eye - wise, fiery -->
  <circle cx="10.8" cy="6.8" r="0.9" fill="#ffd700"/>
  <circle cx="13.2" cy="6.8" r="0.9" fill="#ffd700"/>
  <circle cx="10.8" cy="6.8" r="0.4" fill="#1a0a00"/>
  <circle cx="13.2" cy="6.8" r="0.4" fill="#1a0a00"/>
  <!-- Eye glints -->
  <circle cx="11" cy="6.6" r="0.15" fill="#ffffff"/>
  <circle cx="13.4" cy="6.6" r="0.15" fill="#ffffff"/>
  <!-- Beak -->
  <path d="M11.5 8 L12 9.2 L12.5 8 Z" fill="#e0a020"/>
  <!-- Talons/feet -->
  <g stroke="#e0a020" stroke-width="0.5" stroke-linecap="round">
    <path d="M10.5 17 L10 18.5 M10 18.5 L9.5 19 M10 18.5 L10.5 19"/>
    <path d="M13.5 17 L14 18.5 M14 18.5 L13.5 19 M14 18.5 L14.5 19"/>
  </g>
  <!-- Fire ember particles -->
  <g fill="#ffd700" opacity="0.6">
    <circle cx="5" cy="5" r="0.4"/>
    <circle cx="19" cy="4" r="0.3"/>
    <circle cx="3" cy="12" r="0.3"/>
    <circle cx="21" cy="10" r="0.4"/>
    <circle cx="7" cy="3" r="0.25"/>
    <circle cx="17" cy="2" r="0.3"/>
  </g>
  <g fill="#ff4500" opacity="0.4">
    <circle cx="4" cy="8" r="0.3"/>
    <circle cx="20" cy="7" r="0.25"/>
  </g>
</svg>
