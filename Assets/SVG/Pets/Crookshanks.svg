<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <rect width="24" height="24" rx="3" fill="#3a2a2a"/>
  <!-- Fluffy body -->
  <ellipse cx="12" cy="14.5" rx="5" ry="4.5" fill="#e07020"/>
  <!-- Fluffy fur texture -->
  <g fill="#d06010" opacity="0.4">
    <circle cx="8" cy="13" r="1"/>
    <circle cx="10" cy="11.5" r="0.8"/>
    <circle cx="14" cy="11" r="0.9"/>
    <circle cx="16" cy="13" r="1"/>
    <circle cx="9" cy="16" r="0.7"/>
    <circle cx="15" cy="16" r="0.8"/>
    <circle cx="12" cy="18" r="0.7"/>
  </g>
  <!-- Squash face / head -->
  <circle cx="12" cy="8.5" r="3.8" fill="#e07020"/>
  <!-- Face fluff (wider, squashed look) -->
  <circle cx="9" cy="8.5" r="2" fill="#d06818" opacity="0.6"/>
  <circle cx="15" cy="8.5" r="2" fill="#d06818" opacity="0.6"/>
  <!-- Flat/squashed nose area -->
  <ellipse cx="12" cy="9.5" rx="2" ry="1.2" fill="#c05810"/>
  <!-- Ears - pointed -->
  <polygon points="9,5.5 7.5,2.5 10,5" fill="#e07020"/>
  <polygon points="15,5.5 16.5,2.5 14,5" fill="#e07020"/>
  <!-- Inner ears -->
  <polygon points="9,5.5 8.2,3.5 9.8,5.2" fill="#cc8888"/>
  <polygon points="15,5.5 15.8,3.5 14.2,5.2" fill="#cc8888"/>
  <!-- Eyes - large, knowing -->
  <circle cx="10.2" cy="7.8" r="1.3" fill="#ffaa00"/>
  <circle cx="13.8" cy="7.8" r="1.3" fill="#ffaa00"/>
  <!-- Pupils -->
  <ellipse cx="10.2" cy="7.8" rx="0.5" ry="1" fill="#1a1a1a"/>
  <ellipse cx="13.8" cy="7.8" rx="0.5" ry="1" fill="#1a1a1a"/>
  <!-- Eye glints -->
  <circle cx="10.5" cy="7.4" r="0.25" fill="#ffffff"/>
  <circle cx="14.1" cy="7.4" r="0.25" fill="#ffffff"/>
  <!-- Squash nose -->
  <ellipse cx="12" cy="9.5" rx="0.8" ry="0.5" fill="#cc6666"/>
  <!-- Mouth -->
  <path d="M11 10.2 Q12 10.8 13 10.2" stroke="#993333" stroke-width="0.4" fill="none"/>
  <!-- Whiskers -->
  <g stroke="#e8c8a0" stroke-width="0.3">
    <line x1="10" y1="9.5" x2="5" y2="8.5"/>
    <line x1="10" y1="10" x2="5" y2="10"/>
    <line x1="10" y1="10.5" x2="5.5" y2="11.5"/>
    <line x1="14" y1="9.5" x2="19" y2="8.5"/>
    <line x1="14" y1="10" x2="19" y2="10"/>
    <line x1="14" y1="10.5" x2="18.5" y2="11.5"/>
  </g>
  <!-- Bowlegs - front -->
  <path d="M9 18 Q8 19 8.5 20.5 L9 21" fill="#d06818" stroke="#d06818" stroke-width="1"/>
  <path d="M15 18 Q16 19 15.5 20.5 L15 21" fill="#d06818" stroke="#d06818" stroke-width="1"/>
  <!-- Paws -->
  <ellipse cx="9" cy="21" rx="1.2" ry="0.6" fill="#c05810"/>
  <ellipse cx="15" cy="21" rx="1.2" ry="0.6" fill="#c05810"/>
  <!-- Back legs hint -->
  <ellipse cx="8" cy="17.5" rx="1.5" ry="1" fill="#d06818"/>
  <ellipse cx="16" cy="17.5" rx="1.5" ry="1" fill="#d06818"/>
  <!-- Fluffy tail -->
  <path d="M17 15 Q20 13 21 10 Q22 8 21 7" stroke="#e07020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Tail fluff -->
  <circle cx="21" cy="7.5" r="1.2" fill="#e07020"/>
</svg>
