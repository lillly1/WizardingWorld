<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="patronusGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#b3d9ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a6bb5" stop-opacity="0.2"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="4" fill="#0d2a4a"/>
  <circle cx="16" cy="16" r="13" fill="url(#patronusGlow)"/>
  <!-- Stag silhouette -->
  <g fill="#c0d8f0" opacity="0.95">
    <!-- Body -->
    <ellipse cx="15" cy="18" rx="5" ry="3.5"/>
    <!-- Neck -->
    <path d="M18 16 L20 11 L19 10 L17 14 Z"/>
    <!-- Head -->
    <ellipse cx="20.5" cy="10" rx="2" ry="1.5"/>
    <!-- Antler left -->
    <path d="M19.5 8.5 L17 5 L18.5 5.5 M17.5 6 L16 4 L17 4.5" stroke="#c0d8f0" stroke-width="0.8" fill="none"/>
    <!-- Antler right -->
    <path d="M21 8.5 L23 5 L21.5 5.5 M22.5 6 L24 4 L23 4.5" stroke="#c0d8f0" stroke-width="0.8" fill="none"/>
    <!-- Front legs -->
    <rect x="12" y="20" width="1.2" height="5" rx="0.5"/>
    <rect x="14" y="20" width="1.2" height="4.5" rx="0.5"/>
    <!-- Back legs -->
    <rect x="17" y="20" width="1.2" height="4.5" rx="0.5"/>
    <rect x="19" y="20" width="1.2" height="5" rx="0.5"/>
    <!-- Tail -->
    <ellipse cx="10.5" cy="17" rx="1" ry="0.7"/>
  </g>
  <!-- Sparkle accents -->
  <circle cx="6" cy="6" r="0.6" fill="#ffffff" opacity="0.8"/>
  <circle cx="26" cy="8" r="0.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="8" cy="25" r="0.4" fill="#ffffff" opacity="0.6"/>
  <circle cx="25" cy="24" r="0.5" fill="#ffffff" opacity="0.7"/>
</svg>
