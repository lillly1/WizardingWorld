<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="voidCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#0a0a1a"/>
      <stop offset="85%" stop-color="#1a1a3a"/>
      <stop offset="100%" stop-color="#2a3050"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="4" fill="#0a0a1a"/>
  <!-- Dark void -->
  <circle cx="16" cy="16" r="8" fill="url(#voidCenter)"/>
  <!-- Cold blue edge ring -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#4a6a9a" stroke-width="0.8" opacity="0.7"/>
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#3a5a8a" stroke-width="0.4" opacity="0.4"/>
  <!-- Spiral into void -->
  <path d="M16 7 Q22 10 20 16 Q18 20 16 16 Q14 12 16 14" fill="none" stroke="#2a4a7a" stroke-width="0.6" opacity="0.5"/>
  <!-- Shadow hands reaching from edges -->
  <!-- Left hand -->
  <g fill="#1a1a2a" opacity="0.8">
    <path d="M2 20 Q4 18 6 19 L8 16 Q9 14 8 13 L6 14 Q4 16 3 18 Z"/>
    <path d="M8 16 L9 13 L8.5 12.5" stroke="#1a1a2a" stroke-width="0.8" fill="none"/>
    <path d="M7 17 L8.5 14.5" stroke="#1a1a2a" stroke-width="0.7" fill="none"/>
  </g>
  <!-- Right hand -->
  <g fill="#1a1a2a" opacity="0.8">
    <path d="M30 18 Q28 16 26 17 L24 14 Q23 12 24 11 L26 12 Q28 14 29 16 Z"/>
    <path d="M24 14 L23 11 L23.5 10.5" stroke="#1a1a2a" stroke-width="0.8" fill="none"/>
    <path d="M25 15 L23.5 12.5" stroke="#1a1a2a" stroke-width="0.7" fill="none"/>
  </g>
  <!-- Bottom reaching hand -->
  <g fill="#1a1a2a" opacity="0.6">
    <path d="M12 30 Q13 28 14 27 L15 24 L16 23 L17 24 L18 27 Q19 28 20 30 Z"/>
  </g>
  <!-- Cold mist wisps -->
  <path d="M4 8 Q8 6 12 8" stroke="#4a6a9a" stroke-width="0.4" fill="none" opacity="0.3"/>
  <path d="M20 6 Q24 4 28 6" stroke="#4a6a9a" stroke-width="0.4" fill="none" opacity="0.3"/>
</svg>
