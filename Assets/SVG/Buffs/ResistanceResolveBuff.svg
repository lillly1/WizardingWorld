    <circle cx="24" cy="10" r="0.5"/>
    <circle cx="7" cy="18" r="0.4"/>
    <circle cx="25" cy="18" r="0.4"/>
  </g>
  <!-- Shield edge glow -->
  <path d="M16 3 L27 8 L27 16 Q27 25 16 30 Q5 25 5 16 L5 8 Z" fill="none" stroke="#aaccff" stroke-width="0.3" opacity="0.4"/>
