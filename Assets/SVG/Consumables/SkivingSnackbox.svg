<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28">
  <defs>
    <linearGradient id="box-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#E07000"/>
    </linearGradient>
    <linearGradient id="box-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B3FA0"/>
      <stop offset="100%" stop-color="#6B2F80"/>
    </linearGradient>
    <linearGradient id="box-lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF9820"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
  </defs>
  <!-- Box body (orange and purple stripes) -->
  <rect x="4" y="8" width="20" height="16" rx="2" fill="url(#box-orange)" stroke="#B06000" stroke-width="0.5"/>
  <!-- Purple diagonal stripes -->
  <clipPath id="box-clip">
    <rect x="4" y="8" width="20" height="16" rx="2"/>
  </clipPath>
  <g clip-path="url(#box-clip)">
    <path d="M0,12 L8,8 L12,8 L0,16 Z" fill="url(#box-purple)" opacity="0.7"/>
    <path d="M8,24 L20,8 L24,8 L12,24 Z" fill="url(#box-purple)" opacity="0.7"/>
    <path d="M20,24 L32,8 L36,8 L24,24 Z" fill="url(#box-purple)" opacity="0.7"/>
  </g>
  <!-- Box lid -->
  <rect x="3" y="6" width="22" height="4" rx="1.5" fill="url(#box-lid)" stroke="#B06000" stroke-width="0.5"/>
  <!-- Lid purple stripe -->
  <clipPath id="lid-clip">
    <rect x="3" y="6" width="22" height="4" rx="1.5"/>
  </clipPath>
  <g clip-path="url(#lid-clip)">
    <path d="M5,10 L13,6 L17,6 L9,10 Z" fill="url(#box-purple)" opacity="0.6"/>
  </g>
  <!-- Big "W" logo (Weasley) -->
  <text x="14" y="19" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFD700" text-anchor="middle" stroke="#B08000" stroke-width="0.3">W</text>
  <!-- "W" glow -->
  <text x="14" y="19" font-family="sans-serif" font-size="9" font-weight="bold" fill="#FFE860" text-anchor="middle" opacity="0.3"/>
  <!-- Candy pieces peeking out from lid gap -->
  <circle cx="8" cy="7.5" r="1.2" fill="#FF4060" stroke="#CC3050" stroke-width="0.3"/>
  <circle cx="20" cy="7.5" r="1" fill="#50CC50" stroke="#40AA40" stroke-width="0.3"/>
  <rect x="12" y="5.5" width="3" height="1.5" rx="0.5" fill="#FFE040" stroke="#CCB030" stroke-width="0.2"/>
  <!-- Candy wrapper details -->
  <path d="M6.8,7 L6.2,6.5" stroke="#CC3050" stroke-width="0.3"/>
  <path d="M9.2,7 L9.8,6.5" stroke="#CC3050" stroke-width="0.3"/>
  <!-- Stars/sparkle decorations on box -->
  <path d="M7,13 L7.2,12.5 L7.7,12.3 L7.2,12.1 L7,11.6 L6.8,12.1 L6.3,12.3 L6.8,12.5 Z" fill="#FFD700" opacity="0.6"/>
  <path d="M21,15 L21.15,14.6 L21.55,14.5 L21.15,14.4 L21,14 L20.85,14.4 L20.45,14.5 L20.85,14.6 Z" fill="#FFD700" opacity="0.5"/>
  <path d="M7,21 L7.15,20.6 L7.55,20.5 L7.15,20.4 L7,20 L6.85,20.4 L6.45,20.5 L6.85,20.6 Z" fill="#FFD700" opacity="0.5"/>
  <!-- Box edge highlight -->
  <line x1="5" y1="9" x2="23" y2="9" stroke="#FFB040" stroke-width="0.3" opacity="0.4"/>
  <!-- Bottom edge -->
  <path d="M6,24 Q14,24.5 22,24" stroke="#904800" stroke-width="0.3" fill="none" opacity="0.3"/>
</svg>