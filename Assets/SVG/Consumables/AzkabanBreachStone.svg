<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28">
  <defs>
    <linearGradient id="dark-stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3A40"/>
      <stop offset="50%" stop-color="#2A2A30"/>
      <stop offset="100%" stop-color="#1A1A20"/>
    </linearGradient>
    <radialGradient id="ward-energy" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4080FF" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#2060DD" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1040AA" stop-opacity="0"/>
    </radialGradient>
    <filter id="ward-glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="crack-glow">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>
  <!-- Ominous blue ward energy background -->
  <ellipse cx="14" cy="14" rx="12" ry="12" fill="url(#ward-energy)"/>
  <!-- Stone body - irregular dark cracked shape -->
  <path d="M8,4 L13,3 L20,5 L23,10 L24,16 L22,22 L18,25 L12,26 L7,24 L4,18 L3,12 L5,7 Z" fill="url(#dark-stone)" stroke="#505058" stroke-width="0.5"/>
  <!-- Stone texture -->
  <path d="M10,6 L12,8 L9,10" stroke="#444448" stroke-width="0.3" fill="none" opacity="0.5"/>
  <path d="M18,7 L20,10 L17,11" stroke="#444448" stroke-width="0.3" fill="none" opacity="0.4"/>
  <path d="M7,18 L10,20 L8,22" stroke="#444448" stroke-width="0.3" fill="none" opacity="0.4"/>
  <path d="M19,19 L21,17 L22,20" stroke="#444448" stroke-width="0.3" fill="none" opacity="0.4"/>
  <!-- Major cracks with blue energy leaking -->
  <path d="M14,5 L13,9 L15,12 L12,16 L14,20 L12,24" stroke="#4080FF" stroke-width="0.8" fill="none" filter="url(#crack-glow)" opacity="0.8"/>
  <path d="M14,5 L13,9 L15,12 L12,16 L14,20 L12,24" stroke="#80B0FF" stroke-width="0.3" fill="none"/>
  <!-- Branch cracks -->
  <path d="M13,9 L10,8" stroke="#4080FF" stroke-width="0.5" fill="none" filter="url(#crack-glow)" opacity="0.6"/>
  <path d="M15,12 L18,11" stroke="#4080FF" stroke-width="0.5" fill="none" filter="url(#crack-glow)" opacity="0.6"/>
  <path d="M12,16 L8,17" stroke="#4080FF" stroke-width="0.5" fill="none" filter="url(#crack-glow)" opacity="0.5"/>
  <path d="M14,20 L18,21" stroke="#4080FF" stroke-width="0.5" fill="none" filter="url(#crack-glow)" opacity="0.5"/>
  <!-- Smaller surface cracks -->
  <path d="M10,8 L8,10" stroke="#3060CC" stroke-width="0.3" fill="none" opacity="0.4"/>
  <path d="M18,11 L20,14" stroke="#3060CC" stroke-width="0.3" fill="none" opacity="0.4"/>
  <path d="M8,17 L6,15" stroke="#3060CC" stroke-width="0.3" fill="none" opacity="0.3"/>
  <!-- Ward energy leaking out of cracks -->
  <circle cx="13" cy="9" r="1.5" fill="#4080FF" opacity="0.15" filter="url(#ward-glow)"/>
  <circle cx="15" cy="12" r="1.2" fill="#4080FF" opacity="0.12" filter="url(#ward-glow)"/>
  <circle cx="12" cy="16" r="1.3" fill="#4080FF" opacity="0.15" filter="url(#ward-glow)"/>
  <circle cx="14" cy="20" r="1" fill="#4080FF" opacity="0.1" filter="url(#ward-glow)"/>
  <!-- Blue energy particles escaping -->
  <circle cx="10" cy="6" r="0.4" fill="#6090FF" opacity="0.5"/>
  <circle cx="19" cy="9" r="0.3" fill="#6090FF" opacity="0.4"/>
  <circle cx="7" cy="15" r="0.35" fill="#6090FF" opacity="0.35"/>
  <circle cx="20" cy="18" r="0.3" fill="#6090FF" opacity="0.3"/>
  <circle cx="16" cy="24" r="0.25" fill="#6090FF" opacity="0.3"/>
  <!-- Ominous rune fragments on stone surface -->
  <path d="M10,13 L11,11 L12,13" stroke="#5070AA" stroke-width="0.4" fill="none" opacity="0.4"/>
  <path d="M16,15 L17,13 L18,15 L17,17 Z" stroke="#5070AA" stroke-width="0.3" fill="none" opacity="0.35"/>
</svg>