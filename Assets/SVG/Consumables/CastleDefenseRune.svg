<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28">
  <defs>
    <linearGradient id="rune-stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A8078"/>
      <stop offset="50%" stop-color="#6A6058"/>
      <stop offset="100%" stop-color="#504840"/>
    </linearGradient>
    <linearGradient id="gold-sigil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <radialGradient id="sigil-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="rune-glow-f">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Golden glow behind -->
  <ellipse cx="14" cy="14" rx="10" ry="10" fill="url(#sigil-glow)"/>
  <!-- Stone tablet body - rectangular with worn edges -->
  <path d="M6,3 L22,3 Q24,3 24,5 L24,23 Q24,25 22,25 L6,25 Q4,25 4,23 L4,5 Q4,3 6,3 Z" fill="url(#rune-stone)" stroke="#7A7068" stroke-width="0.5"/>
  <!-- Stone texture/weathering -->
  <path d="M6,5 Q8,6 10,5" stroke="#787068" stroke-width="0.3" fill="none" opacity="0.4"/>
  <path d="M18,4 Q20,5 22,4" stroke="#787068" stroke-width="0.3" fill="none" opacity="0.3"/>
  <path d="M5,15 Q6,16 5,17" stroke="#585048" stroke-width="0.3" fill="none" opacity="0.4"/>
  <path d="M23,12 Q22,13 23,14" stroke="#585048" stroke-width="0.3" fill="none" opacity="0.4"/>
  <path d="M7,23 Q9,24 11,23" stroke="#585048" stroke-width="0.3" fill="none" opacity="0.3"/>
  <!-- Chipped edges -->
  <path d="M7,3 L7.5,4 L8,3" fill="#585048" opacity="0.3"/>
  <path d="M19,25 L19.5,24 L20,25" fill="#585048" opacity="0.3"/>
  <!-- Protective sigil (shield shape with inner symbol) -->
  <!-- Outer shield -->
  <path d="M14,6 L21,9 L21,16 Q21,21 14,24 Q7,21 7,16 L7,9 Z" fill="none" stroke="url(#gold-sigil)" stroke-width="1" filter="url(#rune-glow-f)"/>
  <!-- Inner shield -->
  <path d="M14,8 L19,10.5 L19,15.5 Q19,19.5 14,22 Q9,19.5 9,15.5 L9,10.5 Z" fill="none" stroke="url(#gold-sigil)" stroke-width="0.5" opacity="0.7"/>
  <!-- Central protection rune (cross with circles) -->
  <line x1="14" y1="10" x2="14" y2="20" stroke="url(#gold-sigil)" stroke-width="0.7" filter="url(#rune-glow-f)"/>
  <line x1="10" y1="15" x2="18" y2="15" stroke="url(#gold-sigil)" stroke-width="0.7" filter="url(#rune-glow-f)"/>
  <!-- Rune circles at cross points -->
  <circle cx="14" cy="15" r="2" fill="none" stroke="url(#gold-sigil)" stroke-width="0.5" filter="url(#rune-glow-f)"/>
  <circle cx="14" cy="15" r="0.8" fill="#FFD700" opacity="0.4"/>
  <!-- Corner rune marks -->
  <circle cx="14" cy="10.5" r="0.5" fill="#DAA520" opacity="0.5"/>
  <circle cx="14" cy="19.5" r="0.5" fill="#DAA520" opacity="0.5"/>
  <circle cx="10.5" cy="15" r="0.5" fill="#DAA520" opacity="0.5"/>
  <circle cx="17.5" cy="15" r="0.5" fill="#DAA520" opacity="0.5"/>
  <!-- Diagonal rune lines -->
  <line x1="11" y1="12" x2="13" y2="14" stroke="#DAA520" stroke-width="0.3" opacity="0.5"/>
  <line x1="17" y1="12" x2="15" y2="14" stroke="#DAA520" stroke-width="0.3" opacity="0.5"/>
  <line x1="11" y1="18" x2="13" y2="16" stroke="#DAA520" stroke-width="0.3" opacity="0.5"/>
  <line x1="17" y1="18" x2="15" y2="16" stroke="#DAA520" stroke-width="0.3" opacity="0.5"/>
  <!-- Golden light particles -->
  <circle cx="10" cy="10" r="0.3" fill="#FFE860" opacity="0.4"/>
  <circle cx="18" cy="10" r="0.25" fill="#FFE860" opacity="0.35"/>
  <circle cx="9" cy="19" r="0.2" fill="#FFE860" opacity="0.3"/>
  <circle cx="19" cy="19" r="0.25" fill="#FFE860" opacity="0.3"/>
</svg>