<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="silverAmulet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d0d0e0"/>
      <stop offset="40%" stop-color="#a8a8c0"/>
      <stop offset="100%" stop-color="#888899"/>
    </linearGradient>
    <radialGradient id="blueGem" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#88ccff"/>
      <stop offset="40%" stop-color="#4488dd"/>
      <stop offset="100%" stop-color="#2255aa"/>
    </radialGradient>
    <radialGradient id="gemGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#88bbff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4477cc" stop-opacity="0"/>
    </radialGradient>
    <filter id="amuletGlow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Chain -->
  <path d="M8 3 Q12 6 16 7 Q20 6 24 3" fill="none" stroke="#a8a8b8" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M9 3.5 Q12 6.5 16 7.5 Q20 6.5 23 3.5" fill="none" stroke="#c0c0d0" stroke-width="0.3"/>
  <!-- Gem glow -->
  <circle cx="16" cy="18" r="8" fill="url(#gemGlow)"/>
  <!-- Amulet body (circular medallion) -->
  <circle cx="16" cy="18" r="8" fill="url(#silverAmulet)" stroke="#777788" stroke-width="0.8"/>
  <!-- Inner ring -->
  <circle cx="16" cy="18" r="6.5" fill="none" stroke="#bbbccc" stroke-width="0.5"/>
  <!-- Protection rune (Algiz-like) -->
  <path d="M16 12 L16 24" stroke="#9999aa" stroke-width="1" stroke-linecap="round"/>
  <path d="M16 14 L12.5 11" stroke="#9999aa" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M16 14 L19.5 11" stroke="#9999aa" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Additional rune marks -->
  <path d="M13 20 L12 22" stroke="#9999aa" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M19 20 L20 22" stroke="#9999aa" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Blue gem center -->
  <circle cx="16" cy="18" r="3" fill="url(#blueGem)" stroke="#2255aa" stroke-width="0.5" filter="url(#amuletGlow)"/>
  <!-- Gem facet highlights -->
  <ellipse cx="15" cy="17" rx="1.2" ry="0.8" fill="white" opacity="0.35" transform="rotate(-20 15 17)"/>
  <circle cx="16.5" cy="19" r="0.4" fill="white" opacity="0.2"/>
  <!-- Gem inner light -->
  <circle cx="15.5" cy="17.5" r="0.6" fill="white" opacity="0.3"/>
  <!-- Edge decorations -->
  <circle cx="16" cy="10" r="0.6" fill="#c0c0d0" stroke="#999" stroke-width="0.2"/>
  <circle cx="16" cy="26" r="0.6" fill="#c0c0d0" stroke="#999" stroke-width="0.2"/>
  <circle cx="8" cy="18" r="0.6" fill="#c0c0d0" stroke="#999" stroke-width="0.2"/>
  <circle cx="24" cy="18" r="0.6" fill="#c0c0d0" stroke="#999" stroke-width="0.2"/>
  <!-- Bail (connection to chain) -->
  <ellipse cx="16" cy="9" rx="2" ry="1.5" fill="none" stroke="url(#silverAmulet)" stroke-width="1.2"/>
</svg>