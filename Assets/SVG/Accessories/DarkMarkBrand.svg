<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="darkAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff44" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#004400" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skullGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a2a"/>
      <stop offset="50%" stop-color="#1a2a1a"/>
      <stop offset="100%" stop-color="#0a150a"/>
    </linearGradient>
    <filter id="ominousGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background aura -->
  <circle cx="16" cy="16" r="15" fill="url(#darkAura)"/>
  <!-- Skull -->
  <ellipse cx="16" cy="12" rx="6" ry="5.5" fill="url(#skullGrad)" stroke="#00cc33" stroke-width="0.5" filter="url(#ominousGlow)"/>
  <!-- Skull top detail -->
  <path d="M10.5 11 Q13 6 16 6.5 Q19 6 21.5 11" fill="none" stroke="#00aa22" stroke-width="0.3"/>
  <!-- Eye sockets -->
  <ellipse cx="13.5" cy="11.5" rx="1.8" ry="2" fill="#001100"/>
  <ellipse cx="18.5" cy="11.5" rx="1.8" ry="2" fill="#001100"/>
  <!-- Green glow in eyes -->
  <ellipse cx="13.5" cy="11.5" rx="0.8" ry="1" fill="#00ff44" opacity="0.6"/>
  <ellipse cx="18.5" cy="11.5" rx="0.8" ry="1" fill="#00ff44" opacity="0.6"/>
  <!-- Nose cavity -->
  <path d="M15 14 L16 15 L17 14" fill="#001100" stroke="none"/>
  <!-- Jaw / Teeth -->
  <path d="M12 16 L12.5 17 L13.5 16.5 L14.5 17 L15.5 16.5 L16.5 17 L17.5 16.5 L18.5 17 L19.5 16.5 L20 17" fill="none" stroke="url(#skullGrad)" stroke-width="0.8"/>
  <!-- Serpent tongue emerging from mouth -->
  <path d="M16 17 Q14 20 16 22 Q18 24 15 27 Q14.5 28 14 27.5" fill="none" stroke="#00cc33" stroke-width="1.5" stroke-linecap="round" filter="url(#ominousGlow)"/>
  <path d="M16 17 Q18 20 16 22 Q14 24 17 27 Q17.5 28 18 27.5" fill="none" stroke="#00aa22" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- Serpent tongue fork -->
  <path d="M14 27.5 L13 28.5 M14 27.5 L14.5 28.8" stroke="#00cc33" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Serpent scales (dots along body) -->
  <circle cx="15.2" cy="20" r="0.3" fill="#00ff44" opacity="0.4"/>
  <circle cx="16.8" cy="23" r="0.3" fill="#00ff44" opacity="0.4"/>
  <circle cx="15.5" cy="25" r="0.3" fill="#00ff44" opacity="0.4"/>
</svg>