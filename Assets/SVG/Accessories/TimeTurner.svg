<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="goldRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe4b5"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e0d0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c8b898" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="timeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffdd66" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffcc00" stop-opacity="0"/>
    </radialGradient>
    <filter id="goldShine">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Chain -->
  <path d="M10 3 Q13 5 16 5.5 Q19 5 22 3" fill="none" stroke="#daa520" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Time glow -->
  <circle cx="16" cy="16" r="12" fill="url(#timeGlow)"/>
  <!-- Outer gyroscope ring -->
  <ellipse cx="16" cy="16" rx="12" ry="12" fill="none" stroke="url(#goldRing)" stroke-width="1.5"/>
  <!-- Middle gyroscope ring (tilted) -->
  <ellipse cx="16" cy="16" rx="10" ry="6" fill="none" stroke="url(#goldRing)" stroke-width="1.2" transform="rotate(-30 16 16)"/>
  <!-- Inner gyroscope ring (tilted other way) -->
  <ellipse cx="16" cy="16" rx="9" ry="5" fill="none" stroke="url(#goldRing)" stroke-width="1" transform="rotate(30 16 16)"/>
  <!-- Hourglass top bulb -->
  <path d="M13 10 Q13 9 14 9 L18 9 Q19 9 19 10 L17 15.5 Q16 16 15 15.5 Z" fill="url(#glassGrad)" stroke="#b8860b" stroke-width="0.5"/>
  <!-- Hourglass bottom bulb -->
  <path d="M13 22 Q13 23 14 23 L18 23 Q19 23 19 22 L17 16.5 Q16 16 15 16.5 Z" fill="url(#glassGrad)" stroke="#b8860b" stroke-width="0.5"/>
  <!-- Sand in top -->
  <path d="M14.5 10 L17.5 10 L17 12 Q16 13 15 12 Z" fill="url(#sandGrad)" opacity="0.8"/>
  <!-- Falling sand stream -->
  <line x1="16" y1="14" x2="16" y2="18" stroke="#daa520" stroke-width="0.5" opacity="0.7"/>
  <!-- Sand in bottom -->
  <path d="M14.5 22.5 L17.5 22.5 L17 20 Q16 19 15 20 Z" fill="url(#sandGrad)" opacity="0.8"/>
  <!-- Top and bottom caps -->
  <rect x="13.5" y="8.5" width="5" height="1" rx="0.3" fill="url(#goldRing)"/>
  <rect x="13.5" y="22.5" width="5" height="1" rx="0.3" fill="url(#goldRing)"/>
  <!-- Tiny hour markings on outer ring -->
  <circle cx="16" cy="4.2" r="0.4" fill="#ffd700" filter="url(#goldShine)"/>
  <circle cx="16" cy="27.8" r="0.4" fill="#ffd700" filter="url(#goldShine)"/>
  <circle cx="4.2" cy="16" r="0.4" fill="#ffd700" filter="url(#goldShine)"/>
  <circle cx="27.8" cy="16" r="0.4" fill="#ffd700" filter="url(#goldShine)"/>
</svg>