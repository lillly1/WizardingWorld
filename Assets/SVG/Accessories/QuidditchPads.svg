<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="leather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0703c"/>
      <stop offset="40%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#6B4226"/>
    </linearGradient>
    <linearGradient id="strapColor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a4e2c"/>
      <stop offset="100%" stop-color="#5a3218"/>
    </linearGradient>
    <linearGradient id="padInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8945a"/>
      <stop offset="100%" stop-color="#a07040"/>
    </linearGradient>
  </defs>
  <!-- Left arm guard -->
  <path d="M3 6 L12 6 Q14 6 14 8 L14 18 Q14 20 12 20 L3 20 Q2 20 2 18 L2 8 Q2 6 3 6 Z" fill="url(#leather)" stroke="#4a2d1a" stroke-width="0.5"/>
  <!-- Left pad stitching -->
  <path d="M4 8 L12 8" fill="none" stroke="#5a3218" stroke-width="0.3" stroke-dasharray="1,0.5"/>
  <path d="M4 12 L12 12" fill="none" stroke="#5a3218" stroke-width="0.3" stroke-dasharray="1,0.5"/>
  <path d="M4 16 L12 16" fill="none" stroke="#5a3218" stroke-width="0.3" stroke-dasharray="1,0.5"/>
  <!-- Left pad raised center section -->
  <rect x="4" y="9" width="8" height="5" rx="1" fill="url(#padInner)" stroke="#8B5E3C" stroke-width="0.3"/>
  <!-- Left straps -->
  <rect x="1" y="7" width="14" height="1.5" rx="0.5" fill="url(#strapColor)" stroke="#4a2d1a" stroke-width="0.3"/>
  <rect x="1" y="17" width="14" height="1.5" rx="0.5" fill="url(#strapColor)" stroke="#4a2d1a" stroke-width="0.3"/>
  <!-- Left buckles -->
  <rect x="0.5" y="7" width="1.5" height="1.5" rx="0.2" fill="#c8a030" stroke="#8B6914" stroke-width="0.3"/>
  <rect x="0.5" y="17" width="1.5" height="1.5" rx="0.2" fill="#c8a030" stroke="#8B6914" stroke-width="0.3"/>
  <!-- Right leg guard -->
  <path d="M19 12 L28 12 Q30 12 30 14 L30 28 Q30 30 28 30 L19 30 Q18 30 18 28 L18 14 Q18 12 19 12 Z" fill="url(#leather)" stroke="#4a2d1a" stroke-width="0.5"/>
  <!-- Right pad stitching -->
  <path d="M20 14.5 L28 14.5" fill="none" stroke="#5a3218" stroke-width="0.3" stroke-dasharray="1,0.5"/>
  <path d="M20 19 L28 19" fill="none" stroke="#5a3218" stroke-width="0.3" stroke-dasharray="1,0.5"/>
  <path d="M20 23.5 L28 23.5" fill="none" stroke="#5a3218" stroke-width="0.3" stroke-dasharray="1,0.5"/>
  <!-- Right pad raised center -->
  <rect x="20" y="15.5" width="8" height="6" rx="1" fill="url(#padInner)" stroke="#8B5E3C" stroke-width="0.3"/>
  <!-- Right straps -->
  <rect x="17" y="13.5" width="14" height="1.5" rx="0.5" fill="url(#strapColor)" stroke="#4a2d1a" stroke-width="0.3"/>
  <rect x="17" y="25" width="14" height="1.5" rx="0.5" fill="url(#strapColor)" stroke="#4a2d1a" stroke-width="0.3"/>
  <!-- Right buckles -->
  <rect x="17" y="13.5" width="1.5" height="1.5" rx="0.2" fill="#c8a030" stroke="#8B6914" stroke-width="0.3"/>
  <rect x="17" y="25" width="1.5" height="1.5" rx="0.2" fill="#c8a030" stroke="#8B6914" stroke-width="0.3"/>
  <!-- Leather texture highlights -->
  <line x1="5" y1="6.5" x2="5" y2="19.5" stroke="#b8804a" stroke-width="0.3" opacity="0.4"/>
  <line x1="22" y1="12.5" x2="22" y2="29.5" stroke="#b8804a" stroke-width="0.3" opacity="0.4"/>
</svg>