<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="chocolate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a4a2a"/>
      <stop offset="50%" stop-color="#5a3218"/>
      <stop offset="100%" stop-color="#3a200c"/>
    </linearGradient>
    <radialGradient id="chocoHighlight" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#9a6a3a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7a4a2a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldFoil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffee88" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#daa520" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="16" cy="27" rx="8" ry="2" fill="#2a1508" opacity="0.3"/>
  <!-- Back legs -->
  <ellipse cx="10" cy="24" rx="3.5" ry="2.5" fill="url(#chocolate)" stroke="#3a200c" stroke-width="0.3"/>
  <ellipse cx="22" cy="24" rx="3.5" ry="2.5" fill="url(#chocolate)" stroke="#3a200c" stroke-width="0.3"/>
  <!-- Frog body -->
  <ellipse cx="16" cy="18" rx="8" ry="6" fill="url(#chocolate)" stroke="#3a200c" stroke-width="0.5"/>
  <!-- Chocolate highlight -->
  <ellipse cx="14" cy="16" rx="5" ry="3.5" fill="url(#chocoHighlight)"/>
  <!-- Head bump -->
  <ellipse cx="16" cy="12" rx="6" ry="4" fill="url(#chocolate)" stroke="#3a200c" stroke-width="0.3"/>
  <!-- Front legs -->
  <ellipse cx="10" cy="20" rx="2.5" ry="1.5" fill="url(#chocolate)" stroke="#3a200c" stroke-width="0.3" transform="rotate(-15 10 20)"/>
  <ellipse cx="22" cy="20" rx="2.5" ry="1.5" fill="url(#chocolate)" stroke="#3a200c" stroke-width="0.3" transform="rotate(15 22 20)"/>
  <!-- Eyes (small bumps) -->
  <circle cx="13.5" cy="10.5" r="1.5" fill="#6a3a1a" stroke="#3a200c" stroke-width="0.3"/>
  <circle cx="18.5" cy="10.5" r="1.5" fill="#6a3a1a" stroke="#3a200c" stroke-width="0.3"/>
  <!-- Eye highlights -->
  <circle cx="13" cy="10" r="0.4" fill="#9a6a3a" opacity="0.6"/>
  <circle cx="18" cy="10" r="0.4" fill="#9a6a3a" opacity="0.6"/>
  <!-- Mouth line -->
  <path d="M13 13.5 Q16 15 19 13.5" fill="none" stroke="#3a200c" stroke-width="0.4"/>
  <!-- Gold foil glints -->
  <path d="M12 15 L14 14 L13 16 Z" fill="url(#goldFoil)" opacity="0.5"/>
  <path d="M19 17 L21 16 L20 18 Z" fill="url(#goldFoil)" opacity="0.4"/>
  <path d="M15 20 L16 19 L16.5 20.5 Z" fill="url(#goldFoil)" opacity="0.3"/>
  <!-- Chocolate sheen highlight -->
  <ellipse cx="14" cy="14" rx="3" ry="1.5" fill="white" opacity="0.08" transform="rotate(-10 14 14)"/>
  <!-- Surface texture lines -->
  <path d="M10 17 Q12 16 14 17" fill="none" stroke="#4a2810" stroke-width="0.2" opacity="0.4"/>
  <path d="M18 17 Q20 16 22 17" fill="none" stroke="#4a2810" stroke-width="0.2" opacity="0.4"/>
</svg>