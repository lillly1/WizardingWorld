<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="heavyGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#daa520"/>
      <stop offset="30%" stop-color="#b8860b"/>
      <stop offset="70%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6B4F0A"/>
    </linearGradient>
    <radialGradient id="darkStone" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="60%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="darkAura2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#330033" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#1a001a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="darkGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark aura -->
  <circle cx="16" cy="16" r="14" fill="url(#darkAura2)"/>
  <!-- Ring band (thick, heavy) -->
  <ellipse cx="16" cy="18" rx="9" ry="6" fill="none" stroke="url(#heavyGold)" stroke-width="4"/>
  <!-- Ring band inner highlight -->
  <ellipse cx="16" cy="18" rx="9" ry="6" fill="none" stroke="#c8a030" stroke-width="0.5" opacity="0.4"/>
  <!-- Ring band outer shadow -->
  <ellipse cx="16" cy="18.5" rx="9.5" ry="6.5" fill="none" stroke="#4a3008" stroke-width="0.5" opacity="0.5"/>
  <!-- Setting prongs -->
  <path d="M12 11 L13.5 13.5" stroke="#b8860b" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M20 11 L18.5 13.5" stroke="#b8860b" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M11 13 L13 14" stroke="#b8860b" stroke-width="1" stroke-linecap="round"/>
  <path d="M21 13 L19 14" stroke="#b8860b" stroke-width="1" stroke-linecap="round"/>
  <!-- Black stone (Resurrection Stone) -->
  <rect x="12.5" y="9" width="7" height="7" rx="0.5" fill="url(#darkStone)" stroke="#333" stroke-width="0.5" transform="rotate(45 16 12.5)" filter="url(#darkGlow)"/>
  <!-- Crack in stone -->
  <path d="M14.5 10.5 L16 13 L17.5 11 L16.5 14 L18 15" fill="none" stroke="#444" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Deathly Hallows symbol etched faintly -->
  <polygon points="16,9.5 13.5,14.5 18.5,14.5" fill="none" stroke="#555" stroke-width="0.3" opacity="0.5"/>
  <circle cx="16" cy="12.5" r="1.5" fill="none" stroke="#555" stroke-width="0.3" opacity="0.5"/>
  <line x1="16" y1="9.5" x2="16" y2="14.5" stroke="#555" stroke-width="0.3" opacity="0.5"/>
  <!-- Dark wisps -->
  <path d="M10 9 Q8 7 9 5" fill="none" stroke="#330033" stroke-width="0.5" opacity="0.4"/>
  <path d="M22 9 Q24 7 23 5" fill="none" stroke="#330033" stroke-width="0.5" opacity="0.4"/>
  <!-- Dull gold texture on band -->
  <ellipse cx="8" cy="17" rx="0.5" ry="2" fill="#c8a030" opacity="0.3"/>
  <ellipse cx="24" cy="17" rx="0.5" ry="2" fill="#c8a030" opacity="0.3"/>
</svg>