<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="silverBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e8f0"/>
      <stop offset="30%" stop-color="#c0c0d0"/>
      <stop offset="60%" stop-color="#d0d0e0"/>
      <stop offset="100%" stop-color="#a8a8b8"/>
    </linearGradient>
    <linearGradient id="silverBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0d0e0"/>
      <stop offset="100%" stop-color="#888899"/>
    </linearGradient>
    <filter id="polish">
      <feGaussianBlur stdDeviation="0.3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Pin backing -->
  <line x1="16" y1="3" x2="16" y2="5" stroke="#999" stroke-width="0.8"/>
  <circle cx="16" cy="3" r="0.8" fill="#aaa"/>
  <!-- Shield shape -->
  <path d="M16 5 L24 8 L24 17 Q24 24 16 28 Q8 24 8 17 L8 8 Z" fill="url(#silverBadge)" stroke="url(#silverBorder)" stroke-width="1"/>
  <!-- Inner shield border -->
  <path d="M16 7 L22 9.5 L22 17 Q22 22.5 16 26 Q10 22.5 10 17 L10 9.5 Z" fill="none" stroke="#bbbccc" stroke-width="0.5"/>
  <!-- Decorative inner field -->
  <path d="M16 8.5 L21 10.5 L21 17 Q21 21.5 16 24.5 Q11 21.5 11 17 L11 10.5 Z" fill="#d8d8e8" stroke="#aaaabc" stroke-width="0.3"/>
  <!-- Large "P" letter -->
  <text x="11.5" y="21" font-size="14" font-weight="bold" fill="#7777aa" font-family="serif" filter="url(#polish)">P</text>
  <!-- P highlight -->
  <text x="11.2" y="20.7" font-size="14" font-weight="bold" fill="#ccccee" font-family="serif" opacity="0.3">P</text>
  <!-- Top decorative element -->
  <circle cx="16" cy="9.5" r="1.2" fill="#bbbccc" stroke="#999aaa" stroke-width="0.3"/>
  <circle cx="16" cy="9.5" r="0.5" fill="#dddde8"/>
  <!-- Corner decorations -->
  <circle cx="10.5" cy="10.5" r="0.5" fill="#ccccdd"/>
  <circle cx="21.5" cy="10.5" r="0.5" fill="#ccccdd"/>
  <!-- Polish highlight -->
  <path d="M12 9 Q14 8 16 9 Q14 10 12 9 Z" fill="white" opacity="0.2"/>
  <ellipse cx="13" cy="14" rx="1.5" ry="3" fill="white" opacity="0.1" transform="rotate(-10 13 14)"/>
</svg>