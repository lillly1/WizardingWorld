<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="parchment" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="50%" stop-color="#e8d5a8"/>
      <stop offset="100%" stop-color="#d4c090"/>
    </linearGradient>
    <linearGradient id="parchmentShadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8b078"/>
      <stop offset="100%" stop-color="#e0cc98"/>
    </linearGradient>
    <radialGradient id="waxSeal" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#dd3333"/>
      <stop offset="60%" stop-color="#aa1111"/>
      <stop offset="100%" stop-color="#880000"/>
    </radialGradient>
  </defs>
  <!-- Rolled parchment body -->
  <path d="M8 5 L24 5 L24 27 L8 27 Z" fill="url(#parchment)" stroke="#b8a070" stroke-width="0.5"/>
  <!-- Top rolled edge -->
  <ellipse cx="16" cy="5" rx="8.5" ry="2" fill="url(#parchmentShadow)" stroke="#b8a070" stroke-width="0.5"/>
  <ellipse cx="16" cy="5" rx="8.5" ry="1.5" fill="url(#parchment)"/>
  <!-- Bottom curl (partially rolled) -->
  <path d="M8 27 Q8 29 10 29 L22 29 Q24 29 24 27" fill="url(#parchmentShadow)" stroke="#b8a070" stroke-width="0.3"/>
  <ellipse cx="16" cy="27.5" rx="7.5" ry="1.5" fill="url(#parchment)" stroke="#b8a070" stroke-width="0.3"/>
  <!-- Text lines (representing certificate content) -->
  <line x1="11" y1="9" x2="21" y2="9" stroke="#8a7550" stroke-width="0.4" opacity="0.5"/>
  <line x1="12" y1="11" x2="20" y2="11" stroke="#8a7550" stroke-width="0.3" opacity="0.4"/>
  <line x1="11" y1="13" x2="21" y2="13" stroke="#8a7550" stroke-width="0.3" opacity="0.4"/>
  <line x1="12.5" y1="15" x2="19.5" y2="15" stroke="#8a7550" stroke-width="0.3" opacity="0.4"/>
  <line x1="11" y1="17" x2="21" y2="17" stroke="#8a7550" stroke-width="0.3" opacity="0.4"/>
  <!-- OWL header text -->
  <text x="12.5" y="8" font-size="2.5" fill="#6a5530" font-family="serif" font-weight="bold">O.W.L.</text>
  <!-- Decorative border -->
  <rect x="9.5" y="6.5" width="13" height="14" rx="0.5" fill="none" stroke="#c8a868" stroke-width="0.3" stroke-dasharray="0.8,0.5"/>
  <!-- Wax seal at bottom -->
  <circle cx="16" cy="23" r="3" fill="url(#waxSeal)" stroke="#660000" stroke-width="0.5"/>
  <!-- Seal impression (Ministry of Magic style "M") -->
  <text x="14.5" y="24.5" font-size="4" font-weight="bold" fill="#cc4444" font-family="serif">M</text>
  <!-- Seal texture -->
  <circle cx="16" cy="23" r="2.2" fill="none" stroke="#cc3333" stroke-width="0.3"/>
  <!-- Ribbon tails from seal -->
  <path d="M14 25.5 Q13 27 12 28.5" fill="none" stroke="#aa1111" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M18 25.5 Q19 27 20 28.5" fill="none" stroke="#aa1111" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Parchment aging spots -->
  <circle cx="10" cy="10" r="0.3" fill="#c8a868" opacity="0.3"/>
  <circle cx="22" cy="16" r="0.4" fill="#c8a868" opacity="0.2"/>
  <circle cx="11" cy="22" r="0.3" fill="#c8a868" opacity="0.3"/>
</svg>