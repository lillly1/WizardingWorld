<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="silverCloak" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0f0" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#c0c0d8" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#d0d0e8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#b0b0c8" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="shimmer1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cloakGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d8d8f0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c0c0dd" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Ambient glow -->
  <ellipse cx="16" cy="16" rx="14" ry="14" fill="url(#cloakGlow)"/>
  <!-- Cloak shape -->
  <path d="M16 3 Q11 3 9 6 L7 14 Q5 22 8 28 L12 29 Q14 27 16 29 Q18 27 20 29 L24 28 Q27 22 25 14 L23 6 Q21 3 16 3 Z" fill="url(#silverCloak)" stroke="#9999bb" stroke-width="0.5" opacity="0.8" filter="url(#softGlow)"/>
  <!-- Hood shape -->
  <path d="M16 3 Q12 3 10 5.5 Q11 8 16 8 Q21 8 22 5.5 Q20 3 16 3 Z" fill="#c8c8e0" opacity="0.7" stroke="#aaaacc" stroke-width="0.3"/>
  <!-- Fabric folds -->
  <path d="M12 10 Q13 16 11 24" fill="none" stroke="#aaaacc" stroke-width="0.4" opacity="0.5"/>
  <path d="M20 10 Q19 16 21 24" fill="none" stroke="#aaaacc" stroke-width="0.4" opacity="0.5"/>
  <path d="M16 8 Q15 15 16 26" fill="none" stroke="#bbbbdd" stroke-width="0.3" opacity="0.4"/>
  <!-- Shimmer streaks -->
  <path d="M10 12 L13 18" stroke="url(#shimmer1)" stroke-width="1.5" opacity="0.6"/>
  <path d="M19 9 L22 15" stroke="url(#shimmer1)" stroke-width="1.2" opacity="0.5"/>
  <path d="M14 20 L12 26" stroke="url(#shimmer1)" stroke-width="1" opacity="0.4"/>
  <path d="M20 18 L22 24" stroke="url(#shimmer1)" stroke-width="1" opacity="0.4"/>
  <!-- Sparkle dots for shimmer effect -->
  <circle cx="12" cy="11" r="0.5" fill="white" opacity="0.6"/>
  <circle cx="20" cy="14" r="0.4" fill="white" opacity="0.5"/>
  <circle cx="14" cy="22" r="0.4" fill="white" opacity="0.5"/>
  <circle cx="18" cy="19" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="10" cy="18" r="0.3" fill="white" opacity="0.5"/>
  <circle cx="22" cy="21" r="0.3" fill="white" opacity="0.4"/>
  <!-- Semi-transparent effect: dashed bottom edge suggesting fading -->
  <path d="M8 28 L12 29 Q14 27 16 29 Q18 27 20 29 L24 28" fill="none" stroke="#9999bb" stroke-width="0.4" stroke-dasharray="1,1" opacity="0.5"/>
</svg>