<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="tearCore" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ffee88"/>
      <stop offset="60%" stop-color="#ffaa33"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </radialGradient>
    <radialGradient id="warmRadiance" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffdd66" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ff8833" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#cc3300" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="innerLight" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffee88" stop-opacity="0"/>
    </radialGradient>
    <filter id="tearGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow2">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Warm radiance background -->
  <circle cx="16" cy="16" r="14" fill="url(#warmRadiance)"/>
  <!-- Outer glow ring -->
  <ellipse cx="16" cy="15" rx="9" ry="11" fill="none" stroke="#ffaa44" stroke-width="0.5" opacity="0.3" filter="url(#tearGlow)"/>
  <!-- Teardrop shape -->
  <path d="M16 4 Q10 14 10 18 Q10 24 16 26 Q22 24 22 18 Q22 14 16 4 Z" fill="url(#tearCore)" stroke="#cc6600" stroke-width="0.5" filter="url(#tearGlow)"/>
  <!-- Inner light -->
  <path d="M16 8 Q12 15 12 18 Q12 22 16 24 Q20 22 20 18 Q20 15 16 8 Z" fill="url(#innerLight)" opacity="0.5"/>
  <!-- Bright core highlight -->
  <ellipse cx="15.5" cy="14" rx="2.5" ry="3.5" fill="white" opacity="0.4" filter="url(#softGlow2)"/>
  <!-- Golden-red color bands -->
  <path d="M13 18 Q16 16 19 18" fill="none" stroke="#ffcc44" stroke-width="0.4" opacity="0.5"/>
  <path d="M12.5 20 Q16 18 19.5 20" fill="none" stroke="#ff8844" stroke-width="0.4" opacity="0.4"/>
  <!-- Healing sparkles around tear -->
  <circle cx="9" cy="12" r="0.6" fill="#ffcc66" opacity="0.6" filter="url(#softGlow2)"/>
  <circle cx="23" cy="10" r="0.5" fill="#ffcc66" opacity="0.5" filter="url(#softGlow2)"/>
  <circle cx="8" cy="20" r="0.4" fill="#ffaa44" opacity="0.5" filter="url(#softGlow2)"/>
  <circle cx="24" cy="18" r="0.5" fill="#ffaa44" opacity="0.4" filter="url(#softGlow2)"/>
  <circle cx="12" cy="8" r="0.3" fill="#ffdd88" opacity="0.6" filter="url(#softGlow2)"/>
  <circle cx="20" cy="6" r="0.4" fill="#ffdd88" opacity="0.5" filter="url(#softGlow2)"/>
</svg>