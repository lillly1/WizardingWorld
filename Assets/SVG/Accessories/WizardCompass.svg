<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="compassGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <radialGradient id="compassFace" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e7"/>
      <stop offset="80%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#dcc8a0"/>
    </radialGradient>
    <radialGradient id="magicArrow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="0.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="url(#compassGold)" stroke="#8B6914" stroke-width="0.5"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="11.5" fill="url(#compassFace)" stroke="#daa520" stroke-width="0.8"/>
  <!-- Compass rose markings -->
  <text x="15.2" y="7.5" font-size="3" font-weight="bold" fill="#8B6914" font-family="serif">N</text>
  <text x="15.3" y="27" font-size="2.5" fill="#8B6914" font-family="serif">S</text>
  <text x="6" y="17.5" font-size="2.5" fill="#8B6914" font-family="serif">W</text>
  <text x="24" y="17.5" font-size="2.5" fill="#8B6914" font-family="serif">E</text>
  <!-- Tick marks -->
  <line x1="16" y1="5" x2="16" y2="6.5" stroke="#8B6914" stroke-width="0.5"/>
  <line x1="16" y1="25.5" x2="16" y2="27" stroke="#8B6914" stroke-width="0.5"/>
  <line x1="5" y1="16" x2="6.5" y2="16" stroke="#8B6914" stroke-width="0.5"/>
  <line x1="25.5" y1="16" x2="27" y2="16" stroke="#8B6914" stroke-width="0.5"/>
  <!-- Compass needle (north-pointing, rotated slightly for magic) -->
  <polygon points="16,8 14.5,16 16,15 17.5,16" fill="url(#magicArrow)" stroke="#990000" stroke-width="0.3"/>
  <polygon points="16,24 14.5,16 16,17 17.5,16" fill="#e8e0d0" stroke="#8B6914" stroke-width="0.3"/>
  <!-- Center pin -->
  <circle cx="16" cy="16" r="1.2" fill="#daa520" stroke="#8B6914" stroke-width="0.5"/>
  <!-- Decorative stars around edge -->
  <polygon points="9,6 9.3,6.8 10.1,6.8 9.5,7.3 9.7,8.1 9,7.6 8.3,8.1 8.5,7.3 7.9,6.8 8.7,6.8" fill="#ffd700" opacity="0.7" filter="url(#starGlow)"/>
  <polygon points="23,6 23.3,6.8 24.1,6.8 23.5,7.3 23.7,8.1 23,7.6 22.3,8.1 22.5,7.3 21.9,6.8 22.7,6.8" fill="#ffd700" opacity="0.7" filter="url(#starGlow)"/>
  <polygon points="6,23 6.3,23.8 7.1,23.8 6.5,24.3 6.7,25.1 6,24.6 5.3,25.1 5.5,24.3 4.9,23.8 5.7,23.8" fill="#ffd700" opacity="0.7" filter="url(#starGlow)"/>
  <polygon points="26,23 26.3,23.8 27.1,23.8 26.5,24.3 26.7,25.1 26,24.6 25.3,25.1 25.5,24.3 24.9,23.8 25.7,23.8" fill="#ffd700" opacity="0.7" filter="url(#starGlow)"/>
  <!-- Magic sparkle on needle tip -->
  <circle cx="16" cy="8" r="0.8" fill="#ffaaaa" opacity="0.6" filter="url(#starGlow)"/>
</svg>