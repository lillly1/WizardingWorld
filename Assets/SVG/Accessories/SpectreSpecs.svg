<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="leftLens" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ff88cc"/>
      <stop offset="50%" stop-color="#dd44aa"/>
      <stop offset="100%" stop-color="#aa2288"/>
    </radialGradient>
    <radialGradient id="rightLens" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#bb88ff"/>
      <stop offset="50%" stop-color="#8844dd"/>
      <stop offset="100%" stop-color="#6622bb"/>
    </radialGradient>
    <filter id="lensShine">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Left lens - slightly larger, quirky shape -->
  <ellipse cx="10.5" cy="16" rx="6.5" ry="6" fill="url(#leftLens)" stroke="#cc3399" stroke-width="1"/>
  <!-- Right lens - different shape for quirky look -->
  <ellipse cx="22.5" cy="16" rx="6" ry="5.5" fill="url(#rightLens)" stroke="#7733bb" stroke-width="1"/>
  <!-- Bridge between lenses -->
  <path d="M14 14.5 Q16 12 17 14.5" fill="none" stroke="#cc6600" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left temple arm -->
  <path d="M4.5 14 L4 10 Q3.8 8 5 8" fill="none" stroke="#cc6600" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right temple arm -->
  <path d="M28 14 L28.5 10 Q28.7 8 27.5 8" fill="none" stroke="#cc6600" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Decorative swirls on frames -->
  <circle cx="4.5" cy="16" r="0.8" fill="#ffcc00" opacity="0.7"/>
  <circle cx="28" cy="16" r="0.8" fill="#ffcc00" opacity="0.7"/>
  <!-- Lens reflections -->
  <ellipse cx="9" cy="14" rx="2" ry="1.2" fill="white" opacity="0.25" transform="rotate(-15 9 14)"/>
  <ellipse cx="21" cy="14" rx="1.8" ry="1" fill="white" opacity="0.25" transform="rotate(-15 21 14)"/>
  <!-- Magical sparkles -->
  <circle cx="8" cy="18" r="0.5" fill="#ffaaee" opacity="0.6" filter="url(#lensShine)"/>
  <circle cx="24" cy="15" r="0.5" fill="#ccaaff" opacity="0.6" filter="url(#lensShine)"/>
  <circle cx="12" cy="13" r="0.4" fill="#ffccff" opacity="0.5" filter="url(#lensShine)"/>
  <circle cx="20" cy="18" r="0.4" fill="#ddbbff" opacity="0.5" filter="url(#lensShine)"/>
  <!-- Small star decorations on frame -->
  <polygon points="16,9 16.4,10 17.3,10 16.6,10.6 16.8,11.5 16,10.9 15.2,11.5 15.4,10.6 14.7,10 15.6,10" fill="#ffdd44" opacity="0.8"/>
</svg>