<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
  <!-- Willow Wand - flexible and elegant, casts Expelliarmus -->
  <defs>
    <linearGradient id="willowWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9B896"/>
      <stop offset="50%" stop-color="#B0A07A"/>
      <stop offset="100%" stop-color="#8A7A5E"/>
    </linearGradient>
    <linearGradient id="willowGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFAA00" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF8800" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Tip glow (golden Expelliarmus) -->
  <circle cx="8" cy="8" r="3.5" fill="url(#willowGlow)" opacity="0.6"/>
  <!-- Willow shaft - slightly curved (flexible) -->
  <path d="M8,8 Q18,20 34,34" stroke="url(#willowWood)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Elegant grain - wispy lines -->
  <path d="M12,12 Q16,16 18,17" stroke="#A09070" stroke-width="0.3" fill="none" opacity="0.5"/>
  <path d="M20,20 Q23,23 25,24" stroke="#A09070" stroke-width="0.3" fill="none" opacity="0.5"/>
  <!-- Slim tapered handle -->
  <ellipse cx="35" cy="35" rx="2" ry="2.2" fill="#7A6A4E" stroke="#6A5A3E" stroke-width="0.4"/>
  <!-- Delicate leaf detail near handle -->
  <path d="M30,31 Q31,29 33,30" stroke="#8A9A5E" stroke-width="0.5" fill="none" opacity="0.4"/>
</svg>
