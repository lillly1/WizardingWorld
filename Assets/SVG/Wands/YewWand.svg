<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
  <!-- Yew Wand - Dark reddish yew, associated with death -->
  <defs>
    <linearGradient id="yewWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B3A3A"/>
      <stop offset="50%" stop-color="#6B2A2A"/>
      <stop offset="100%" stop-color="#4A1A1A"/>
    </linearGradient>
    <linearGradient id="yewGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B00FF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4B0082" stop-opacity="0"/>
    </linearGradient>
    <filter id="yewGlw">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Tip glow (dark purple / death) -->
  <circle cx="8" cy="8" r="4.5" fill="url(#yewGlow)" filter="url(#yewGlw)" opacity="0.75"/>
  <!-- Wand shaft -->
  <line x1="8" y1="8" x2="34" y2="34" stroke="url(#yewWood)" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Wood grain lines -->
  <line x1="12" y1="11" x2="15" y2="14" stroke="#5A2222" stroke-width="0.4" opacity="0.6"/>
  <line x1="19" y1="18" x2="22" y2="21" stroke="#5A2222" stroke-width="0.4" opacity="0.6"/>
  <line x1="26" y1="25" x2="29" y2="28" stroke="#5A2222" stroke-width="0.4" opacity="0.6"/>
  <!-- Death motif - tiny skull shape near tip -->
  <circle cx="10" cy="9" r="1.2" fill="none" stroke="#9966CC" stroke-width="0.5" opacity="0.5"/>
  <line x1="9.5" y1="10" x2="10.5" y2="10" stroke="#9966CC" stroke-width="0.4" opacity="0.4"/>
  <!-- Dark aura wisps -->
  <path d="M9,6 Q7,4 9,3" fill="none" stroke="#6B22AA" stroke-width="0.4" opacity="0.4"/>
  <path d="M6,9 Q4,7 3,9" fill="none" stroke="#6B22AA" stroke-width="0.4" opacity="0.3"/>
  <!-- Handle end -->
  <circle cx="35" cy="35" r="2.2" fill="#3A1010" stroke="#2A0808" stroke-width="0.5"/>
  <!-- Purple spark -->
  <circle cx="7.5" cy="7.5" r="0.9" fill="#CC88FF" opacity="0.8"/>
</svg>
