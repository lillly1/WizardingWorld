<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
  <!-- Maple Wand - Golden-amber maple wood, travelers and achievers -->
  <defs>
    <linearGradient id="mapleWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A545"/>
      <stop offset="50%" stop-color="#B88B35"/>
      <stop offset="100%" stop-color="#9A7228"/>
    </linearGradient>
    <linearGradient id="mapleGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#CC9900" stop-opacity="0"/>
    </linearGradient>
    <filter id="mapGlow">
      <feGaussianBlur stdDeviation="1.3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Tip glow (gold) -->
  <circle cx="8" cy="8" r="4.5" fill="url(#mapleGlow)" filter="url(#mapGlow)" opacity="0.7"/>
  <!-- Wand shaft -->
  <line x1="8" y1="8" x2="34" y2="34" stroke="url(#mapleWood)" stroke-width="2.7" stroke-linecap="round"/>
  <!-- Wood grain lines -->
  <line x1="13" y1="12" x2="16" y2="15" stroke="#9A7228" stroke-width="0.4" opacity="0.5"/>
  <line x1="20" y1="19" x2="23" y2="22" stroke="#9A7228" stroke-width="0.4" opacity="0.5"/>
  <line x1="27" y1="26" x2="29" y2="28" stroke="#9A7228" stroke-width="0.4" opacity="0.5"/>
  <!-- Maple leaf silhouette near tip (signature detail) -->
  <g transform="translate(6,5) scale(0.4)" opacity="0.5">
    <path d="M5,0 L6,3 L9,3 L7,5 L8,8 L5,6 L2,8 L3,5 L1,3 L4,3 Z" fill="#DDAA33" stroke="#BB8822" stroke-width="0.5"/>
  </g>
  <!-- Handle end -->
  <circle cx="35" cy="35" r="2" fill="#8A6220" stroke="#7A5210" stroke-width="0.5"/>
  <!-- Gold spark -->
  <circle cx="7.5" cy="7.5" r="0.9" fill="#FFEE88" opacity="0.85"/>
</svg>
