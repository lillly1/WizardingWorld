<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
  <!-- Cherry Wand - Warm pink-brown cherry wood, beautiful and deadly -->
  <defs>
    <linearGradient id="cherryWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4727A"/>
      <stop offset="50%" stop-color="#A85A60"/>
      <stop offset="100%" stop-color="#8B4248"/>
    </linearGradient>
    <linearGradient id="cherryGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF69B4" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#CC4488" stop-opacity="0"/>
    </linearGradient>
    <filter id="cheGlow">
      <feGaussianBlur stdDeviation="1.3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Tip glow (cherry blossom pink) -->
  <circle cx="8" cy="8" r="4.5" fill="url(#cherryGlow)" filter="url(#cheGlow)" opacity="0.7"/>
  <!-- Wand shaft -->
  <line x1="8" y1="8" x2="34" y2="34" stroke="url(#cherryWood)" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Wood grain lines -->
  <line x1="13" y1="12" x2="16" y2="15" stroke="#8A4A50" stroke-width="0.4" opacity="0.5"/>
  <line x1="20" y1="19" x2="23" y2="22" stroke="#8A4A50" stroke-width="0.4" opacity="0.5"/>
  <line x1="27" y1="26" x2="29" y2="28" stroke="#8A4A50" stroke-width="0.4" opacity="0.5"/>
  <!-- Cherry blossom petal details near tip -->
  <ellipse cx="10" cy="7" rx="1.2" ry="0.7" fill="#FFB0C8" transform="rotate(-20,10,7)" opacity="0.5"/>
  <ellipse cx="7" cy="10" rx="1.0" ry="0.6" fill="#FFB0C8" transform="rotate(60,7,10)" opacity="0.45"/>
  <circle cx="8.5" cy="8.5" r="0.5" fill="#FFD0E0" opacity="0.6"/>
  <!-- Handle end -->
  <circle cx="35" cy="35" r="2" fill="#6A3238" stroke="#5A2228" stroke-width="0.5"/>
  <!-- Pink spark -->
  <circle cx="7.5" cy="7.5" r="0.9" fill="#FFD0E8" opacity="0.85"/>
</svg>
