<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
  <!-- Hawthorn Wand - Pale gray-brown, conflicted nature -->
  <defs>
    <linearGradient id="hawthornWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B8A898"/>
      <stop offset="50%" stop-color="#9A8A7A"/>
      <stop offset="100%" stop-color="#7A6A5A"/>
    </linearGradient>
    <linearGradient id="hawthornGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EEEEFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#AAAACC" stop-opacity="0"/>
    </linearGradient>
    <filter id="hawGlow">
      <feGaussianBlur stdDeviation="1.3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Tip glow (white/gray conflicted) -->
  <circle cx="8" cy="8" r="4.5" fill="url(#hawthornGlow)" filter="url(#hawGlow)" opacity="0.7"/>
  <!-- Wand shaft -->
  <line x1="8" y1="8" x2="34" y2="34" stroke="url(#hawthornWood)" stroke-width="2.7" stroke-linecap="round"/>
  <!-- Wood grain lines -->
  <line x1="13" y1="12" x2="16" y2="15" stroke="#8A7A6A" stroke-width="0.4" opacity="0.5"/>
  <line x1="20" y1="19" x2="23" y2="22" stroke="#8A7A6A" stroke-width="0.4" opacity="0.5"/>
  <line x1="27" y1="26" x2="30" y2="29" stroke="#8A7A6A" stroke-width="0.4" opacity="0.5"/>
  <!-- Hawthorn thorn details (conflicted nature) -->
  <line x1="15" y1="13" x2="13" y2="12" stroke="#6A5A4A" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="22" y1="20" x2="20" y2="19" stroke="#6A5A4A" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="28" y1="28" x2="30" y2="26" stroke="#6A5A4A" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Handle end -->
  <circle cx="35" cy="35" r="2.2" fill="#6A5A4A" stroke="#5A4A3A" stroke-width="0.5"/>
  <!-- Dual-tone spark (conflicted white and gray) -->
  <circle cx="7" cy="7" r="1" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="8.5" cy="7.5" r="0.6" fill="#AAAACC" opacity="0.6"/>
</svg>
