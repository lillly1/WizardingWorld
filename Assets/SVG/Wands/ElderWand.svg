<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
  <!-- Elder Wand - The Deathstick, most powerful wand ever made -->
  <!-- Knotted elder wood, thestral tail hair core, bumpy surface -->
  <defs>
    <linearGradient id="elderWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="50%" stop-color="#6B5B45"/>
      <stop offset="100%" stop-color="#4A3C2A"/>
    </linearGradient>
    <linearGradient id="elderGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FF88" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00CC66" stop-opacity="0"/>
    </linearGradient>
    <filter id="eldGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Tip glow (Avada Kedavra green) -->
  <circle cx="8" cy="8" r="5" fill="url(#elderGlow)" filter="url(#eldGlow)" opacity="0.7"/>
  <!-- Wand shaft - knotted elder wood, diagonal -->
  <line x1="8" y1="8" x2="35" y2="35" stroke="url(#elderWood)" stroke-width="3" stroke-linecap="round"/>
  <!-- Elder berry bumps along the shaft (signature knotted texture) -->
  <circle cx="12" cy="12" r="1.2" fill="#5C4A36"/>
  <circle cx="16" cy="15" r="0.9" fill="#7A6650"/>
  <circle cx="19" cy="19" r="1.1" fill="#5C4A36"/>
  <circle cx="24" cy="23" r="0.8" fill="#7A6650"/>
  <circle cx="27" cy="27" r="1.0" fill="#5C4A36"/>
  <!-- Thestral hair core shimmer (silver thread) -->
  <line x1="10" y1="10" x2="32" y2="32" stroke="#C0C0C0" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,3"/>
  <!-- Handle - simple elder knot end -->
  <circle cx="35" cy="35" r="2.5" fill="#4A3C2A" stroke="#3A2C1A" stroke-width="0.5"/>
  <!-- Death symbol at tip (triangle, circle, line - Deathly Hallows mark) -->
  <g transform="translate(5,5) scale(0.35)" opacity="0.6">
    <polygon points="4,0 0,7 8,7" fill="none" stroke="#AAFFAA" stroke-width="1"/>
    <circle cx="4" cy="4.5" r="2" fill="none" stroke="#AAFFAA" stroke-width="0.8"/>
    <line x1="4" y1="0.5" x2="4" y2="7" stroke="#AAFFAA" stroke-width="0.8"/>
  </g>
</svg>
