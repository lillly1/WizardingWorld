<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
  <!-- Mahogany Wand - Rich reddish-brown, Transfiguration affinity -->
  <defs>
    <linearGradient id="mahoganyWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B5564A"/>
      <stop offset="50%" stop-color="#8B4236"/>
      <stop offset="100%" stop-color="#6B3228"/>
    </linearGradient>
    <linearGradient id="mahoganyGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00CCBB" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#008888" stop-opacity="0"/>
    </linearGradient>
    <filter id="mahGlow">
      <feGaussianBlur stdDeviation="1.3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Tip glow (Transfiguration teal) -->
  <circle cx="8" cy="8" r="4.5" fill="url(#mahoganyGlow)" filter="url(#mahGlow)" opacity="0.7"/>
  <!-- Wand shaft -->
  <line x1="8" y1="8" x2="34" y2="34" stroke="url(#mahoganyWood)" stroke-width="2.9" stroke-linecap="round"/>
  <!-- Wood grain lines -->
  <line x1="12" y1="11" x2="15" y2="14" stroke="#7A3228" stroke-width="0.4" opacity="0.6"/>
  <line x1="19" y1="18" x2="22" y2="21" stroke="#7A3228" stroke-width="0.4" opacity="0.6"/>
  <line x1="26" y1="25" x2="29" y2="28" stroke="#7A3228" stroke-width="0.4" opacity="0.6"/>
  <!-- Transfiguration swirl near tip (transformation motif) -->
  <path d="M10,7 Q12,5 11,8 Q13,7 10,10" fill="none" stroke="#66DDCC" stroke-width="0.5" opacity="0.45"/>
  <!-- Rich polished sheen -->
  <line x1="11" y1="10" x2="30" y2="29" stroke="#C06A5A" stroke-width="0.5" opacity="0.25"/>
  <!-- Handle end -->
  <circle cx="35" cy="35" r="2.2" fill="#5A2820" stroke="#4A1810" stroke-width="0.5"/>
  <!-- Teal spark -->
  <circle cx="7.5" cy="7.5" r="0.9" fill="#88FFEE" opacity="0.8"/>
</svg>
