<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
  <!-- Cypress Wand - Pale yellowish, nobility and self-sacrifice -->
  <defs>
    <linearGradient id="cypressWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4C8A0"/>
      <stop offset="50%" stop-color="#B8AA85"/>
      <stop offset="100%" stop-color="#9A8C6A"/>
    </linearGradient>
    <linearGradient id="cypressGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#CCCCDD" stop-opacity="0"/>
    </linearGradient>
    <filter id="cypGlow">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Tip glow (noble white) -->
  <circle cx="8" cy="8" r="4.5" fill="url(#cypressGlow)" filter="url(#cypGlow)" opacity="0.7"/>
  <!-- Wand shaft -->
  <line x1="8" y1="8" x2="34" y2="34" stroke="url(#cypressWood)" stroke-width="2.7" stroke-linecap="round"/>
  <!-- Wood grain lines -->
  <line x1="13" y1="12" x2="15" y2="14" stroke="#9A8C6A" stroke-width="0.4" opacity="0.5"/>
  <line x1="20" y1="19" x2="22" y2="21" stroke="#9A8C6A" stroke-width="0.4" opacity="0.5"/>
  <line x1="27" y1="26" x2="29" y2="28" stroke="#9A8C6A" stroke-width="0.4" opacity="0.5"/>
  <!-- Noble shield/crest motif near handle -->
  <g transform="translate(29,29) scale(0.5)" opacity="0.45">
    <polygon points="3,0 6,2 6,5 3,7 0,5 0,2" fill="none" stroke="#8A7C5A" stroke-width="1"/>
    <line x1="3" y1="1" x2="3" y2="6" stroke="#8A7C5A" stroke-width="0.7"/>
  </g>
  <!-- Self-sacrifice light rays at tip -->
  <line x1="8" y1="5" x2="8" y2="3" stroke="#FFFFEE" stroke-width="0.4" opacity="0.4"/>
  <line x1="5" y1="8" x2="3" y2="8" stroke="#FFFFEE" stroke-width="0.4" opacity="0.4"/>
  <line x1="6" y1="6" x2="4.5" y2="4.5" stroke="#FFFFEE" stroke-width="0.4" opacity="0.35"/>
  <!-- Handle end -->
  <circle cx="35" cy="35" r="2.2" fill="#8A7C5A" stroke="#7A6C4A" stroke-width="0.5"/>
  <!-- White spark -->
  <circle cx="7.5" cy="7.5" r="1" fill="#FFFFFF" opacity="0.85"/>
</svg>
