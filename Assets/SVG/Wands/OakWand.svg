<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
  <!-- Oak Wand - sturdy starter wand, casts Stupefy -->
  <defs>
    <linearGradient id="oakWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B8956B"/>
      <stop offset="50%" stop-color="#967B5D"/>
      <stop offset="100%" stop-color="#7A6347"/>
    </linearGradient>
    <linearGradient id="oakGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF3333" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#CC0000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Tip glow (Stupefy red) -->
  <circle cx="9" cy="9" r="3.5" fill="url(#oakGlow)" opacity="0.6"/>
  <!-- Sturdy oak shaft -->
  <line x1="9" y1="9" x2="34" y2="34" stroke="url(#oakWood)" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Oak grain (heavier, sturdy) -->
  <line x1="14" y1="13" x2="16" y2="15" stroke="#806548" stroke-width="0.5" opacity="0.5"/>
  <line x1="20" y1="19" x2="22" y2="21" stroke="#806548" stroke-width="0.5" opacity="0.5"/>
  <line x1="26" y1="25" x2="28" y2="27" stroke="#806548" stroke-width="0.5" opacity="0.5"/>
  <!-- Simple round handle -->
  <ellipse cx="35" cy="35" rx="2.5" ry="2.5" fill="#6B5340" stroke="#5A4230" stroke-width="0.5"/>
  <!-- Slight tip flare -->
  <circle cx="8.5" cy="8.5" r="1.5" fill="#DDB894" opacity="0.5"/>
</svg>
