<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
  <!-- Birch Wand - Very pale/white bark, new beginnings -->
  <defs>
    <linearGradient id="birchWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8DDD0"/>
      <stop offset="50%" stop-color="#D0C4B4"/>
      <stop offset="100%" stop-color="#B8AA98"/>
    </linearGradient>
    <linearGradient id="birchGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#88CCFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4488CC" stop-opacity="0"/>
    </linearGradient>
    <filter id="birGlow">
      <feGaussianBlur stdDeviation="1.3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Tip glow (light blue, new beginnings) -->
  <circle cx="8" cy="8" r="4.5" fill="url(#birchGlow)" filter="url(#birGlow)" opacity="0.7"/>
  <!-- Wand shaft -->
  <line x1="8" y1="8" x2="34" y2="34" stroke="url(#birchWood)" stroke-width="2.7" stroke-linecap="round"/>
  <!-- Wood grain lines -->
  <line x1="13" y1="12" x2="16" y2="15" stroke="#B0A090" stroke-width="0.4" opacity="0.5"/>
  <line x1="20" y1="19" x2="23" y2="22" stroke="#B0A090" stroke-width="0.4" opacity="0.5"/>
  <!-- Birch bark marks (horizontal dark dashes - signature detail) -->
  <line x1="13" y1="14" x2="16" y2="13" stroke="#8A7A6A" stroke-width="0.6" opacity="0.5"/>
  <line x1="18" y1="20" x2="21" y2="19" stroke="#8A7A6A" stroke-width="0.6" opacity="0.45"/>
  <line x1="24" y1="26" x2="27" y2="25" stroke="#8A7A6A" stroke-width="0.5" opacity="0.4"/>
  <line x1="28" y1="30" x2="30" y2="29" stroke="#8A7A6A" stroke-width="0.5" opacity="0.35"/>
  <!-- Handle end -->
  <circle cx="35" cy="35" r="2" fill="#A09080" stroke="#907A6A" stroke-width="0.5"/>
  <!-- Light blue spark -->
  <circle cx="7.5" cy="7.5" r="0.9" fill="#BBDDFF" opacity="0.85"/>
</svg>
