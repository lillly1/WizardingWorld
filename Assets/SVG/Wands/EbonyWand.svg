<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
  <!-- Ebony Wand - Very dark near-black wood, powerful and bold -->
  <defs>
    <linearGradient id="ebonyWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3A3535"/>
      <stop offset="50%" stop-color="#2A2525"/>
      <stop offset="100%" stop-color="#1A1515"/>
    </linearGradient>
    <linearGradient id="ebonyGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#AA44FF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7722CC" stop-opacity="0"/>
    </linearGradient>
    <filter id="eboGlow">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Tip glow (bold purple) -->
  <circle cx="8" cy="8" r="4.5" fill="url(#ebonyGlow)" filter="url(#eboGlow)" opacity="0.75"/>
  <!-- Wand shaft -->
  <line x1="8" y1="8" x2="34" y2="34" stroke="url(#ebonyWood)" stroke-width="3" stroke-linecap="round"/>
  <!-- Wood grain - subtle on dark wood -->
  <line x1="13" y1="12" x2="16" y2="15" stroke="#4A4545" stroke-width="0.4" opacity="0.4"/>
  <line x1="20" y1="19" x2="23" y2="22" stroke="#4A4545" stroke-width="0.4" opacity="0.4"/>
  <line x1="27" y1="26" x2="29" y2="28" stroke="#4A4545" stroke-width="0.4" opacity="0.4"/>
  <!-- Ebony polish sheen (highlight line) -->
  <line x1="10" y1="9" x2="32" y2="31" stroke="#5A5555" stroke-width="0.6" opacity="0.3"/>
  <!-- Bold angular handle carving -->
  <rect x="32" y="32" width="5" height="5" rx="1.2" fill="#1A1515" stroke="#0A0505" stroke-width="0.5" transform="rotate(45,34.5,34.5)"/>
  <!-- Purple spark -->
  <circle cx="7.5" cy="7.5" r="1" fill="#DD99FF" opacity="0.8"/>
</svg>
