<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
  <!-- Dragon Heartstring Wand - most powerful magic, casts Sectumsempra -->
  <defs>
    <linearGradient id="dhWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="50%" stop-color="#5C1010"/>
      <stop offset="100%" stop-color="#3A0808"/>
    </linearGradient>
    <linearGradient id="dhGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF0066" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#880033" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <circle cx="8" cy="8" r="4" fill="url(#dhGlow)" opacity="0.7"/>
  <!-- Dark reddish shaft -->
  <line x1="8" y1="8" x2="34" y2="34" stroke="url(#dhWood)" stroke-width="3" stroke-linecap="round"/>
  <!-- Dragon heartstring core (pulsing red line) -->
  <line x1="10" y1="10" x2="31" y2="31" stroke="#FF2222" stroke-width="0.7" opacity="0.5" stroke-dasharray="1.5,1.5"/>
  <!-- Scales texture -->
  <path d="M14,12 L15,14 L13,14 Z" fill="#6B1010" opacity="0.4"/>
  <path d="M20,18 L21,20 L19,20 Z" fill="#6B1010" opacity="0.4"/>
  <path d="M26,24 L27,26 L25,26 Z" fill="#6B1010" opacity="0.4"/>
  <!-- Angular aggressive handle -->
  <rect x="32" y="32" width="5" height="5" rx="1" fill="#2A0505" stroke="#4A0808" stroke-width="0.5" transform="rotate(45 34.5 34.5)"/>
  <!-- Dark energy spark -->
  <circle cx="7" cy="7" r="1" fill="#FF88AA" opacity="0.8"/>
</svg>
