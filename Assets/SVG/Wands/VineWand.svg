<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42">
  <!-- Vine Wand - Green-tinged brown vine wood, nature affinity -->
  <defs>
    <linearGradient id="vineWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B7B55"/>
      <stop offset="50%" stop-color="#6B6B3A"/>
      <stop offset="100%" stop-color="#556B2F"/>
    </linearGradient>
    <linearGradient id="vineGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44FF44" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#22CC22" stop-opacity="0"/>
    </linearGradient>
    <filter id="vinGlow">
      <feGaussianBlur stdDeviation="1.3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Tip glow (nature green) -->
  <circle cx="8" cy="8" r="4.5" fill="url(#vineGlow)" filter="url(#vinGlow)" opacity="0.7"/>
  <!-- Wand shaft -->
  <line x1="8" y1="8" x2="34" y2="34" stroke="url(#vineWood)" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Wood grain lines -->
  <line x1="13" y1="12" x2="16" y2="15" stroke="#4A5A2A" stroke-width="0.4" opacity="0.6"/>
  <line x1="21" y1="20" x2="24" y2="23" stroke="#4A5A2A" stroke-width="0.4" opacity="0.6"/>
  <!-- Tiny vine tendrils wrapping the shaft -->
  <path d="M11,13 Q9,11 12,10" fill="none" stroke="#3A7A2A" stroke-width="0.6" opacity="0.7"/>
  <path d="M17,19 Q15,17 18,16" fill="none" stroke="#3A7A2A" stroke-width="0.6" opacity="0.6"/>
  <path d="M24,26 Q22,24 25,23" fill="none" stroke="#3A7A2A" stroke-width="0.5" opacity="0.5"/>
  <!-- Tiny leaf at tip vine -->
  <ellipse cx="10" cy="10" rx="1.5" ry="0.8" fill="#4A8A30" transform="rotate(30,10,10)" opacity="0.6"/>
  <!-- Handle end -->
  <circle cx="35" cy="35" r="2" fill="#4A5A2A" stroke="#3A4A1A" stroke-width="0.5"/>
  <!-- Green spark at tip -->
  <circle cx="7.5" cy="7.5" r="0.9" fill="#AAFFAA" opacity="0.8"/>
</svg>
