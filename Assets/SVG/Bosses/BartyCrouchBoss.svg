<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="darkRobe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="strawHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4a460"/>
      <stop offset="100%" stop-color="#a48840"/>
    </linearGradient>
  </defs>
  <!-- Dark robes -->
  <path d="M8 32 Q10 26 18 24 L24 23 L30 24 Q38 26 40 32 L40 48 L8 48Z" fill="url(#darkRobe)"/>
  <!-- High Death Eater collar -->
  <path d="M18 24 Q20 22 22 23 L24 23 L26 23 Q28 22 30 24" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.3"/>
  <!-- Nervous twitchy neck -->
  <rect x="20" y="20" width="8" height="4" rx="2" fill="#e8d0b0"/>
  <!-- Face - young but gaunt, nervous -->
  <ellipse cx="24" cy="15" rx="7" ry="7.5" fill="#e8d0b0"/>
  <!-- Straw-colored hair - messy -->
  <path d="M17 10 Q19 5 24 4 Q29 5 31 10" fill="url(#strawHair)"/>
  <path d="M17 10 Q16 12 17 14" fill="url(#strawHair)"/>
  <path d="M31 10 Q32 12 31 14" fill="url(#strawHair)"/>
  <!-- Messy hair strands -->
  <path d="M19 5 Q18 3 19 2" fill="none" stroke="#b49840" stroke-width="0.5"/>
  <path d="M22 4 Q21 2 22 1" fill="none" stroke="#b49840" stroke-width="0.5"/>
  <path d="M26 4 Q27 2 26 1" fill="none" stroke="#b49840" stroke-width="0.5"/>
  <path d="M29 5 Q30 3 29 2" fill="none" stroke="#b49840" stroke-width="0.5"/>
  <!-- Nervous twitchy eyebrows -->
  <path d="M19 11 Q21 10 23 11.5" fill="none" stroke="#8a7830" stroke-width="0.5"/>
  <path d="M25 11 Q27 10.5 29 12" fill="none" stroke="#8a7830" stroke-width="0.5"/>
  <!-- Wide nervous/manic eyes -->
  <ellipse cx="21" cy="13.5" rx="2" ry="1.8" fill="white"/>
  <ellipse cx="27" cy="13.5" rx="2" ry="1.8" fill="white"/>
  <circle cx="21" cy="13.5" r="1" fill="#6a5a30"/>
  <circle cx="27" cy="13.5" r="1" fill="#6a5a30"/>
  <circle cx="21" cy="13.5" r="0.4" fill="#1a1a1a"/>
  <circle cx="27" cy="13.5" r="0.4" fill="#1a1a1a"/>
  <!-- Manic gleam -->
  <circle cx="21.5" cy="13" r="0.25" fill="white" opacity="0.8"/>
  <circle cx="27.5" cy="13" r="0.25" fill="white" opacity="0.8"/>
  <!-- Dark circles under eyes -->
  <path d="M19 15.5 Q21 16 23 15.5" fill="none" stroke="#c0a880" stroke-width="0.4" opacity="0.5"/>
  <path d="M25 15.5 Q27 16 29 15.5" fill="none" stroke="#c0a880" stroke-width="0.4" opacity="0.5"/>
  <!-- Nervous tic lines around eye -->
  <path d="M19 12 L18 11.5" fill="none" stroke="#d0b890" stroke-width="0.2"/>
  <path d="M19 14.5 L18 15" fill="none" stroke="#d0b890" stroke-width="0.2"/>
  <!-- Nose -->
  <path d="M24 14 Q23.5 16 24 17" fill="none" stroke="#d0a880" stroke-width="0.4"/>
  <!-- Mouth - nervous, tongue flicking -->
  <path d="M22 19 Q24 18.5 26 19" fill="none" stroke="#a07060" stroke-width="0.4"/>
  <!-- Tongue flick -->
  <path d="M24 19 Q24.5 20 25 20.5 Q25.5 20 25 19.5" fill="#cc6060"/>
  <!-- Nervous sweat drops -->
  <ellipse cx="17" cy="14" rx="0.4" ry="0.6" fill="#a0c0e0" opacity="0.3"/>
  <ellipse cx="31" cy="12" rx="0.3" ry="0.5" fill="#a0c0e0" opacity="0.25"/>
  <!-- Impostor shimmer/duality effect -->
  <path d="M32 10 Q34 8 36 10 Q34 12 32 10" fill="none" stroke="#7a5a2a" stroke-width="0.3" opacity="0.3"/>
  <!-- Polyjuice flask hint at belt -->
  <ellipse cx="18" cy="34" rx="1.5" ry="2" fill="#4a6a4a" stroke="#3a5a3a" stroke-width="0.3"/>
  <rect x="17.5" y="32" width="1" height="1" rx="0.3" fill="#3a5a3a"/>
  <!-- Bubbling polyjuice -->
  <circle cx="18" cy="33.5" r="0.3" fill="#6a9a6a" opacity="0.5"/>
  <circle cx="18.5" cy="34" r="0.2" fill="#6a9a6a" opacity="0.4"/>
  <!-- Wand -->
  <line x1="38" y1="26" x2="42" y2="18" stroke="#5a4a2a" stroke-width="0.8" stroke-linecap="round"/>
</svg>