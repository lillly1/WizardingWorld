<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="grayFur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a6a6a"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>
    <linearGradient id="darkFur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>
  <!-- Hunched massive body -->
  <path d="M4 30 Q6 24 14 22 L24 20 L34 22 Q42 24 44 30 L46 48 L2 48Z" fill="url(#grayFur)"/>
  <!-- Fur texture on body -->
  <path d="M10 28 L8 26" fill="none" stroke="#5a5a5a" stroke-width="0.5"/>
  <path d="M16 26 L14 24" fill="none" stroke="#5a5a5a" stroke-width="0.5"/>
  <path d="M32 26 L34 24" fill="none" stroke="#5a5a5a" stroke-width="0.5"/>
  <path d="M38 28 L40 26" fill="none" stroke="#5a5a5a" stroke-width="0.5"/>
  <!-- Hunched shoulders raised -->
  <ellipse cx="12" cy="24" rx="5" ry="4" fill="url(#grayFur)"/>
  <ellipse cx="36" cy="24" rx="5" ry="4" fill="url(#grayFur)"/>
  <!-- Thick furred neck -->
  <path d="M16 14 Q20 12 24 12 Q28 12 32 14 L32 22 L16 22Z" fill="url(#grayFur)"/>
  <!-- Neck mane -->
  <path d="M16 14 L14 12" fill="none" stroke="#5a5a5a" stroke-width="0.6"/>
  <path d="M20 12 L18 10" fill="none" stroke="#5a5a5a" stroke-width="0.6"/>
  <path d="M28 12 L30 10" fill="none" stroke="#5a5a5a" stroke-width="0.6"/>
  <path d="M32 14 L34 12" fill="none" stroke="#5a5a5a" stroke-width="0.6"/>
  <!-- Werewolf head -->
  <path d="M10 6 Q12 2 18 2 Q24 2 28 4 Q34 6 34 12 Q32 18 24 20 Q16 18 12 14 Q8 10 10 6Z" fill="url(#grayFur)"/>
  <!-- Lighter muzzle -->
  <path d="M10 10 Q8 14 12 18 Q16 20 20 18 Q18 14 14 12 Q10 10 10 10Z" fill="url(#darkFur)"/>
  <!-- Pointed ears -->
  <path d="M16 2 L14 -2 L18 2" fill="url(#grayFur)" stroke="#4a4a4a" stroke-width="0.3"/>
  <path d="M28 2 L30 -2 L26 3" fill="url(#grayFur)" stroke="#4a4a4a" stroke-width="0.3"/>
  <!-- Inner ears -->
  <path d="M16 2 L15 0 L17 2" fill="#8a5a5a"/>
  <path d="M28 2 L29 0 L27 3" fill="#8a5a5a"/>
  <!-- Feral glowing eyes -->
  <ellipse cx="18" cy="8" rx="2.5" ry="2" fill="#c0a020"/>
  <ellipse cx="28" cy="7" rx="2.5" ry="2" fill="#c0a020"/>
  <ellipse cx="18" cy="8" rx="0.8" ry="1.8" fill="#1a1a00"/>
  <ellipse cx="28" cy="7" rx="0.8" ry="1.8" fill="#1a1a00"/>
  <!-- Eye glow -->
  <ellipse cx="18" cy="8" rx="3" ry="2.5" fill="#c0a020" opacity="0.15"/>
  <ellipse cx="28" cy="7" rx="3" ry="2.5" fill="#c0a020" opacity="0.15"/>
  <!-- Brow ridge - aggressive -->
  <path d="M15 6 Q18 5 21 6.5" fill="none" stroke="#3a3a3a" stroke-width="0.8"/>
  <path d="M25 5.5 Q28 4.5 31 6" fill="none" stroke="#3a3a3a" stroke-width="0.8"/>
  <!-- Wrinkled snarling snout -->
  <path d="M12 11 Q14 10 16 11" fill="none" stroke="#4a4a4a" stroke-width="0.3"/>
  <path d="M11 12 Q14 11 16 12" fill="none" stroke="#4a4a4a" stroke-width="0.3"/>
  <!-- Nose -->
  <ellipse cx="11" cy="12" rx="1.5" ry="1" fill="#2a2a2a"/>
  <!-- Massive open jaws -->
  <path d="M10 14 Q16 20 24 18" fill="#4a1a1a"/>
  <path d="M10 14 Q14 16 20 16" fill="#5a2a2a"/>
  <!-- Upper fangs -->
  <path d="M12 14 L11 17" fill="none" stroke="#e0e0d0" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M16 15 L15.5 17.5" fill="none" stroke="#e0e0d0" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M20 16 L19.5 18" fill="none" stroke="#e0e0d0" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Lower jaw teeth -->
  <path d="M13 18 L13.5 16" fill="none" stroke="#d0d0c0" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M17 18 L17 16.5" fill="none" stroke="#d0d0c0" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Sharp claws visible -->
  <path d="M4 40 L2 42 L0 44" fill="none" stroke="#d0d0c0" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M6 42 L4 44 L2 46" fill="none" stroke="#d0d0c0" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M42 40 L44 42 L46 44" fill="none" stroke="#d0d0c0" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M44 42 L46 44 L48 46" fill="none" stroke="#d0d0c0" stroke-width="0.6" stroke-linecap="round"/>
  <!-- Drool/saliva -->
  <path d="M14 18 Q14 20 13 22" fill="none" stroke="#8a8a7a" stroke-width="0.3" opacity="0.5"/>
  <!-- Scars -->
  <path d="M20 4 L22 8" fill="none" stroke="#8a6a6a" stroke-width="0.4" opacity="0.5"/>
  <path d="M30 8 L32 12" fill="none" stroke="#8a6a6a" stroke-width="0.4" opacity="0.5"/>
</svg>