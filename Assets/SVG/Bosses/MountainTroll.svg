<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="trollSkin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a8a6a"/>
      <stop offset="100%" stop-color="#5a6a4a"/>
    </linearGradient>
    <linearGradient id="club" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a5a3a"/>
      <stop offset="100%" stop-color="#4a3a2a"/>
    </linearGradient>
  </defs>
  <!-- Massive body -->
  <path d="M8 30 Q6 26 10 22 L20 18 L28 18 L38 22 Q42 26 40 30 L42 48 L6 48Z" fill="url(#trollSkin)"/>
  <!-- Body lumps/warts -->
  <circle cx="14" cy="34" r="1.5" fill="#6a7a5a" opacity="0.5"/>
  <circle cx="34" cy="32" r="1.2" fill="#6a7a5a" opacity="0.5"/>
  <circle cx="20" cy="38" r="1" fill="#6a7a5a" opacity="0.4"/>
  <!-- Thick neck -->
  <rect x="18" y="15" width="12" height="5" rx="4" fill="url(#trollSkin)"/>
  <!-- Small stupid head on massive body -->
  <ellipse cx="24" cy="12" rx="7" ry="7" fill="url(#trollSkin)"/>
  <!-- Lumpy head bumps -->
  <circle cx="20" cy="7" r="1.5" fill="#6a7a5a"/>
  <circle cx="28" cy="8" r="1.2" fill="#6a7a5a"/>
  <!-- Tiny dull eyes -->
  <circle cx="21" cy="12" r="1.5" fill="#d0d0a0"/>
  <circle cx="27" cy="12" r="1.5" fill="#d0d0a0"/>
  <circle cx="21" cy="12" r="0.8" fill="#4a4a2a"/>
  <circle cx="27" cy="12" r="0.8" fill="#4a4a2a"/>
  <!-- Stupid confused brow -->
  <path d="M19 10 Q21 9.5 23 10.5" fill="none" stroke="#4a5a3a" stroke-width="0.8"/>
  <path d="M25 10.5 Q27 9.5 29 10" fill="none" stroke="#4a5a3a" stroke-width="0.8"/>
  <!-- Flat wide nose -->
  <ellipse cx="24" cy="14" rx="2" ry="1.5" fill="#5a6a4a"/>
  <circle cx="23" cy="14.5" r="0.5" fill="#4a5a3a"/>
  <circle cx="25" cy="14.5" r="0.5" fill="#4a5a3a"/>
  <!-- Mouth with underbite -->
  <path d="M20 16.5 Q24 18 28 16.5" fill="#4a3a2a"/>
  <!-- Tusks -->
  <path d="M21 16.5 L20 18.5" fill="none" stroke="#d0d0a0" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M27 16.5 L28 18.5" fill="none" stroke="#d0d0a0" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Small ears -->
  <ellipse cx="17" cy="11" rx="1.5" ry="2" fill="#6a7a5a"/>
  <ellipse cx="31" cy="11" rx="1.5" ry="2" fill="#6a7a5a"/>
  <!-- Massive club -->
  <path d="M38 12 L42 8 Q44 6 45 8 L44 12 Q46 14 44 16 L42 18 L38 20 L36 16Z" fill="url(#club)"/>
  <!-- Club grip -->
  <rect x="36" y="16" width="4" height="12" rx="1" fill="url(#club)" transform="rotate(15 38 22)"/>
  <!-- Club wood grain -->
  <path d="M40 10 Q42 12 40 14" fill="none" stroke="#5a4a2a" stroke-width="0.3"/>
  <!-- Troll arm holding club -->
  <path d="M38 22 Q40 20 40 18 L38 16" fill="url(#trollSkin)" stroke="#5a6a4a" stroke-width="0.5"/>
  <!-- Drool -->
  <path d="M24 18 Q24 20 23 22" fill="none" stroke="#8a9a7a" stroke-width="0.4" opacity="0.5"/>
  <!-- Warts -->
  <circle cx="19" cy="8" r="0.6" fill="#5a6a3a"/>
  <circle cx="30" cy="14" r="0.5" fill="#5a6a3a"/>
  <circle cx="16" cy="14" r="0.5" fill="#5a6a3a"/>
</svg>