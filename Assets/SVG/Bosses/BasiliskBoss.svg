<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="snakeSkin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6a2a"/>
      <stop offset="100%" stop-color="#1a4a1a"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8a3a"/>
      <stop offset="100%" stop-color="#3a7a2a"/>
    </linearGradient>
    <radialGradient id="deadlyEye" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffff00"/>
      <stop offset="60%" stop-color="#e0c000"/>
      <stop offset="100%" stop-color="#aa8a00"/>
    </radialGradient>
  </defs>
  <!-- Serpent body coils in background -->
  <path d="M4 44 Q8 36 16 38 Q24 40 28 34 Q32 28 40 32 Q46 36 44 44" fill="url(#snakeSkin)" stroke="#1a3a1a" stroke-width="0.5"/>
  <path d="M6 44 Q10 38 16 39 Q24 41 28 35" fill="url(#belly)" opacity="0.6"/>
  <!-- Scale pattern on body -->
  <path d="M10 40 Q12 39 14 40" fill="none" stroke="#1a4a1a" stroke-width="0.3"/>
  <path d="M18 38 Q20 37 22 38" fill="none" stroke="#1a4a1a" stroke-width="0.3"/>
  <path d="M30 32 Q32 31 34 32" fill="none" stroke="#1a4a1a" stroke-width="0.3"/>
  <!-- Massive head -->
  <path d="M10 8 Q8 14 10 22 Q14 28 24 28 Q34 28 38 22 Q40 14 38 8 Q34 2 24 2 Q14 2 10 8Z" fill="url(#snakeSkin)"/>
  <!-- Crown of scales on head -->
  <path d="M14 4 L12 0 L16 3" fill="#1a5a1a" stroke="#0a3a0a" stroke-width="0.3"/>
  <path d="M19 3 L18 -1 L22 2" fill="#1a5a1a" stroke="#0a3a0a" stroke-width="0.3"/>
  <path d="M24 2 L24 -2 L26 2" fill="#1a5a1a" stroke="#0a3a0a" stroke-width="0.3"/>
  <path d="M29 3 L30 -1 L32 3" fill="#1a5a1a" stroke="#0a3a0a" stroke-width="0.3"/>
  <path d="M34 4 L36 0 L35 4" fill="#1a5a1a" stroke="#0a3a0a" stroke-width="0.3"/>
  <!-- Head scales pattern -->
  <path d="M16 6 Q18 5 20 6" fill="none" stroke="#1a4a1a" stroke-width="0.4"/>
  <path d="M28 6 Q30 5 32 6" fill="none" stroke="#1a4a1a" stroke-width="0.4"/>
  <path d="M20 8 Q24 7 28 8" fill="none" stroke="#1a4a1a" stroke-width="0.4"/>
  <!-- Deadly yellow eyes -->
  <ellipse cx="18" cy="12" rx="3.5" ry="3" fill="url(#deadlyEye)"/>
  <ellipse cx="30" cy="12" rx="3.5" ry="3" fill="url(#deadlyEye)"/>
  <!-- Vertical slit pupils -->
  <ellipse cx="18" cy="12" rx="1" ry="2.5" fill="#1a1a00"/>
  <ellipse cx="30" cy="12" rx="1" ry="2.5" fill="#1a1a00"/>
  <!-- Eye gleam -->
  <circle cx="19.5" cy="11" r="0.6" fill="white" opacity="0.5"/>
  <circle cx="31.5" cy="11" r="0.6" fill="white" opacity="0.5"/>
  <!-- Ridge above eyes -->
  <path d="M14 9 Q18 8 22 10" fill="none" stroke="#0a3a0a" stroke-width="0.8"/>
  <path d="M26 10 Q30 8 34 9" fill="none" stroke="#0a3a0a" stroke-width="0.8"/>
  <!-- Nostril slits -->
  <ellipse cx="21" cy="17" rx="0.8" ry="0.5" fill="#0a2a0a"/>
  <ellipse cx="27" cy="17" rx="0.8" ry="0.5" fill="#0a2a0a"/>
  <!-- Open mouth with fangs -->
  <path d="M14 22 Q24 30 34 22" fill="#4a1a1a"/>
  <path d="M14 22 Q24 26 34 22" fill="#6a2a2a"/>
  <!-- Fangs -->
  <path d="M18 22 L17 28 L19 23" fill="#f0f0e0" stroke="#d0d0c0" stroke-width="0.2"/>
  <path d="M30 22 L31 28 L29 23" fill="#f0f0e0" stroke="#d0d0c0" stroke-width="0.2"/>
  <!-- Smaller teeth -->
  <path d="M22 24 L22 26 L23 24" fill="#e0e0d0"/>
  <path d="M26 24 L26 26 L25 24" fill="#e0e0d0"/>
  <!-- Venom dripping from fangs -->
  <path d="M17 28 Q17 31 16 34" fill="none" stroke="#4aaa2a" stroke-width="0.5" opacity="0.7"/>
  <circle cx="16" cy="34" r="0.6" fill="#4aaa2a" opacity="0.6"/>
  <path d="M31 28 Q31 30 32 33" fill="none" stroke="#4aaa2a" stroke-width="0.5" opacity="0.7"/>
  <circle cx="32" cy="33" r="0.5" fill="#4aaa2a" opacity="0.5"/>
  <!-- Forked tongue -->
  <path d="M24 28 Q24 32 22 34" fill="none" stroke="#cc3030" stroke-width="0.5"/>
  <path d="M24 28 Q24 32 26 34" fill="none" stroke="#cc3030" stroke-width="0.5"/>
</svg>