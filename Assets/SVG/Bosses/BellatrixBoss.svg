<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="blackRobe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="wildHair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2a1a1a"/>
    </linearGradient>
  </defs>
  <!-- Black Death Eater robes -->
  <path d="M8 32 Q10 26 18 24 L24 23 L30 24 Q38 26 40 32 L40 48 L8 48Z" fill="url(#blackRobe)"/>
  <!-- Corset-like bodice detail -->
  <path d="M18 24 L20 28 L24 29 L28 28 L30 24" fill="none" stroke="#3a3a3a" stroke-width="0.4"/>
  <path d="M20 25 L24 26 L28 25" fill="none" stroke="#3a3a3a" stroke-width="0.3"/>
  <!-- Skull pendant -->
  <circle cx="24" cy="26" r="1" fill="#d0d0c0"/>
  <circle cx="23.5" cy="25.8" r="0.2" fill="#2a2a2a"/>
  <circle cx="24.5" cy="25.8" r="0.2" fill="#2a2a2a"/>
  <!-- Pale gaunt neck -->
  <rect x="20" y="20" width="8" height="4" rx="2" fill="#e0d4c4"/>
  <!-- Gaunt face -->
  <ellipse cx="24" cy="15" rx="7" ry="7.5" fill="#e0d4c4"/>
  <!-- Wild dark curly hair - massive -->
  <path d="M14 10 Q10 4 12 0 Q16 -2 20 0 Q22 -2 24 -1 Q26 -2 28 0 Q32 -2 36 0 Q38 4 34 10" fill="url(#wildHair)"/>
  <path d="M14 10 Q10 8 8 12 Q6 16 8 20 Q10 22 12 20" fill="url(#wildHair)"/>
  <path d="M34 10 Q38 8 40 12 Q42 16 40 20 Q38 22 36 20" fill="url(#wildHair)"/>
  <!-- Wild curl tendrils -->
  <path d="M8 14 Q6 16 7 18 Q8 16 9 18" fill="none" stroke="#2a1a1a" stroke-width="0.6"/>
  <path d="M40 14 Q42 16 41 18 Q40 16 39 18" fill="none" stroke="#2a1a1a" stroke-width="0.6"/>
  <path d="M10 18 Q8 20 9 22" fill="none" stroke="#2a1a1a" stroke-width="0.5"/>
  <path d="M38 18 Q40 20 39 22" fill="none" stroke="#2a1a1a" stroke-width="0.5"/>
  <path d="M12 2 Q10 0 11 -1" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  <path d="M36 2 Q38 0 37 -1" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- Hollowed cheekbones -->
  <path d="M17 16 Q18 18 19 16" fill="#d0c4b0" opacity="0.4"/>
  <path d="M29 16 Q30 18 31 16" fill="#d0c4b0" opacity="0.4"/>
  <!-- Heavy-lidded dark eyebrows -->
  <path d="M19 11 Q21 10 23 11.5" fill="none" stroke="#2a1a1a" stroke-width="0.7"/>
  <path d="M25 11.5 Q27 10 29 11" fill="none" stroke="#2a1a1a" stroke-width="0.7"/>
  <!-- Heavy-lidded mad eyes -->
  <path d="M19 12 Q21 11.5 23 12.5" fill="#2a1a1a" opacity="0.4"/>
  <path d="M25 12.5 Q27 11.5 29 12" fill="#2a1a1a" opacity="0.4"/>
  <ellipse cx="21" cy="13.5" rx="1.8" ry="1.5" fill="white"/>
  <ellipse cx="27" cy="13.5" rx="1.8" ry="1.5" fill="white"/>
  <circle cx="21" cy="13.5" r="1" fill="#2a2a2a"/>
  <circle cx="27" cy="13.5" r="1" fill="#2a2a2a"/>
  <circle cx="21" cy="13.5" r="0.4" fill="#1a1a1a"/>
  <circle cx="27" cy="13.5" r="0.4" fill="#1a1a1a"/>
  <!-- Mad gleam in eyes -->
  <circle cx="21.4" cy="13" r="0.25" fill="white" opacity="0.9"/>
  <circle cx="27.4" cy="13" r="0.25" fill="white" opacity="0.9"/>
  <!-- Nose -->
  <path d="M24 14 Q23.5 16 24 17" fill="none" stroke="#c8a890" stroke-width="0.4"/>
  <!-- Cruel grinning mouth -->
  <path d="M20 19 Q24 21 28 19" fill="none" stroke="#6a2a2a" stroke-width="0.6"/>
  <path d="M21 19.3 Q24 20.5 27 19.3" fill="#4a1a1a" opacity="0.3"/>
  <!-- Teeth showing in cruel grin -->
  <path d="M22 19.5 L22 20" fill="none" stroke="white" stroke-width="0.3"/>
  <path d="M24 19.8 L24 20.5" fill="none" stroke="white" stroke-width="0.3"/>
  <path d="M26 19.5 L26 20" fill="none" stroke="white" stroke-width="0.3"/>
  <!-- Wand raised - casting -->
  <line x1="40" y1="20" x2="46" y2="8" stroke="#3a2a1a" stroke-width="1" stroke-linecap="round"/>
  <!-- Spell effect at wand tip -->
  <circle cx="46" cy="8" r="2" fill="#aa2a4a" opacity="0.4"/>
  <circle cx="46" cy="8" r="1" fill="#ff4a6a" opacity="0.6"/>
  <!-- Spell sparks -->
  <circle cx="44" cy="6" r="0.3" fill="#ff4a6a" opacity="0.5"/>
  <circle cx="47" cy="6" r="0.25" fill="#ff4a6a" opacity="0.4"/>
  <circle cx="45" cy="10" r="0.3" fill="#aa2a4a" opacity="0.4"/>
  <!-- Dark Mark tattoo hint on arm -->
  <path d="M38 26 Q39 25 40 26" fill="none" stroke="#2a4a2a" stroke-width="0.3" opacity="0.4"/>
</svg>