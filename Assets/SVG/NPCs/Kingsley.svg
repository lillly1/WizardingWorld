<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a3d9a"/>
      <stop offset="100%" stop-color="#4a2070"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5e3c"/>
      <stop offset="100%" stop-color="#6d4a30"/>
    </linearGradient>
  </defs>
  <!-- Purple Auror robes -->
  <path d="M5 28 Q7 23 13 22 L18 21 L23 22 Q29 23 31 28 L31 36 L5 36Z" fill="url(#robe)"/>
  <!-- Robe gold trim -->
  <path d="M13 22 Q16 23.5 18 23.5 Q20 23.5 23 22" fill="none" stroke="#c4a44a" stroke-width="0.6"/>
  <path d="M5 28 Q7 25 13 22" fill="none" stroke="#c4a44a" stroke-width="0.4"/>
  <path d="M31 28 Q29 25 23 22" fill="none" stroke="#c4a44a" stroke-width="0.4"/>
  <!-- Gold clasp -->
  <circle cx="18" cy="24" r="1" fill="#d4a44a" stroke="#b08830" stroke-width="0.3"/>
  <!-- Thick neck -->
  <rect x="15" y="18.5" width="6" height="3.5" rx="2" fill="url(#skin)"/>
  <!-- Strong bald head -->
  <ellipse cx="18" cy="13" rx="7" ry="7.5" fill="url(#skin)"/>
  <!-- Head highlight/sheen -->
  <ellipse cx="17" cy="9" rx="3" ry="2" fill="#9a7050" opacity="0.3"/>
  <!-- Strong brow -->
  <path d="M12 11.5 Q15 10.5 17.5 11" fill="none" stroke="#5a3a20" stroke-width="0.6"/>
  <path d="M18.5 11 Q21 10.5 24 11.5" fill="none" stroke="#5a3a20" stroke-width="0.6"/>
  <!-- Commanding eyes -->
  <ellipse cx="15.5" cy="13" rx="1.5" ry="1.2" fill="white"/>
  <ellipse cx="20.5" cy="13" rx="1.5" ry="1.2" fill="white"/>
  <circle cx="15.5" cy="13" r="0.8" fill="#3a2a1a"/>
  <circle cx="20.5" cy="13" r="0.8" fill="#3a2a1a"/>
  <circle cx="15.5" cy="13" r="0.35" fill="#1a1a1a"/>
  <circle cx="20.5" cy="13" r="0.35" fill="#1a1a1a"/>
  <!-- Eye gleam -->
  <circle cx="15.8" cy="12.7" r="0.2" fill="white" opacity="0.7"/>
  <circle cx="20.8" cy="12.7" r="0.2" fill="white" opacity="0.7"/>
  <!-- Broad nose -->
  <path d="M17 14 Q17 15.5 16.5 16.5 Q17.5 17 18.5 17 Q19.5 16.5 19 15.5 Q19 14 18 14" fill="#7a4e32" opacity="0.5"/>
  <!-- Strong jaw/mouth -->
  <path d="M16 18 Q18 18.5 20 18" fill="none" stroke="#5a3820" stroke-width="0.4"/>
  <!-- Single gold earring - left ear -->
  <circle cx="11.5" cy="14" r="0.8" fill="#ffd700" stroke="#cc9900" stroke-width="0.2"/>
  <circle cx="11.5" cy="14" r="0.4" fill="#6d4a30"/>
  <!-- Ears -->
  <ellipse cx="11" cy="13" rx="1" ry="1.5" fill="url(#skin)"/>
  <ellipse cx="25" cy="13" rx="1" ry="1.5" fill="url(#skin)"/>
  <!-- Gold Auror badge on chest -->
  <path d="M20 28 L21 27 L22 28 L21.5 29 L20.5 29Z" fill="#ffd700" stroke="#cc9900" stroke-width="0.2"/>
</svg>