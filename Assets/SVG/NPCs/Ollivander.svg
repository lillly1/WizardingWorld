<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b7355"/>
      <stop offset="100%" stop-color="#5c4a32"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
  </defs>
  <!-- Robes/shoulders -->
  <path d="M6 28 Q8 24 14 23 L18 22 L22 23 Q28 24 30 28 L30 36 L6 36Z" fill="url(#robe)"/>
  <path d="M14 23 L16 25 L18 25.5 L20 25 L22 23" fill="none" stroke="#6b5a42" stroke-width="0.5"/>
  <!-- Collar detail -->
  <path d="M14 23 Q16 24 18 24 Q20 24 22 23" fill="#7a6848" stroke="#5c4a32" stroke-width="0.3"/>
  <!-- Neck - thin -->
  <rect x="16.5" y="19.5" width="3" height="3" rx="1" fill="#e8ccaa"/>
  <!-- Head - thin/gaunt -->
  <ellipse cx="18" cy="14.5" rx="5.5" ry="6.5" fill="#e8ccaa"/>
  <!-- Wild silver hair -->
  <path d="M12.5 11 Q10 8 9 10 Q8 13 9 16 Q10 18 11 17" fill="url(#hair)"/>
  <path d="M23.5 11 Q26 8 27 10 Q28 13 27 16 Q26 18 25 17" fill="url(#hair)"/>
  <path d="M12 10 Q14 6 18 5.5 Q22 6 24 10" fill="url(#hair)"/>
  <path d="M10 12 Q9 15 10 18" fill="none" stroke="#b0b0b0" stroke-width="0.5"/>
  <path d="M26 12 Q27 15 26 18" fill="none" stroke="#b0b0b0" stroke-width="0.5"/>
  <!-- Wild hair wisps -->
  <path d="M10 9 Q8 7 9 6" fill="none" stroke="#c0c0c0" stroke-width="0.6"/>
  <path d="M26 9 Q28 7 27 6" fill="none" stroke="#c0c0c0" stroke-width="0.6"/>
  <path d="M15 6 Q14 4 15 3" fill="none" stroke="#c0c0c0" stroke-width="0.5"/>
  <path d="M21 6 Q22 4 21 3" fill="none" stroke="#c0c0c0" stroke-width="0.5"/>
  <!-- Eyebrows - wispy -->
  <path d="M14 12.5 Q15.5 11.5 17 12.5" fill="none" stroke="#a0a0a0" stroke-width="0.5"/>
  <path d="M19 12.5 Q20.5 11.5 22 12.5" fill="none" stroke="#a0a0a0" stroke-width="0.5"/>
  <!-- Large pale eyes -->
  <ellipse cx="15.5" cy="14" rx="1.5" ry="1.3" fill="white"/>
  <ellipse cx="20.5" cy="14" rx="1.5" ry="1.3" fill="white"/>
  <circle cx="15.5" cy="14" r="0.9" fill="#c0cde0"/>
  <circle cx="20.5" cy="14" r="0.9" fill="#c0cde0"/>
  <circle cx="15.5" cy="14" r="0.4" fill="#2a2a3e"/>
  <circle cx="20.5" cy="14" r="0.4" fill="#2a2a3e"/>
  <!-- Eye gleam -->
  <circle cx="15.8" cy="13.6" r="0.2" fill="white" opacity="0.8"/>
  <circle cx="20.8" cy="13.6" r="0.2" fill="white" opacity="0.8"/>
  <!-- Thin nose -->
  <path d="M18 14 L17.5 17 L18 17.5 L18.5 17" fill="none" stroke="#c4a882" stroke-width="0.4"/>
  <!-- Thin mouth -->
  <path d="M16.5 19 Q18 19.5 19.5 19" fill="none" stroke="#b08060" stroke-width="0.35"/>
  <!-- Wrinkles -->
  <path d="M13 16 Q14 16.5 14.5 16" fill="none" stroke="#d4b894" stroke-width="0.2" opacity="0.5"/>
  <path d="M21.5 16 Q22 16.5 23 16" fill="none" stroke="#d4b894" stroke-width="0.2" opacity="0.5"/>
  <!-- Wand held near shoulder -->
  <line x1="28" y1="20" x2="32" y2="12" stroke="#8b6d3f" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="32" cy="12" r="0.5" fill="#ffd700" opacity="0.6"/>
</svg>