<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="healRobe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a8a4a"/>
      <stop offset="100%" stop-color="#2a6a3a"/>
    </linearGradient>
    <linearGradient id="aura" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90e0a0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#60c070" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Healing aura glow behind -->
  <ellipse cx="18" cy="18" rx="16" ry="16" fill="url(#aura)"/>
  <!-- Green St Mungo's robes -->
  <path d="M6 28 Q8 24 13 23 L18 22 L23 23 Q28 24 30 28 L30 36 L6 36Z" fill="url(#healRobe)"/>
  <!-- Lime green trim -->
  <path d="M13 23 Q16 24 18 24 Q20 24 23 23" fill="none" stroke="#70d080" stroke-width="0.7"/>
  <!-- St Mungo's crossed wand and bone emblem -->
  <line x1="16.5" y1="27" x2="19.5" y2="31" stroke="#e0d8c0" stroke-width="0.5"/>
  <line x1="19.5" y1="27" x2="16.5" y2="31" stroke="#e0d8c0" stroke-width="0.5"/>
  <circle cx="18" cy="29" r="1" fill="none" stroke="#e0d8c0" stroke-width="0.4"/>
  <!-- Neck -->
  <rect x="16" y="19.5" width="4" height="3" rx="1" fill="#f0d4b4"/>
  <!-- Gentle face -->
  <ellipse cx="18" cy="14.5" rx="6" ry="6.5" fill="#f0d4b4"/>
  <!-- Neat brown hair -->
  <path d="M12 12 Q13 7 18 6 Q23 7 24 12" fill="#7a5a3a"/>
  <path d="M12 12 Q11.5 13 12 14" fill="#7a5a3a"/>
  <path d="M24 12 Q24.5 13 24 14" fill="#7a5a3a"/>
  <!-- Gentle eyebrows -->
  <path d="M14 12.5 Q15.5 12 17 12.5" fill="none" stroke="#5a4a2a" stroke-width="0.4"/>
  <path d="M19 12.5 Q20.5 12 22 12.5" fill="none" stroke="#5a4a2a" stroke-width="0.4"/>
  <!-- Warm kind eyes -->
  <ellipse cx="15.5" cy="14" rx="1.4" ry="1.2" fill="white"/>
  <ellipse cx="20.5" cy="14" rx="1.4" ry="1.2" fill="white"/>
  <circle cx="15.5" cy="14" r="0.8" fill="#5a8a4a"/>
  <circle cx="20.5" cy="14" r="0.8" fill="#5a8a4a"/>
  <circle cx="15.5" cy="14" r="0.35" fill="#1a1a2e"/>
  <circle cx="20.5" cy="14" r="0.35" fill="#1a1a2e"/>
  <circle cx="15.8" cy="13.7" r="0.2" fill="white" opacity="0.7"/>
  <circle cx="20.8" cy="13.7" r="0.2" fill="white" opacity="0.7"/>
  <!-- Nose -->
  <path d="M18 14 Q17.5 16 18 17" fill="none" stroke="#d4a882" stroke-width="0.4"/>
  <!-- Warm smile -->
  <path d="M16 18 Q18 19.5 20 18" fill="none" stroke="#b07060" stroke-width="0.4"/>
  <!-- Wand with healing glow -->
  <line x1="29" y1="22" x2="33" y2="15" stroke="#a0845a" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="33" cy="15" r="1.5" fill="#70e080" opacity="0.4"/>
  <circle cx="33" cy="15" r="0.8" fill="#a0ff90" opacity="0.6"/>
  <!-- Small healing sparkles -->
  <circle cx="31" cy="17" r="0.3" fill="#90e0a0" opacity="0.6"/>
  <circle cx="32" cy="13" r="0.25" fill="#90e0a0" opacity="0.5"/>
  <circle cx="34" cy="16" r="0.2" fill="#a0ffa0" opacity="0.5"/>
