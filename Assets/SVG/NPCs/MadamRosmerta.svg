<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a3a5a"/>
      <stop offset="100%" stop-color="#4a2040"/>
    </linearGradient>
    <linearGradient id="curls" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0b040"/>
      <stop offset="100%" stop-color="#c49030"/>
    </linearGradient>
  </defs>
  <!-- Barmaid dress -->
  <path d="M6 27 Q9 23 14 22 L18 21 L22 22 Q27 23 30 27 L30 36 L6 36Z" fill="url(#dress)"/>
  <!-- Low neckline detail -->
  <path d="M14 22 Q16 24 18 24.5 Q20 24 22 22" fill="#5a2a4a" stroke="#7a4a6a" stroke-width="0.3"/>
  <!-- White lace trim -->
  <path d="M13 22 Q15 23 18 23.5 Q21 23 23 22" fill="none" stroke="#e8e0d8" stroke-width="0.5"/>
  <!-- Apron -->
  <path d="M14 26 L14 36 L22 36 L22 26 Q20 25 18 25 Q16 25 14 26Z" fill="#e8dcd0" opacity="0.6"/>
  <!-- Neck -->
  <rect x="16" y="19" width="4" height="3" rx="1" fill="#f4d4b8"/>
  <!-- Head - attractive face -->
  <ellipse cx="18" cy="14" rx="6" ry="6.5" fill="#f4d4b8"/>
  <!-- Golden curls -->
  <path d="M12 11 Q13 6 18 5 Q23 6 24 11" fill="url(#curls)"/>
  <path d="M12 11 Q10 13 10 16 Q11 18 12 17" fill="url(#curls)"/>
  <path d="M24 11 Q26 13 26 16 Q25 18 24 17" fill="url(#curls)"/>
  <!-- Curl ringlets -->
  <path d="M10 14 Q9 15 10 16 Q11 15 10 14" fill="#d4a030"/>
  <path d="M26 14 Q27 15 26 16 Q25 15 26 14" fill="#d4a030"/>
  <path d="M11 16 Q10 17 11 18" fill="none" stroke="#c49030" stroke-width="0.5"/>
  <path d="M25 16 Q26 17 25 18" fill="none" stroke="#c49030" stroke-width="0.5"/>
  <path d="M12 10 Q11 11 12 12" fill="none" stroke="#d4a030" stroke-width="0.5"/>
  <path d="M24 10 Q25 11 24 12" fill="none" stroke="#d4a030" stroke-width="0.5"/>
  <!-- Pretty arched eyebrows -->
  <path d="M14 12 Q15.5 11 17 12" fill="none" stroke="#8a6a30" stroke-width="0.4"/>
  <path d="M19 12 Q20.5 11 22 12" fill="none" stroke="#8a6a30" stroke-width="0.4"/>
  <!-- Attractive eyes -->
  <ellipse cx="15.5" cy="13.5" rx="1.4" ry="1.2" fill="white"/>
  <ellipse cx="20.5" cy="13.5" rx="1.4" ry="1.2" fill="white"/>
  <circle cx="15.5" cy="13.5" r="0.8" fill="#5a7a4a"/>
  <circle cx="20.5" cy="13.5" r="0.8" fill="#5a7a4a"/>
  <circle cx="15.5" cy="13.5" r="0.35" fill="#1a1a2e"/>
  <circle cx="20.5" cy="13.5" r="0.35" fill="#1a1a2e"/>
  <!-- Long eyelashes -->
  <path d="M14 13 L13.5 12.5" fill="none" stroke="#5a4a2a" stroke-width="0.2"/>
  <path d="M17 13 L17.2 12.3" fill="none" stroke="#5a4a2a" stroke-width="0.2"/>
  <path d="M19 13 L18.8 12.3" fill="none" stroke="#5a4a2a" stroke-width="0.2"/>
  <path d="M22 13 L22.5 12.5" fill="none" stroke="#5a4a2a" stroke-width="0.2"/>
  <!-- Small nose -->
  <path d="M18 14 Q17.5 15.5 18 16" fill="none" stroke="#d4a882" stroke-width="0.35"/>
  <!-- Warm friendly smile -->
  <path d="M15.5 17.5 Q18 19 20.5 17.5" fill="none" stroke="#c07060" stroke-width="0.5"/>
  <path d="M16 17.8 Q18 18.5 20 17.8" fill="#e0a0a0" opacity="0.3"/>
  <!-- Rosy cheeks -->
  <circle cx="13.5" cy="15.5" r="1.2" fill="#e0a090" opacity="0.25"/>
  <circle cx="22.5" cy="15.5" r="1.2" fill="#e0a090" opacity="0.25"/>
  <!-- Beauty mark -->
  <circle cx="21" cy="16" r="0.25" fill="#5a3a2a"/>
</svg>