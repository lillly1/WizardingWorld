<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a2d8a"/>
      <stop offset="100%" stop-color="#2d1a5e"/>
    </linearGradient>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b3a9e"/>
      <stop offset="100%" stop-color="#3a1f6e"/>
    </linearGradient>
    <linearGradient id="beard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0ece4"/>
      <stop offset="100%" stop-color="#d4cfc4"/>
    </linearGradient>
  </defs>
  <!-- Robes/shoulders -->
  <path d="M6 30 Q6 26 12 24 L18 23 L24 24 Q30 26 30 30 L30 36 L6 36Z" fill="url(#robe)"/>
  <path d="M12 24 L14 27 L18 28 L22 27 L24 24" fill="none" stroke="#7b5cbf" stroke-width="0.5"/>
  <!-- Stars on robe -->
  <circle cx="10" cy="33" r="0.5" fill="#c4a6f0" opacity="0.7"/>
  <circle cx="26" cy="31" r="0.4" fill="#c4a6f0" opacity="0.6"/>
  <circle cx="14" cy="35" r="0.3" fill="#dcc8f5" opacity="0.5"/>
  <circle cx="22" cy="34" r="0.4" fill="#c4a6f0" opacity="0.6"/>
  <!-- Neck -->
  <rect x="16" y="21" width="4" height="3" rx="1" fill="#f2d1b3"/>
  <!-- Head -->
  <ellipse cx="18" cy="17" rx="6" ry="7" fill="#f2d1b3"/>
  <!-- Long white hair sides -->
  <path d="M12 14 Q10 17 11 24" fill="#e8e4dc" stroke="#d4cfc4" stroke-width="0.3"/>
  <path d="M24 14 Q26 17 25 24" fill="#e8e4dc" stroke="#d4cfc4" stroke-width="0.3"/>
  <path d="M11 14 Q10 18 10.5 24" fill="#e8e4dc"/>
  <path d="M25 14 Q26 18 25.5 24" fill="#e8e4dc"/>
  <!-- Pointed wizard hat -->
  <path d="M10 13 Q11 12 13 11 L17 1 Q18 0 19 1 L23 11 Q25 12 26 13 Q24 12 18 11 Q12 12 10 13Z" fill="url(#hat)"/>
  <path d="M10 13 Q12 14 18 14 Q24 14 26 13 Q24 12 18 11 Q12 12 10 13Z" fill="#3a2070"/>
  <!-- Hat stars -->
  <circle cx="16" cy="5" r="0.4" fill="#ffd700" opacity="0.8"/>
  <circle cx="20" cy="8" r="0.3" fill="#ffd700" opacity="0.7"/>
  <circle cx="15" cy="9" r="0.35" fill="#ffd700" opacity="0.6"/>
  <!-- Eyebrows -->
  <path d="M14 15 Q15 14 16.5 14.5" fill="none" stroke="#c8c0b0" stroke-width="0.5"/>
  <path d="M19.5 14.5 Q21 14 22 15" fill="none" stroke="#c8c0b0" stroke-width="0.5"/>
  <!-- Eyes -->
  <ellipse cx="15.5" cy="16" rx="1.2" ry="1" fill="white"/>
  <ellipse cx="20.5" cy="16" rx="1.2" ry="1" fill="white"/>
  <circle cx="15.5" cy="16" r="0.6" fill="#4a8bbf"/>
  <circle cx="20.5" cy="16" r="0.6" fill="#4a8bbf"/>
  <circle cx="15.5" cy="16" r="0.25" fill="#1a1a2e"/>
  <circle cx="20.5" cy="16" r="0.25" fill="#1a1a2e"/>
  <!-- Half-moon spectacles -->
  <path d="M13.8 16 Q13.8 17.5 15.5 17.5 Q17.2 17.5 17.2 16" fill="none" stroke="#c4a44a" stroke-width="0.4"/>
  <path d="M18.8 16 Q18.8 17.5 20.5 17.5 Q22.2 17.5 22.2 16" fill="none" stroke="#c4a44a" stroke-width="0.4"/>
  <line x1="17.2" y1="16.3" x2="18.8" y2="16.3" stroke="#c4a44a" stroke-width="0.3"/>
  <!-- Crooked nose -->
  <path d="M18 16 Q17.5 17.5 18 18.5" fill="none" stroke="#d4a882" stroke-width="0.5"/>
  <!-- Gentle smile -->
  <path d="M16 20 Q18 21.2 20 20" fill="none" stroke="#c47a5a" stroke-width="0.4"/>
  <!-- Long white beard -->
  <path d="M14 19 Q13 21 12 26 Q14 30 18 31 Q22 30 24 26 Q23 21 22 19" fill="url(#beard)"/>
  <path d="M15 20 Q14 23 14 27" fill="none" stroke="#d4cfc4" stroke-width="0.3" opacity="0.5"/>
  <path d="M18 20 Q18 25 18 30" fill="none" stroke="#d4cfc4" stroke-width="0.3" opacity="0.5"/>
  <path d="M21 20 Q22 23 22 27" fill="none" stroke="#d4cfc4" stroke-width="0.3" opacity="0.5"/>
</svg>