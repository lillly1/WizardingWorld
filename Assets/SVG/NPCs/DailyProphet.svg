<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="owlBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a6a40"/>
      <stop offset="100%" stop-color="#5a4a2a"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4ece0"/>
      <stop offset="100%" stop-color="#e0d8c8"/>
    </linearGradient>
  </defs>
  <!-- Newspaper being carried - angled -->
  <rect x="4" y="22" width="14" height="10" rx="0.5" fill="url(#paper)" transform="rotate(-10 11 27)"/>
  <!-- Newspaper headline -->
  <text x="6" y="26" font-family="serif" font-size="2" font-weight="bold" fill="#2a2a2a" transform="rotate(-10 11 27)">DAILY</text>
  <text x="5" y="29" font-family="serif" font-size="2.5" font-weight="bold" fill="#2a2a2a" transform="rotate(-10 11 27)">PROPHET</text>
  <!-- Newspaper lines -->
  <line x1="6" y1="30" x2="16" y2="30" stroke="#8a8a7a" stroke-width="0.2" transform="rotate(-10 11 27)"/>
  <line x1="6" y1="31" x2="14" y2="31" stroke="#8a8a7a" stroke-width="0.2" transform="rotate(-10 11 27)"/>
  <!-- Moving photo rectangle on paper -->
  <rect x="11" y="25" width="5" height="4" rx="0.3" fill="#c8c0b0" stroke="#8a8070" stroke-width="0.2" transform="rotate(-10 11 27)"/>
  <!-- Sparkle on photo - magic moving -->
  <circle cx="14" cy="26" r="0.3" fill="#ffd700" opacity="0.6" transform="rotate(-10 11 27)"/>
  <!-- Owl body -->
  <ellipse cx="22" cy="18" rx="7" ry="8" fill="url(#owlBody)"/>
  <!-- Owl chest feathers - lighter -->
  <ellipse cx="22" cy="20" rx="4.5" ry="5" fill="#a08050"/>
  <!-- Chest feather pattern -->
  <path d="M20 17 Q22 18 24 17" fill="none" stroke="#8a6a3a" stroke-width="0.3"/>
  <path d="M19 19 Q22 20 25 19" fill="none" stroke="#8a6a3a" stroke-width="0.3"/>
  <path d="M19 21 Q22 22 25 21" fill="none" stroke="#8a6a3a" stroke-width="0.3"/>
  <!-- Owl head -->
  <ellipse cx="22" cy="10" rx="5.5" ry="5" fill="url(#owlBody)"/>
  <!-- Ear tufts -->
  <path d="M17 7 L16 3 L18 6" fill="#6a4a2a"/>
  <path d="M27 7 L28 3 L26 6" fill="#6a4a2a"/>
  <!-- Facial disc -->
  <ellipse cx="20" cy="10" rx="2.5" ry="2.5" fill="#c4a060"/>
  <ellipse cx="24" cy="10" rx="2.5" ry="2.5" fill="#c4a060"/>
  <!-- Large owl eyes -->
  <circle cx="20" cy="10" r="1.8" fill="white"/>
  <circle cx="24" cy="10" r="1.8" fill="white"/>
  <circle cx="20" cy="10" r="1.1" fill="#d4a020"/>
  <circle cx="24" cy="10" r="1.1" fill="#d4a020"/>
  <circle cx="20" cy="10" r="0.5" fill="#1a1a1a"/>
  <circle cx="24" cy="10" r="0.5" fill="#1a1a1a"/>
  <!-- Eye gleam -->
  <circle cx="20.4" cy="9.5" r="0.25" fill="white" opacity="0.8"/>
  <circle cx="24.4" cy="9.5" r="0.25" fill="white" opacity="0.8"/>
  <!-- Beak -->
  <path d="M21 12 L22 14 L23 12" fill="#4a4a3a" stroke="#3a3a2a" stroke-width="0.2"/>
  <!-- Talons gripping newspaper -->
  <path d="M18 25 L17 26 L18 27" fill="none" stroke="#5a4a2a" stroke-width="0.5"/>
  <path d="M20 25 L19 26 L20 27" fill="none" stroke="#5a4a2a" stroke-width="0.5"/>
  <!-- Wing hints -->
  <path d="M15 15 Q14 18 15 22" fill="none" stroke="#6a4a2a" stroke-width="0.5"/>
  <path d="M29 15 Q30 18 29 22" fill="none" stroke="#6a4a2a" stroke-width="0.5"/>
  <!-- Magic sparkles around newspaper -->
  <circle cx="5" cy="20" r="0.4" fill="#ffd700" opacity="0.5"/>
  <circle cx="3" cy="25" r="0.3" fill="#ffd700" opacity="0.4"/>
  <circle cx="8" cy="34" r="0.35" fill="#ffd700" opacity="0.4"/>
</svg>