<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a7a60"/>
      <stop offset="100%" stop-color="#5c4e38"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9a8a6a"/>
      <stop offset="60%" stop-color="#8a7a5a"/>
      <stop offset="100%" stop-color="#a0a090"/>
    </linearGradient>
  </defs>
  <!-- Shabby brown robes -->
  <path d="M6 28 Q8 24 13 23 L18 22 L23 23 Q28 24 30 28 L30 36 L6 36Z" fill="url(#robe)"/>
  <!-- Patched spots on robes -->
  <ellipse cx="10" cy="32" rx="1.5" ry="1" fill="#7a6a4a" stroke="#6a5a3a" stroke-width="0.3"/>
  <ellipse cx="25" cy="34" rx="1.2" ry="0.8" fill="#7a6a4a" stroke="#6a5a3a" stroke-width="0.3"/>
  <!-- Frayed collar -->
  <path d="M13 23 Q16 24 18 24.5 Q20 24 23 23" fill="#6a5a40" stroke="#5c4e38" stroke-width="0.3"/>
  <!-- Thin neck -->
  <rect x="16" y="19.5" width="4" height="3" rx="1" fill="#d8b890"/>
  <!-- Head - slightly gaunt -->
  <ellipse cx="18" cy="14.5" rx="6" ry="6.5" fill="#d8b890"/>
  <!-- Light brown/graying hair -->
  <path d="M12 12 Q13 7 18 6.5 Q23 7 24 12" fill="url(#hair)"/>
  <path d="M12 12 Q11 14 11.5 16" fill="url(#hair)"/>
  <path d="M24 12 Q25 14 24.5 16" fill="url(#hair)"/>
  <!-- Gray streaks in hair -->
  <path d="M14 8 Q15 7 16 7.5" fill="none" stroke="#b0b0a0" stroke-width="0.4"/>
  <path d="M20 7.5 Q21 7 22 8" fill="none" stroke="#b0b0a0" stroke-width="0.4"/>
  <path d="M12.5 11 Q12 13 12 15" fill="none" stroke="#b0b0a0" stroke-width="0.3"/>
  <!-- Scars on face -->
  <path d="M14 12 L13 15" fill="none" stroke="#c4a080" stroke-width="0.4" opacity="0.6"/>
  <path d="M22 11 L23 14" fill="none" stroke="#c4a080" stroke-width="0.4" opacity="0.6"/>
  <path d="M20 16 L21.5 18" fill="none" stroke="#c4a080" stroke-width="0.3" opacity="0.5"/>
  <!-- Tired but kind eyebrows -->
  <path d="M14 12.5 Q15.5 12 17 12.5" fill="none" stroke="#7a6a4a" stroke-width="0.4"/>
  <path d="M19 12.5 Q20.5 12 22 12.5" fill="none" stroke="#7a6a4a" stroke-width="0.4"/>
  <!-- Tired kind eyes with shadows underneath -->
  <ellipse cx="15.5" cy="14" rx="1.3" ry="1.1" fill="white"/>
  <ellipse cx="20.5" cy="14" rx="1.3" ry="1.1" fill="white"/>
  <circle cx="15.5" cy="14" r="0.7" fill="#7a9a60"/>
  <circle cx="20.5" cy="14" r="0.7" fill="#7a9a60"/>
  <circle cx="15.5" cy="14" r="0.3" fill="#1a1a2e"/>
  <circle cx="20.5" cy="14" r="0.3" fill="#1a1a2e"/>
  <!-- Under-eye shadows -->
  <path d="M14 15.2 Q15.5 15.8 17 15.2" fill="none" stroke="#b09a7a" stroke-width="0.4" opacity="0.4"/>
  <path d="M19 15.2 Q20.5 15.8 22 15.2" fill="none" stroke="#b09a7a" stroke-width="0.4" opacity="0.4"/>
  <!-- Nose -->
  <path d="M18 14 Q17.5 16 18 17" fill="none" stroke="#c4a072" stroke-width="0.4"/>
  <!-- Gentle tired smile -->
  <path d="M16 18.5 Q18 19.5 20 18.5" fill="none" stroke="#a07060" stroke-width="0.4"/>
  <!-- Slight stubble -->
  <circle cx="15" cy="19" r="0.15" fill="#8a7a5a" opacity="0.3"/>
  <circle cx="17" cy="19.5" r="0.15" fill="#8a7a5a" opacity="0.3"/>
  <circle cx="19" cy="19.5" r="0.15" fill="#8a7a5a" opacity="0.3"/>
  <circle cx="21" cy="19" r="0.15" fill="#8a7a5a" opacity="0.3"/>
</svg>