<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>
  <!-- Flying instructor robes -->
  <path d="M6 28 Q8 24 13 23 L18 22 L23 23 Q28 24 30 28 L30 36 L6 36Z" fill="url(#robe)"/>
  <!-- Hogwarts crest on chest -->
  <path d="M16 27 L18 25 L20 27 L18 29Z" fill="#8b1a1a" stroke="#c4a44a" stroke-width="0.3"/>
  <!-- Quidditch referee stripes -->
  <line x1="7" y1="30" x2="10" y2="29" stroke="#e8e0d0" stroke-width="0.5"/>
  <line x1="26" y1="29" x2="29" y2="30" stroke="#e8e0d0" stroke-width="0.5"/>
  <!-- Collar -->
  <path d="M13 23 Q16 24 18 24 Q20 24 23 23" fill="#5a5a5a" stroke="#3a3a3a" stroke-width="0.3"/>
  <!-- Neck -->
  <rect x="16" y="19.5" width="4" height="3" rx="1" fill="#f0d0b0"/>
  <!-- Head -->
  <ellipse cx="18" cy="14" rx="6" ry="6.5" fill="#f0d0b0"/>
  <!-- Short spiky gray hair -->
  <path d="M12 11 Q14 7 18 6 Q22 7 24 11" fill="#9a9a98"/>
  <path d="M12 11 Q11.5 12 12 13" fill="#9a9a98"/>
  <path d="M24 11 Q24.5 12 24 13" fill="#9a9a98"/>
  <!-- Spiky hair tips -->
  <path d="M13 8 L12 5" fill="none" stroke="#a0a0a0" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M16 7 L15 4" fill="none" stroke="#a0a0a0" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M18 6.5 L18 3.5" fill="none" stroke="#a0a0a0" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M20 7 L21 4" fill="none" stroke="#a0a0a0" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M23 8 L24 5" fill="none" stroke="#a0a0a0" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Sharp hawk-like eyebrows -->
  <path d="M13.5 12 L17 11" fill="none" stroke="#6a6a68" stroke-width="0.6"/>
  <path d="M19 11 L22.5 12" fill="none" stroke="#6a6a68" stroke-width="0.6"/>
  <!-- Yellow hawk-like eyes -->
  <ellipse cx="15.5" cy="13.5" rx="1.4" ry="1.2" fill="white"/>
  <ellipse cx="20.5" cy="13.5" rx="1.4" ry="1.2" fill="white"/>
  <circle cx="15.5" cy="13.5" r="0.9" fill="#d4a020"/>
  <circle cx="20.5" cy="13.5" r="0.9" fill="#d4a020"/>
  <circle cx="15.5" cy="13.5" r="0.4" fill="#1a1a1a"/>
  <circle cx="20.5" cy="13.5" r="0.4" fill="#1a1a1a"/>
  <!-- Hawk eye gleam -->
  <circle cx="15.8" cy="13.2" r="0.2" fill="white" opacity="0.8"/>
  <circle cx="20.8" cy="13.2" r="0.2" fill="white" opacity="0.8"/>
  <!-- Nose -->
  <path d="M18 14 Q17.5 15.5 18 16.5" fill="none" stroke="#d4a882" stroke-width="0.4"/>
  <!-- Firm mouth -->
  <path d="M16 18 Q18 17.5 20 18" fill="none" stroke="#b07060" stroke-width="0.4"/>
  <!-- Whistle around neck -->
  <path d="M14 22 Q16 21 18 22 Q20 21 22 22" fill="none" stroke="#c0c0c0" stroke-width="0.3"/>
  <ellipse cx="18" cy="22.5" rx="1" ry="0.6" fill="#d0d0d0" stroke="#a0a0a0" stroke-width="0.3"/>
  <circle cx="18.8" cy="22.5" r="0.2" fill="#a0a0a0"/>
</svg>