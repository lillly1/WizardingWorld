<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="robe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e0d8"/>
      <stop offset="100%" stop-color="#c0b8ae"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e4e0"/>
    </linearGradient>
  </defs>
  <!-- Medical robes/shoulders -->
  <path d="M6 28 Q8 24 13 23 L18 22 L23 23 Q28 24 30 28 L30 36 L6 36Z" fill="url(#robe)"/>
  <!-- Red cross emblem on chest -->
  <rect x="16.5" y="27" width="3" height="5" rx="0.3" fill="#cc3333"/>
  <rect x="15.5" y="28.5" width="5" height="2" rx="0.3" fill="#cc3333"/>
  <!-- Collar -->
  <path d="M14 23 Q16 24.5 18 24.5 Q20 24.5 22 23" fill="#f0ece6" stroke="#d0c8be" stroke-width="0.3"/>
  <!-- Neck -->
  <rect x="16" y="20" width="4" height="3" rx="1" fill="#f0d0b0"/>
  <!-- Head -->
  <ellipse cx="18" cy="15" rx="6" ry="6.5" fill="#f0d0b0"/>
  <!-- Hair tucked under cap -->
  <path d="M12.5 14 Q12 12 13 10 Q14 9 15 10" fill="#7a5a3a" stroke="none"/>
  <path d="M23.5 14 Q24 12 23 10 Q22 9 21 10" fill="#7a5a3a" stroke="none"/>
  <!-- White nurse cap/coif -->
  <path d="M11 12 Q12 7 18 6 Q24 7 25 12 L25 10 Q24 6 18 5 Q12 6 11 10Z" fill="url(#cap)" stroke="#d0ccc4" stroke-width="0.3"/>
  <path d="M11 10 Q12 8 18 7 Q24 8 25 10" fill="url(#cap)" stroke="#d0ccc4" stroke-width="0.3"/>
  <!-- Cap band -->
  <path d="M11 10.5 Q12 9 18 8.5 Q24 9 25 10.5" fill="none" stroke="#cc3333" stroke-width="0.5"/>
  <!-- Stern but caring eyebrows -->
  <path d="M14 13 L16.5 12.5" fill="none" stroke="#6a4a2a" stroke-width="0.5"/>
  <path d="M19.5 12.5 L22 13" fill="none" stroke="#6a4a2a" stroke-width="0.5"/>
  <!-- Eyes -->
  <ellipse cx="15.5" cy="14.5" rx="1.3" ry="1.1" fill="white"/>
  <ellipse cx="20.5" cy="14.5" rx="1.3" ry="1.1" fill="white"/>
  <circle cx="15.5" cy="14.5" r="0.7" fill="#5a7a4a"/>
  <circle cx="20.5" cy="14.5" r="0.7" fill="#5a7a4a"/>
  <circle cx="15.5" cy="14.5" r="0.3" fill="#1a1a2e"/>
  <circle cx="20.5" cy="14.5" r="0.3" fill="#1a1a2e"/>
  <!-- Nose -->
  <path d="M18 14.5 Q17.5 16 18 17" fill="none" stroke="#d4a882" stroke-width="0.4"/>
  <!-- Stern pursed lips -->
  <path d="M16.5 18.5 Q18 18 19.5 18.5" fill="none" stroke="#c07060" stroke-width="0.5"/>
  <path d="M16.8 18.8 Q18 19.2 19.2 18.8" fill="none" stroke="#b06050" stroke-width="0.3"/>
  <!-- Slight frown lines - stern expression -->
  <path d="M16 17.5 L16.5 18" fill="none" stroke="#d4b894" stroke-width="0.2" opacity="0.5"/>
  <path d="M20 17.5 L19.5 18" fill="none" stroke="#d4b894" stroke-width="0.2" opacity="0.5"/>
  <!-- Wand at side -->
  <line x1="30" y1="24" x2="33" y2="18" stroke="#a0845a" stroke-width="0.7" stroke-linecap="round"/>
</svg>