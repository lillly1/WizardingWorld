<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="redHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d44a1a"/>
      <stop offset="100%" stop-color="#b03a10"/>
    </linearGradient>
    <linearGradient id="jokeRobe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a2a8a"/>
      <stop offset="50%" stop-color="#e06020"/>
      <stop offset="100%" stop-color="#7a2a8a"/>
    </linearGradient>
  </defs>
  <!-- Fred (left) - magenta/orange joke shop jacket -->
  <path d="M0 28 Q2 24 6 23 L9 22 L12 23 Q16 24 18 28 L18 36 L0 36Z" fill="#e06020"/>
  <!-- George (right) - magenta joke shop jacket -->
  <path d="M18 28 Q20 24 24 23 L27 22 L30 23 Q34 24 36 28 L36 36 L18 36Z" fill="#8a2a9a"/>
  <!-- "W" logo on Fred's chest -->
  <text x="7" y="32" font-family="sans-serif" font-size="4" font-weight="bold" fill="#ffd700" text-anchor="middle">W</text>
  <!-- "W" logo on George's chest -->
  <text x="29" y="32" font-family="sans-serif" font-size="4" font-weight="bold" fill="#ffd700" text-anchor="middle">W</text>
  <!-- Fred's neck -->
  <rect x="7.5" y="19" width="3" height="3" rx="1" fill="#f4d0b0"/>
  <!-- George's neck -->
  <rect x="25.5" y="19" width="3" height="3" rx="1" fill="#f4d0b0"/>
  <!-- Fred's head -->
  <ellipse cx="9" cy="14" rx="5.5" ry="6" fill="#f4d0b0"/>
  <!-- George's head -->
  <ellipse cx="27" cy="14" rx="5.5" ry="6" fill="#f4d0b0"/>
  <!-- Fred's red hair -->
  <path d="M3.5 12 Q5 6 9 5 Q13 6 14.5 12" fill="url(#redHair)"/>
  <path d="M3.5 12 Q3 13 3.5 14" fill="url(#redHair)"/>
  <path d="M14.5 12 Q15 13 14.5 14" fill="url(#redHair)"/>
  <!-- George's red hair -->
  <path d="M21.5 12 Q23 6 27 5 Q31 6 32.5 12" fill="url(#redHair)"/>
  <path d="M21.5 12 Q21 13 21.5 14" fill="url(#redHair)"/>
  <path d="M32.5 12 Q33 13 32.5 14" fill="url(#redHair)"/>
  <!-- Freckles - Fred -->
  <circle cx="7" cy="15" r="0.2" fill="#c49070"/>
  <circle cx="8" cy="15.5" r="0.2" fill="#c49070"/>
  <circle cx="10" cy="15" r="0.2" fill="#c49070"/>
  <circle cx="11" cy="15.5" r="0.2" fill="#c49070"/>
  <circle cx="7.5" cy="16" r="0.15" fill="#c49070"/>
  <circle cx="10.5" cy="16" r="0.15" fill="#c49070"/>
  <!-- Freckles - George -->
  <circle cx="25" cy="15" r="0.2" fill="#c49070"/>
  <circle cx="26" cy="15.5" r="0.2" fill="#c49070"/>
  <circle cx="28" cy="15" r="0.2" fill="#c49070"/>
  <circle cx="29" cy="15.5" r="0.2" fill="#c49070"/>
  <circle cx="25.5" cy="16" r="0.15" fill="#c49070"/>
  <circle cx="28.5" cy="16" r="0.15" fill="#c49070"/>
  <!-- Fred's mischievous eyebrows -->
  <path d="M7 11.5 Q8 10.5 10.5 11.5" fill="none" stroke="#8a3a10" stroke-width="0.4"/>
  <!-- George's mischievous eyebrows -->
  <path d="M25 11.5 Q26.5 10.5 29 11.5" fill="none" stroke="#8a3a10" stroke-width="0.4"/>
  <!-- Fred's eyes -->
  <ellipse cx="8" cy="13" rx="1.2" ry="1" fill="white"/>
  <ellipse cx="10.5" cy="13" rx="1.2" ry="1" fill="white"/>
  <circle cx="8" cy="13" r="0.6" fill="#5a7a4a"/>
  <circle cx="10.5" cy="13" r="0.6" fill="#5a7a4a"/>
  <circle cx="8" cy="13" r="0.25" fill="#1a1a2e"/>
  <circle cx="10.5" cy="13" r="0.25" fill="#1a1a2e"/>
  <!-- George's eyes -->
  <ellipse cx="26" cy="13" rx="1.2" ry="1" fill="white"/>
  <ellipse cx="28.5" cy="13" rx="1.2" ry="1" fill="white"/>
  <circle cx="26" cy="13" r="0.6" fill="#5a7a4a"/>
  <circle cx="28.5" cy="13" r="0.6" fill="#5a7a4a"/>
  <circle cx="26" cy="13" r="0.25" fill="#1a1a2e"/>
  <circle cx="28.5" cy="13" r="0.25" fill="#1a1a2e"/>
  <!-- Fred's nose -->
  <path d="M9 13.5 Q8.5 14.5 9 15" fill="none" stroke="#d4a882" stroke-width="0.3"/>
  <!-- George's nose -->
  <path d="M27 13.5 Q26.5 14.5 27 15" fill="none" stroke="#d4a882" stroke-width="0.3"/>
  <!-- Fred's wide grin -->
  <path d="M7 17 Q9 19 11 17" fill="none" stroke="#c07060" stroke-width="0.5"/>
  <path d="M7.5 17.3 Q9 18 10.5 17.3" fill="white" opacity="0.5"/>
  <!-- George's wide grin -->
  <path d="M25 17 Q27 19 29 17" fill="none" stroke="#c07060" stroke-width="0.5"/>
  <path d="M25.5 17.3 Q27 18 28.5 17.3" fill="white" opacity="0.5"/>
  <!-- Sparkle/firework between them -->
  <circle cx="18" cy="10" r="0.5" fill="#ffd700"/>
  <line x1="18" y1="7" x2="18" y2="8.5" stroke="#ffd700" stroke-width="0.3"/>
  <line x1="18" y1="11.5" x2="18" y2="13" stroke="#ffd700" stroke-width="0.3"/>
  <line x1="16" y1="10" x2="17" y2="10" stroke="#ffd700" stroke-width="0.3"/>
  <line x1="19" y1="10" x2="20" y2="10" stroke="#ffd700" stroke-width="0.3"/>
</svg>