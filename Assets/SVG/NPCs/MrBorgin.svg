<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="darkRobe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="oilyHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="50%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  <!-- Dark robes -->
  <path d="M6 28 Q8 24 13 23 L18 22 L23 23 Q28 24 30 28 L30 36 L6 36Z" fill="url(#darkRobe)"/>
  <!-- High collar -->
  <path d="M13 23 Q14 21 15 22 L18 22 L21 22 Q22 21 23 23" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.3"/>
  <!-- Collar points -->
  <path d="M13 23 L14 20" fill="none" stroke="#3a3a3a" stroke-width="0.4"/>
  <path d="M23 23 L22 20" fill="none" stroke="#3a3a3a" stroke-width="0.4"/>
  <!-- Thin neck -->
  <rect x="16" y="19" width="4" height="3.5" rx="1" fill="#d8c49a"/>
  <!-- Sallow face -->
  <ellipse cx="18" cy="14" rx="6" ry="6.5" fill="#d8c49a"/>
  <!-- Oily slicked dark hair -->
  <path d="M12 12 Q13 6 18 5 Q23 6 24 12" fill="url(#oilyHair)"/>
  <path d="M12 12 Q11 13 11.5 15" fill="url(#oilyHair)"/>
  <path d="M24 12 Q25 13 24.5 15" fill="url(#oilyHair)"/>
  <!-- Hair sheen/oil -->
  <path d="M15 7 Q17 6.5 19 7" fill="none" stroke="#5a5a5a" stroke-width="0.4" opacity="0.6"/>
  <path d="M14 8 Q16 7.5 18 8" fill="none" stroke="#4a4a4a" stroke-width="0.3" opacity="0.5"/>
  <!-- Shifty narrow eyebrows -->
  <path d="M14 11.5 Q15.5 11 17 11.8" fill="none" stroke="#3a3a2a" stroke-width="0.5"/>
  <path d="M19 11.8 Q20.5 11 22 11.5" fill="none" stroke="#3a3a2a" stroke-width="0.5"/>
  <!-- Shifty darting eyes -->
  <ellipse cx="15.5" cy="13.5" rx="1.3" ry="1" fill="#e8e4d0"/>
  <ellipse cx="20.5" cy="13.5" rx="1.3" ry="1" fill="#e8e4d0"/>
  <!-- Pupils looking to side - shifty -->
  <circle cx="16" cy="13.5" r="0.6" fill="#4a4a2a"/>
  <circle cx="21" cy="13.5" r="0.6" fill="#4a4a2a"/>
  <circle cx="16" cy="13.5" r="0.25" fill="#1a1a1a"/>
  <circle cx="21" cy="13.5" r="0.25" fill="#1a1a1a"/>
  <!-- Dark circles under eyes -->
  <path d="M14 14.8 Q15.5 15.2 17 14.8" fill="none" stroke="#b0a070" stroke-width="0.3" opacity="0.5"/>
  <path d="M19 14.8 Q20.5 15.2 22 14.8" fill="none" stroke="#b0a070" stroke-width="0.3" opacity="0.5"/>
  <!-- Pointed nose -->
  <path d="M18 13.5 L17 16.5 L18 17 L18.5 16.5" fill="none" stroke="#c0a070" stroke-width="0.4"/>
  <!-- Thin sinister smile -->
  <path d="M15.5 18 Q18 19 20.5 18" fill="none" stroke="#8a6a4a" stroke-width="0.4"/>
  <!-- Rubbing hands together gesture -->
  <ellipse cx="8" cy="33" rx="2" ry="1.5" fill="#d8c49a" opacity="0.6"/>
  <ellipse cx="28" cy="33" rx="2" ry="1.5" fill="#d8c49a" opacity="0.6"/>
  <!-- Shadow/sinister atmosphere -->
  <path d="M6 28 Q8 30 8 36" fill="none" stroke="#0a0a0a" stroke-width="0.5" opacity="0.3"/>
  <path d="M30 28 Q28 30 28 36" fill="none" stroke="#0a0a0a" stroke-width="0.5" opacity="0.3"/>
</svg>