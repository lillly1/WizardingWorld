<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="cloakMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B0B8C8" stop-opacity="0.7"/>
      <stop offset="30%" stop-color="#8890A0" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#A0A8B8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#788090" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="cloakShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8D0E0" stop-opacity="0"/>
      <stop offset="30%" stop-color="#E0E8FF" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#F0F4FF" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#E0E8FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C8D0E0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C0C8FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="ethereal">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <!-- Checkerboard pattern to show transparency -->
    <pattern id="checker" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="#E8E8E8"/>
      <rect x="2" y="2" width="2" height="2" fill="#E8E8E8"/>
      <rect x="2" width="2" height="2" fill="#F4F4F4"/>
      <rect y="2" width="2" height="2" fill="#F4F4F4"/>
    </pattern>
  </defs>

  <!-- Background suggestion of transparency -->
  <rect x="6" y="8" width="20" height="20" rx="2" fill="url(#checker)" opacity="0.3"/>

  <!-- Outer glow -->
  <path d="M16,3 Q22,4 24,8 L26,16 Q27,22 24,26 L20,29 Q16,30 12,29 L8,26 Q5,22 6,16 L8,8 Q10,4 16,3Z"
        fill="#A0A8C0" opacity="0.15" filter="url(#softGlow)"/>

  <!-- Main cloak shape - draped fabric -->
  <path d="M16,4 Q20,4.5 22,7 L24,14 Q25,18 24,22 L22,26 Q20,28 16,28.5 Q12,28 10,26 L8,22 Q7,18 8,14 L10,7 Q12,4.5 16,4Z"
        fill="url(#cloakMain)" stroke="#707888" stroke-width="0.3" opacity="0.85"/>

  <!-- Shimmer overlay -->
  <path d="M16,4 Q20,4.5 22,7 L24,14 Q25,18 24,22 L22,26 Q20,28 16,28.5 Q12,28 10,26 L8,22 Q7,18 8,14 L10,7 Q12,4.5 16,4Z"
        fill="url(#cloakShimmer)" opacity="0.4"/>

  <!-- Fabric fold lines -->
  <path d="M14,6 Q12,14 13,22 Q13.5,26 14,28" stroke="#687080" stroke-width="0.4" fill="none" opacity="0.5"/>
  <path d="M18,6 Q20,14 19,22 Q18.5,26 18,28" stroke="#687080" stroke-width="0.4" fill="none" opacity="0.5"/>
  <path d="M11,10 Q13,16 11,24" stroke="#687080" stroke-width="0.3" fill="none" opacity="0.3"/>
  <path d="M21,10 Q19,16 21,24" stroke="#687080" stroke-width="0.3" fill="none" opacity="0.3"/>

  <!-- Hood shape at top -->
  <path d="M12,7 Q14,3 16,3 Q18,3 20,7 Q18,5.5 16,5.5 Q14,5.5 12,7Z"
        fill="#909AB0" stroke="#707888" stroke-width="0.3" opacity="0.8"/>

  <!-- Stars/constellation pattern -->
  <g filter="url(#ethereal)" opacity="0.7">
    <circle cx="13" cy="10" r="0.4" fill="url(#starGlow)"/>
    <circle cx="19" cy="12" r="0.5" fill="url(#starGlow)"/>
    <circle cx="15" cy="15" r="0.3" fill="url(#starGlow)"/>
    <circle cx="21" cy="18" r="0.4" fill="url(#starGlow)"/>
    <circle cx="12" cy="20" r="0.35" fill="url(#starGlow)"/>
    <circle cx="17" cy="22" r="0.45" fill="url(#starGlow)"/>
    <circle cx="14" cy="25" r="0.3" fill="url(#starGlow)"/>
    <circle cx="20" cy="24" r="0.35" fill="url(#starGlow)"/>
    <circle cx="11" cy="15" r="0.3" fill="url(#starGlow)"/>
    <circle cx="22" cy="21" r="0.3" fill="url(#starGlow)"/>
    <!-- Constellation lines -->
    <line x1="13" y1="10" x2="15" y2="15" stroke="#C0C8FF" stroke-width="0.15" opacity="0.4"/>
    <line x1="15" y1="15" x2="19" y2="12" stroke="#C0C8FF" stroke-width="0.15" opacity="0.4"/>
    <line x1="19" y1="12" x2="21" y2="18" stroke="#C0C8FF" stroke-width="0.15" opacity="0.4"/>
    <line x1="12" y1="20" x2="17" y2="22" stroke="#C0C8FF" stroke-width="0.15" opacity="0.4"/>
    <line x1="17" y1="22" x2="20" y2="24" stroke="#C0C8FF" stroke-width="0.15" opacity="0.4"/>
  </g>

  <!-- Deathly Hallows subtle watermark -->
  <g opacity="0.12" transform="translate(16,17)">
    <polygon points="0,-5 -4,4 4,4" fill="none" stroke="#E0E8FF" stroke-width="0.5"/>
    <circle cx="0" cy="1" r="1.8" fill="none" stroke="#E0E8FF" stroke-width="0.5"/>
    <line x1="0" y1="-5" x2="0" y2="4" stroke="#E0E8FF" stroke-width="0.5"/>
  </g>

  <!-- Edge shimmer particles -->
  <circle cx="24" cy="15" r="0.3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="8" cy="18" r="0.25" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="23" cy="24" r="0.2" fill="#FFFFFF" opacity="0.4"/>
</svg>