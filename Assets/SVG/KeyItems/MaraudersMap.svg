<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="parchment" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0DCA8"/>
      <stop offset="30%" stop-color="#E8D098"/>
      <stop offset="70%" stop-color="#D8C080"/>
      <stop offset="100%" stop-color="#C8B070"/>
    </linearGradient>
    <linearGradient id="parchDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D0B878"/>
      <stop offset="100%" stop-color="#B89858"/>
    </linearGradient>
    <filter id="aged">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise"/>
      <feColorMatrix type="saturate" values="0.2" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
  </defs>

  <!-- Main folded parchment body -->
  <!-- Back fold (slightly visible) -->
  <path d="M6,7 L24,7 L24,26 L6,26Z" fill="url(#parchDark)" stroke="#A08848" stroke-width="0.3"/>

  <!-- Main front face of folded map -->
  <path d="M5,6 L23,6 L23,25 L5,25Z" fill="url(#parchment)" stroke="#A08848" stroke-width="0.4"/>

  <!-- Fold lines -->
  <line x1="14" y1="6" x2="14" y2="25" stroke="#C0A868" stroke-width="0.5" opacity="0.6"/>
  <line x1="5" y1="15.5" x2="23" y2="15.5" stroke="#C0A868" stroke-width="0.5" opacity="0.6"/>

  <!-- Top flap (partially unfolded) -->
  <path d="M5,6 L23,6 L24,4 Q23.5,3 22,3 L7,3 Q5.5,3 5,4Z"
        fill="#E8D098" stroke="#A08848" stroke-width="0.3"/>
  <!-- Flap fold shadow -->
  <path d="M5,6 L23,6" stroke="#B09858" stroke-width="0.5"/>

  <!-- Aged edges/staining -->
  <path d="M5,6 Q4,10 5,14 Q4.5,18 5,22 Q4.5,24 5,25" stroke="#B09050" stroke-width="0.4" fill="none" opacity="0.3"/>
  <path d="M23,6 Q24,10 23,14 Q23.5,18 23,22 Q23.5,24 23,25" stroke="#B09050" stroke-width="0.4" fill="none" opacity="0.3"/>

  <!-- "Messrs Moony..." header text suggestion -->
  <g opacity="0.4" font-family="serif" fill="#6A5030">
    <text x="14" y="5" font-size="1.4" text-anchor="middle">Messrs Moony, Wormtail,</text>
    <text x="14" y="9" font-size="1.6" text-anchor="middle" font-weight="bold">The Marauder's Map</text>
  </g>

  <!-- Map corridor lines (simplified Hogwarts layout) -->
  <g stroke="#8A7040" stroke-width="0.3" fill="none" opacity="0.4">
    <!-- Corridors -->
    <rect x="7" y="11" width="4" height="3" rx="0.3"/>
    <rect x="12" y="10" width="3" height="4.5" rx="0.3"/>
    <line x1="11" y1="12.5" x2="12" y2="12.5"/>
    <rect x="16" y="11" width="5" height="3.5" rx="0.3"/>
    <line x1="15" y1="12" x2="16" y2="12"/>
    <!-- Staircase -->
    <path d="M9,17 L9,19 L11,19 L11,21"/>
    <path d="M15,17 L15,20 L18,20 L18,22"/>
    <!-- Rooms -->
    <rect x="7" y="17" width="3" height="2.5" rx="0.2"/>
    <rect x="13" y="18" width="4" height="3" rx="0.2"/>
    <rect x="18" y="17" width="3.5" height="2" rx="0.2"/>
    <!-- Connecting passages -->
    <line x1="10" y1="18" x2="13" y2="18.5"/>
    <line x1="17" y1="19" x2="18" y2="18"/>
  </g>

  <!-- Footprint marks - the iconic feature -->
  <g fill="#6A4020" opacity="0.6">
    <!-- Pair 1 - walking right -->
    <ellipse cx="8" cy="13" rx="0.4" ry="0.7" transform="rotate(10 8 13)"/>
    <ellipse cx="9" cy="12.5" rx="0.4" ry="0.7" transform="rotate(10 9 12.5)"/>
    <!-- Toes pair 1 -->
    <circle cx="7.8" cy="12.2" r="0.15"/>
    <circle cx="8.2" cy="12.1" r="0.15"/>
    <circle cx="8.8" cy="11.7" r="0.15"/>
    <circle cx="9.2" cy="11.6" r="0.15"/>

    <!-- Pair 2 -->
    <ellipse cx="10.5" cy="13.2" rx="0.35" ry="0.6" transform="rotate(15 10.5 13.2)"/>
    <ellipse cx="11.5" cy="12.8" rx="0.35" ry="0.6" transform="rotate(15 11.5 12.8)"/>
    <circle cx="10.3" cy="12.5" r="0.13"/>
    <circle cx="10.7" cy="12.4" r="0.13"/>
    <circle cx="11.3" cy="12.1" r="0.13"/>
    <circle cx="11.7" cy="12.0" r="0.13"/>

    <!-- Pair 3 - different person walking down -->
    <ellipse cx="17" cy="18" rx="0.35" ry="0.6" transform="rotate(-5 17 18)"/>
    <ellipse cx="18" cy="18.2" rx="0.35" ry="0.6" transform="rotate(-5 18 18.2)"/>
    <circle cx="16.8" cy="18.7" r="0.13"/>
    <circle cx="17.2" cy="18.8" r="0.13"/>
    <circle cx="17.8" cy="18.9" r="0.13"/>
    <circle cx="18.2" cy="19.0" r="0.13"/>

    <!-- Pair 4 -->
    <ellipse cx="17.5" cy="20" rx="0.35" ry="0.6" transform="rotate(0 17.5 20)"/>
    <ellipse cx="18.5" cy="20.2" rx="0.35" ry="0.6"/>
    <circle cx="17.3" cy="20.7" r="0.13"/>
    <circle cx="17.7" cy="20.8" r="0.13"/>
    <circle cx="18.3" cy="20.9" r="0.13"/>
    <circle cx="18.7" cy="21.0" r="0.13"/>
  </g>

  <!-- "I solemnly swear" text at bottom -->
  <text x="14" y="24" font-family="serif" font-size="1.1" fill="#7A6040" text-anchor="middle" opacity="0.35" font-style="italic">
    I solemnly swear...
  </text>

  <!-- Wax seal suggestion -->
  <circle cx="21" cy="23" r="1.5" fill="#8B2020" opacity="0.5"/>
  <circle cx="21" cy="23" r="1" fill="#A03030" opacity="0.5"/>
  <text x="21" y="23.5" font-family="serif" font-size="1" fill="#C06060" text-anchor="middle" opacity="0.6">M</text>

  <!-- Age spots -->
  <circle cx="8" cy="8" r="1" fill="#B89848" opacity="0.15"/>
  <circle cx="20" cy="22" r="0.8" fill="#B89848" opacity="0.12"/>
  <circle cx="7" cy="20" r="0.6" fill="#B89848" opacity="0.1"/>
</svg>