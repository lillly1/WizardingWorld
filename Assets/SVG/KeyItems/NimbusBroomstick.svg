<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="handleWood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8903C"/>
      <stop offset="20%" stop-color="#A06828"/>
      <stop offset="50%" stop-color="#B87830"/>
      <stop offset="80%" stop-color="#905818"/>
      <stop offset="100%" stop-color="#804810"/>
    </linearGradient>
    <linearGradient id="handleHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bristle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A850"/>
      <stop offset="40%" stop-color="#B08830"/>
      <stop offset="100%" stop-color="#886020"/>
    </linearGradient>
    <linearGradient id="goldBand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE040"/>
      <stop offset="50%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="polish">
      <feGaussianBlur stdDeviation="0.3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Motion lines (speed suggestion) -->
  <line x1="2" y1="14" x2="8" y2="14" stroke="#B08830" stroke-width="0.3" opacity="0.2"/>
  <line x1="4" y1="17" x2="9" y2="17" stroke="#B08830" stroke-width="0.3" opacity="0.15"/>
  <line x1="3" y1="20" x2="7" y2="20" stroke="#B08830" stroke-width="0.2" opacity="0.1"/>

  <!-- Broom shadow -->
  <path d="M10,22 L36,22 Q38,22 37,24 L34,26 Q33,24 30,23 L10,23Z" fill="#000000" opacity="0.08"/>

  <!-- Main handle - polished wood, slightly angled -->
  <path d="M8,16 L30,16 L30,19 L8,19Z" fill="url(#handleWood)" stroke="#6A4010" stroke-width="0.4" rx="0.5"/>

  <!-- Handle polish/lacquer shine -->
  <rect x="8" y="16.2" width="22" height="1" rx="0.3" fill="url(#handleHighlight)"/>

  <!-- Wood grain lines -->
  <g stroke="#8A5818" stroke-width="0.2" opacity="0.3">
    <line x1="10" y1="17" x2="28" y2="17"/>
    <line x1="9" y1="17.8" x2="29" y2="17.8"/>
    <line x1="11" y1="18.3" x2="27" y2="18.3"/>
  </g>

  <!-- Handle tip (front, aerodynamic) -->
  <path d="M8,16 Q6,17 6,17.5 Q6,18 8,19" fill="#905818" stroke="#6A4010" stroke-width="0.3"/>

  <!-- Gold band at front -->
  <rect x="9" y="15.5" width="1.5" height="4" rx="0.3" fill="url(#goldBand)" stroke="#8B6914" stroke-width="0.2"/>

  <!-- "Nimbus 2000" engraving area -->
  <rect x="12" y="16.3" width="10" height="2.4" rx="0.5" fill="#A06828" stroke="#804810" stroke-width="0.2" opacity="0.5"/>
  <text x="17" y="18.2" font-family="sans-serif" font-size="1.6" font-weight="bold" fill="#D4A850" text-anchor="middle" opacity="0.7">NIMBUS 2000</text>

  <!-- Gold band near bristles -->
  <rect x="28.5" y="15.5" width="1.5" height="4" rx="0.3" fill="url(#goldBand)" stroke="#8B6914" stroke-width="0.2"/>

  <!-- Second gold band -->
  <rect x="30.5" y="15.3" width="1" height="4.4" rx="0.2" fill="url(#goldBand)" stroke="#8B6914" stroke-width="0.2"/>

  <!-- Bristle binding area -->
  <rect x="31" y="15" width="1.5" height="5" rx="0.3" fill="#6A4010" stroke="#4A2808" stroke-width="0.3"/>

  <!-- Bristles - trimmed and neat -->
  <g fill="url(#bristle)" stroke="#886020" stroke-width="0.2">
    <!-- Main bristle bundle - aerodynamic taper -->
    <path d="M32,15 L37,14 Q38,14.5 38,15.5 L38,15 Q38.5,15.5 38.5,17.5 Q38.5,19.5 38,20 L38,19.5 Q38,20.5 37,21 L32,20Z"/>
  </g>

  <!-- Individual bristle lines -->
  <g stroke="#A07828" stroke-width="0.3" opacity="0.6">
    <line x1="32" y1="15.5" x2="37.5" y2="14.5"/>
    <line x1="32" y1="16" x2="38" y2="15.5"/>
    <line x1="32" y1="16.5" x2="38.2" y2="16.2"/>
    <line x1="32" y1="17" x2="38.3" y2="17"/>
    <line x1="32" y1="17.5" x2="38.3" y2="17.5"/>
    <line x1="32" y1="18" x2="38.2" y2="18.3"/>
    <line x1="32" y1="18.5" x2="38" y2="19"/>
    <line x1="32" y1="19" x2="37.5" y2="19.8"/>
    <line x1="32" y1="19.5" x2="37" y2="20.5"/>
  </g>

  <!-- Bristle highlights -->
  <line x1="33" y1="16" x2="37" y2="15.5" stroke="#D4B060" stroke-width="0.2" opacity="0.4"/>
  <line x1="33" y1="17" x2="37.5" y2="17" stroke="#D4B060" stroke-width="0.2" opacity="0.3"/>

  <!-- Bristle tips (slightly splayed) -->
  <g stroke="#986828" stroke-width="0.25" fill="none" opacity="0.5">
    <path d="M37.5,14.5 Q38,14 38.2,14.2"/>
    <path d="M38,15.5 Q38.5,15.2 38.7,15.5"/>
    <path d="M38.3,17.5 Q39,17.5 38.8,17.8"/>
    <path d="M38,19 Q38.5,19.3 38.3,19.6"/>
    <path d="M37,20.5 Q37.5,21 37.2,21.2"/>
  </g>

  <!-- Foot pegs (small) -->
  <rect x="20" y="19" width="1.5" height="2" rx="0.3" fill="#804810" stroke="#6A4010" stroke-width="0.2"/>
  <rect x="24" y="19" width="1.5" height="2" rx="0.3" fill="#804810" stroke="#6A4010" stroke-width="0.2"/>

  <!-- Handle polish shine streak -->
  <line x1="12" y1="16.5" x2="26" y2="16.5" stroke="#FFFFFF" stroke-width="0.3" opacity="0.15"/>

  <!-- Sparkle on gold band -->
  <circle cx="10" cy="16" r="0.25" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="29" cy="16" r="0.25" fill="#FFFFFF" opacity="0.6"/>
</svg>