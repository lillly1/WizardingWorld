<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="scrollParch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0DCA8"/>
      <stop offset="30%" stop-color="#E0CC90"/>
      <stop offset="70%" stop-color="#D4BC78"/>
      <stop offset="100%" stop-color="#C0A860"/>
    </linearGradient>
    <linearGradient id="scrollEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B89858"/>
      <stop offset="50%" stop-color="#D0B878"/>
      <stop offset="100%" stop-color="#B89858"/>
    </linearGradient>
    <radialGradient id="darkMark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#200000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#400000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Scroll shadow -->
  <rect x="6" y="5" width="21" height="24" rx="1" fill="#000000" opacity="0.12" transform="translate(1,1)"/>

  <!-- Scroll body -->
  <rect x="5" y="4" width="22" height="25" rx="1" fill="url(#scrollParch)" stroke="#A08848" stroke-width="0.4"/>

  <!-- Top scroll curl -->
  <path d="M5,5 Q5,3 7,3 L25,3 Q27,3 27,5" fill="url(#scrollEdge)" stroke="#A08848" stroke-width="0.3"/>
  <ellipse cx="16" cy="3.5" rx="11" ry="1.5" fill="none" stroke="#B89858" stroke-width="0.3" opacity="0.4"/>

  <!-- Bottom scroll curl -->
  <path d="M5,28 Q5,30 7,30 L25,30 Q27,30 27,28" fill="url(#scrollEdge)" stroke="#A08848" stroke-width="0.3"/>

  <!-- Header: "HORCRUX TRACKER" -->
  <text x="16" y="7.5" font-family="serif" font-size="2" font-weight="bold" fill="#4A2020" text-anchor="middle" opacity="0.7">HORCRUX TRACKER</text>
  <line x1="7" y1="8.5" x2="25" y2="8.5" stroke="#8A4040" stroke-width="0.3" opacity="0.5"/>

  <!-- Checkbox items -->
  <g font-family="serif" font-size="1.6" fill="#4A3020">
    <!-- Item 1: Diary - checked -->
    <rect x="7" y="10" width="2" height="2" rx="0.3" fill="none" stroke="#6A3020" stroke-width="0.3"/>
    <path d="M7.3,11 L8,11.8 L9.2,10.2" stroke="#8B0000" stroke-width="0.5" fill="none"/>
    <text x="10.5" y="11.7" opacity="0.7">Riddle's Diary</text>
    <line x1="10.5" y1="11.3" x2="22" y2="11.3" stroke="#6A3020" stroke-width="0.15" opacity="0.3"/>

    <!-- Item 2: Ring - checked -->
    <rect x="7" y="13" width="2" height="2" rx="0.3" fill="none" stroke="#6A3020" stroke-width="0.3"/>
    <path d="M7.3,14 L8,14.8 L9.2,13.2" stroke="#8B0000" stroke-width="0.5" fill="none"/>
    <text x="10.5" y="14.7" opacity="0.7">Gaunt's Ring</text>
    <line x1="10.5" y1="14.3" x2="20" y2="14.3" stroke="#6A3020" stroke-width="0.15" opacity="0.3"/>

    <!-- Item 3: Locket - unchecked -->
    <rect x="7" y="16" width="2" height="2" rx="0.3" fill="none" stroke="#6A3020" stroke-width="0.3"/>
    <text x="10.5" y="17.7" opacity="0.7">Slytherin's Locket</text>

    <!-- Item 4: Cup - unchecked -->
    <rect x="7" y="19" width="2" height="2" rx="0.3" fill="none" stroke="#6A3020" stroke-width="0.3"/>
    <text x="10.5" y="20.7" opacity="0.7">Hufflepuff's Cup</text>

    <!-- Item 5: Diadem - unchecked -->
    <rect x="7" y="22" width="2" height="2" rx="0.3" fill="none" stroke="#6A3020" stroke-width="0.3"/>
    <text x="10.5" y="23.7" opacity="0.7">Ravenclaw Diadem</text>

    <!-- Item 6: ??? - unknown -->
    <rect x="7" y="25" width="2" height="2" rx="0.3" fill="none" stroke="#6A3020" stroke-width="0.3"/>
    <text x="10.5" y="26.7" opacity="0.5" font-style="italic">??? Unknown</text>
  </g>

  <!-- Red ink splatters -->
  <circle cx="22" cy="11" r="0.6" fill="#8B0000" opacity="0.3"/>
  <circle cx="23" cy="10.5" r="0.3" fill="#8B0000" opacity="0.2"/>
  <circle cx="24" cy="13" r="0.4" fill="#8B0000" opacity="0.25"/>
  <ellipse cx="21" cy="14.5" rx="0.5" ry="0.3" fill="#8B0000" opacity="0.2"/>

  <!-- Red ink drip from quill -->
  <path d="M24,8 Q25,9 24.5,11" stroke="#8B0000" stroke-width="0.3" fill="none" opacity="0.4"/>

  <!-- Dark aura marks near horcrux items -->
  <circle cx="8" cy="11" r="1.5" fill="url(#darkMark)" opacity="0.2"/>
  <circle cx="8" cy="14" r="1.5" fill="url(#darkMark)" opacity="0.2"/>
  <circle cx="8" cy="17" r="1.5" fill="url(#darkMark)" opacity="0.15"/>

  <!-- Skull tiny doodle in corner -->
  <g transform="translate(24,26)" opacity="0.25" stroke="#4A2020" stroke-width="0.3" fill="none">
    <circle cx="0" cy="0" r="1.2"/>
    <circle cx="-0.4" cy="-0.2" r="0.25" fill="#4A2020"/>
    <circle cx="0.4" cy="-0.2" r="0.25" fill="#4A2020"/>
    <path d="M-0.4,0.5 L0.4,0.5"/>
  </g>

  <!-- Aged paper stains -->
  <circle cx="20" cy="20" r="2" fill="#B89848" opacity="0.08"/>
  <circle cx="8" cy="27" r="1.5" fill="#B89848" opacity="0.06"/>
</svg>