<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="woodGoblet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B6040"/>
      <stop offset="30%" stop-color="#6B4020"/>
      <stop offset="60%" stop-color="#7A5030"/>
      <stop offset="100%" stop-color="#5A3010"/>
    </linearGradient>
    <linearGradient id="woodDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A2010"/>
      <stop offset="50%" stop-color="#5A3018"/>
      <stop offset="100%" stop-color="#4A2010"/>
    </linearGradient>
    <linearGradient id="blueFlame1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#80C0FF"/>
      <stop offset="50%" stop-color="#4080FF"/>
      <stop offset="80%" stop-color="#2040CC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1020AA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blueFlame2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E0F0FF"/>
      <stop offset="30%" stop-color="#60A0FF"/>
      <stop offset="70%" stop-color="#3060DD" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2040BB" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="flameGlow" cx="50%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#80C0FF" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#4080FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2040CC" stop-opacity="0"/>
    </radialGradient>
    <filter id="fireGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="flameBlur">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <!-- Blue flame glow ambient -->
  <ellipse cx="16" cy="8" rx="10" ry="8" fill="url(#flameGlow)" filter="url(#flameBlur)"/>

  <!-- Goblet shadow -->
  <ellipse cx="16" cy="29" rx="6" ry="1.2" fill="#000000" opacity="0.25"/>

  <!-- Base/foot -->
  <path d="M10,28 L10,27 Q10,26 12,26 L20,26 Q22,26 22,27 L22,28Z"
        fill="url(#woodGoblet)" stroke="#3A1808" stroke-width="0.4"/>
  <ellipse cx="16" cy="28" rx="6" ry="1.2" fill="#6B4020" stroke="#3A1808" stroke-width="0.3"/>

  <!-- Stem -->
  <rect x="14" y="22" width="4" height="4.5" rx="0.5" fill="url(#woodDark)" stroke="#3A1808" stroke-width="0.3"/>
  <!-- Stem wood grain -->
  <line x1="15" y1="22" x2="15" y2="26.5" stroke="#5A3018" stroke-width="0.3" opacity="0.4"/>
  <line x1="17" y1="22" x2="17" y2="26.5" stroke="#5A3018" stroke-width="0.3" opacity="0.4"/>

  <!-- Cup body - rough-hewn wooden bowl -->
  <path d="M8,15 Q7,14 8,13 L10,12 Q12,11 16,11 Q20,11 22,12 L24,13 Q25,14 24,15 L23,19 Q22,22 20,22 L12,22 Q10,22 9,19Z"
        fill="url(#woodGoblet)" stroke="#3A1808" stroke-width="0.5"/>

  <!-- Cup interior rim -->
  <ellipse cx="16" cy="13" rx="8" ry="2.5" fill="#4A2510" stroke="#3A1808" stroke-width="0.3"/>
  <!-- Rim highlight -->
  <ellipse cx="16" cy="13" rx="7.5" ry="2.2" fill="none" stroke="#8B6040" stroke-width="0.4" opacity="0.5"/>

  <!-- Wood grain texture on cup -->
  <path d="M10,14 Q12,15 10,18" stroke="#5A3018" stroke-width="0.3" fill="none" opacity="0.4"/>
  <path d="M13,12 Q14,16 12,20" stroke="#5A3018" stroke-width="0.25" fill="none" opacity="0.3"/>
  <path d="M19,12 Q18,16 20,20" stroke="#5A3018" stroke-width="0.25" fill="none" opacity="0.3"/>
  <path d="M22,14 Q20,15 22,18" stroke="#5A3018" stroke-width="0.3" fill="none" opacity="0.4"/>

  <!-- Rough-hewn chip marks -->
  <path d="M9,16 L9.5,15.5 L10,16.5" fill="#5A3018" opacity="0.3"/>
  <path d="M22.5,17 L23,16 L23.5,17" fill="#5A3018" opacity="0.3"/>

  <!-- Blue magical flames -->
  <g filter="url(#fireGlow)">
    <!-- Central large flame -->
    <path d="M16,13 Q14,8 16,3 Q17,6 18,5 Q17,8 18,10 Q19,8 18,13"
          fill="url(#blueFlame1)" opacity="0.8"/>
    <!-- Left flame -->
    <path d="M13,13 Q11,9 13,5 Q14,8 14,6 Q14.5,9 15,13"
          fill="url(#blueFlame2)" opacity="0.6"/>
    <!-- Right flame -->
    <path d="M19,13 Q20,9 19,5 Q18.5,8 18,6 Q18,9 17,13"
          fill="url(#blueFlame2)" opacity="0.6"/>
    <!-- Outer left flicker -->
    <path d="M11,14 Q10,10 12,7 Q12,10 13,14"
          fill="#4080FF" opacity="0.3"/>
    <!-- Outer right flicker -->
    <path d="M21,14 Q22,10 20,7 Q20,10 19,14"
          fill="#4080FF" opacity="0.3"/>
  </g>

  <!-- White-hot core at flame base -->
  <ellipse cx="16" cy="12.5" rx="3" ry="1" fill="#FFFFFF" opacity="0.3"/>
  <ellipse cx="16" cy="12.5" rx="1.5" ry="0.5" fill="#FFFFFF" opacity="0.5"/>

  <!-- Flame sparks -->
  <circle cx="14" cy="5" r="0.3" fill="#80C0FF" opacity="0.5"/>
  <circle cx="18" cy="4" r="0.25" fill="#A0D0FF" opacity="0.4"/>
  <circle cx="12" cy="7" r="0.2" fill="#80C0FF" opacity="0.3"/>
  <circle cx="20" cy="6" r="0.2" fill="#80C0FF" opacity="0.3"/>

  <!-- Blue light on goblet rim -->
  <ellipse cx="16" cy="13" rx="7" ry="2" fill="#4080FF" opacity="0.1"/>
</svg>