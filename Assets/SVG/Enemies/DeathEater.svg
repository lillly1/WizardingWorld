<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="deRobeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="36" height="36" fill="#1a1a2a"/>
  <!-- Body in black robes -->
  <g fill="url(#deRobeGrad)">
    <!-- Robe body -->
    <path d="M12 12 L9 34 L27 34 L24 12 Z"/>
    <!-- Shoulders -->
    <path d="M10 12 Q18 10 26 12 L24 14 Q18 13 12 14 Z"/>
    <!-- Sleeves -->
    <path d="M10 13 L5 22 L7 23 L12 16 Z"/>
    <path d="M26 13 L31 22 L29 23 L24 16 Z"/>
  </g>
  <!-- Hood -->
  <path d="M13 5 Q18 2 23 5 Q25 8 24 12 L12 12 Q11 8 13 5 Z" fill="#1a1a1a"/>
  <!-- Skull mask -->
  <g transform="translate(14,5)">
    <!-- Mask shape -->
    <path d="M0 3 Q0 0 4 0 Q8 0 8 3 L8 6 Q8 8 6 9 L2 9 Q0 8 0 6 Z" fill="#d0d0d0"/>
    <!-- Eye holes -->
    <ellipse cx="2.5" cy="3.5" rx="1" ry="1.2" fill="#0a0a0a"/>
    <ellipse cx="5.5" cy="3.5" rx="1" ry="1.2" fill="#0a0a0a"/>
    <!-- Nose -->
    <path d="M3.5 5.5 L4 6.5 L4.5 5.5" stroke="#8a8a8a" stroke-width="0.4" fill="none"/>
    <!-- Mouth slit -->
    <line x1="2.5" y1="7.5" x2="5.5" y2="7.5" stroke="#8a8a8a" stroke-width="0.5"/>
    <!-- Decorative lines on mask -->
    <path d="M1 2 Q2.5 1.5 4 2" stroke="#8a8a8a" stroke-width="0.3" fill="none"/>
    <path d="M4 2 Q5.5 1.5 7 2" stroke="#8a8a8a" stroke-width="0.3" fill="none"/>
  </g>
  <!-- Wand drawn - right hand -->
  <g>
    <!-- Wand -->
    <line x1="30" y1="21" x2="33" y2="12" stroke="#5a3a1a" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Hand holding wand -->
    <ellipse cx="30" cy="22" rx="1.5" ry="1" fill="#4a4a4a"/>
    <!-- Wand tip glow -->
    <circle cx="33.5" cy="11.5" r="1" fill="#30ff30" opacity="0.6"/>
    <circle cx="33.5" cy="11.5" r="0.5" fill="#90ff90" opacity="0.8"/>
  </g>
  <!-- Dark Mark on forearm hint -->
  <path d="M7 22 L6 21 L7 20 M6 21 L6 19" stroke="#2acd2a" stroke-width="0.4" fill="none" opacity="0.5"/>
  <!-- Robe bottom tatter -->
  <g stroke="#0a0a0a" stroke-width="0.5" fill="none">
    <path d="M9 34 Q10 32 11 34"/>
    <path d="M15 34 Q16 32 17 34"/>
    <path d="M21 34 Q22 32 23 34"/>
    <path d="M25 34 Q26 32 27 34"/>
  </g>
</svg>
