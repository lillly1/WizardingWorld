<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <rect width="36" height="36" fill="#1a2a1a"/>
  <!-- Giant spider body -->
  <g>
    <!-- Abdomen -->
    <ellipse cx="22" cy="18" rx="8" ry="6" fill="#3a2a1a"/>
    <!-- Hair texture on abdomen -->
    <g stroke="#4a3a2a" stroke-width="0.4" opacity="0.6">
      <line x1="16" y1="16" x2="18" y2="15"/>
      <line x1="17" y1="18" x2="19" y2="17"/>
      <line x1="16" y1="20" x2="18" y2="21"/>
      <line x1="24" y1="14" x2="26" y2="13"/>
      <line x1="25" y1="18" x2="27" y2="17"/>
      <line x1="24" y1="22" x2="26" y2="23"/>
    </g>
    <!-- Cephalothorax -->
    <ellipse cx="12" cy="17" rx="5" ry="4.5" fill="#4a3a2a"/>
    <!-- Hair on head -->
    <g stroke="#5a4a3a" stroke-width="0.3">
      <line x1="9" y1="14" x2="8" y2="13"/>
      <line x1="10" y1="13.5" x2="9.5" y2="12.5"/>
      <line x1="14" y1="13.5" x2="14.5" y2="12.5"/>
      <line x1="15" y1="14" x2="16" y2="13"/>
    </g>
    <!-- Multiple eyes (cluster) -->
    <g fill="#cc0000">
      <circle cx="10" cy="15" r="0.8"/>
      <circle cx="11.5" cy="14.5" r="1"/>
      <circle cx="13" cy="14.5" r="1"/>
      <circle cx="14.5" cy="15" r="0.8"/>
      <!-- Lower row -->
      <circle cx="11" cy="16.2" r="0.6"/>
      <circle cx="12.5" cy="16.2" r="0.7"/>
      <circle cx="13.8" cy="16.2" r="0.6"/>
    </g>
    <!-- Eye glints -->
    <g fill="#ff6060" opacity="0.6">
      <circle cx="11.8" cy="14.2" r="0.3"/>
      <circle cx="13.3" cy="14.2" r="0.3"/>
    </g>
    <!-- Pincers / chelicerae -->
    <path d="M9 18 L7 21 L8 21.5 L10 19 Z" fill="#2a1a0a"/>
    <path d="M15 18 L17 21 L16 21.5 L14 19 Z" fill="#2a1a0a"/>
    <!-- Pincer tips -->
    <path d="M7 21 L6 22.5" stroke="#1a0a00" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M17 21 L18 22.5" stroke="#1a0a00" stroke-width="0.8" stroke-linecap="round"/>
  </g>
  <!-- 8 Legs -->
  <g stroke="#3a2a1a" stroke-width="1.5" fill="none" stroke-linecap="round">
    <!-- Right side legs -->
    <path d="M16 15 L20 8 L24 4"/>
    <path d="M17 17 L24 12 L30 8"/>
    <path d="M17 19 L24 22 L30 20"/>
    <path d="M16 21 L20 26 L24 30"/>
    <!-- Left side legs -->
    <path d="M10 15 L6 8 L2 5"/>
    <path d="M9 17 L4 14 L1 10"/>
    <path d="M9 19 L4 22 L1 24"/>
    <path d="M10 21 L6 26 L3 30"/>
  </g>
  <!-- Leg joints -->
  <g fill="#4a3a2a">
    <circle cx="20" cy="8" r="0.8"/>
    <circle cx="24" cy="12" r="0.8"/>
    <circle cx="24" cy="22" r="0.8"/>
    <circle cx="20" cy="26" r="0.8"/>
    <circle cx="6" cy="8" r="0.8"/>
    <circle cx="4" cy="14" r="0.8"/>
    <circle cx="4" cy="22" r="0.8"/>
    <circle cx="6" cy="26" r="0.8"/>
  </g>
</svg>
